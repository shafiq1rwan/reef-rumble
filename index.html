<body>
<canvas id="game"></canvas>
<div id="rotateHint">🦈 Rotate your device to <b>landscape</b> for the best reef battle!</div>

<!-- PeerJS (bundled locally) — powers the room-code online multiplayer -->
<script src="vendor/peerjs.min.js"></script>
<script>
"use strict";
/* ============================================================================
   REEF RUMBLE — an original isometric shark ink-battle prototype
   Single-file, no external assets/libraries. Canvas 2D pixel art.
   Sections:
     1. Constants
     2. Canvas setup
     3. Utility functions
     4. Input handling (desktop)
     5. Mobile controls
     6. Isometric projection
     7. Tile map generation
     8. Entity factories + object pools
     9. Player logic
    10. Enemy AI
    11. Projectile logic
    12. Ink splash / painting
    13. Particles
    14. Camera
    15. UI rendering
    16. Game states
    17. Update loop
    18. Render loop
   ============================================================================ */

/* ============================================================
   1. CONSTANTS
   ============================================================ */
const TILE_W = 64;          // isometric tile width  (full diamond)
const TILE_H = 32;          // isometric tile height (full diamond)
const TILE_TH = 14;         // visual tile "thickness" for 2.5D side faces
const MAP_W = 24;
const MAP_H = 24;

// Movement speeds (tiles per second, delta-scaled)
const PLAYER_SPEED_NORMAL    = 4.6;
const PLAYER_SPEED_OWN_INK   = 6.2;
const PLAYER_SPEED_ENEMY_INK = 2.4;
const PLAYER_SPEED_DIVE      = 7.8;

// Ink tank
const INK_MAX  = 100;
const SHOT_COST = 8;
const SPLASH_RADIUS = 2.2;

// Match
const MATCH_TIME = 120;     // seconds (2 minutes) — snappy arena match

// Combat
const PLAYER_MAX_HP = 100;
const ENEMY_MAX_HP  = 60;
const PLAYER_IFRAMES = 1.1; // seconds invulnerable after hit
const RESPAWN_DELAY  = 2.4; // seconds

// Terrain types
const T_FLOOR = 0;
const T_OBST  = 1;   // solid obstacle (coral/rock/crate/barrier/sign)
const T_RAMP  = 2;   // walkable decorative

// Ink owner
const OWN_NONE   = 0;
const OWN_PLAYER = 1;
const OWN_ENEMY  = 2;

// Colors — the shark BODY stays a calmer shark-blue; the INK palette is
// switchable (normal vs colorblind) via applyPalette().
const PLAYER_BODY       = "#4aa3d4";   // shark-blue character body
const PLAYER_BODY_DARK  = "#2a6791";
const PALETTES = {
  // default: cyan player vs magenta / gold / lime gangs
  normal: { player: "#2ccada", dark: "#157f90", enemies: [
    { ink: "#d94bc0", dark: "#84287a", body: "#b06aa0" },
    { ink: "#d6ab3d", dark: "#8f6e14", body: "#c2a05c" },
    { ink: "#62c748", dark: "#357f23", body: "#84bd6e" },
  ] },
  // colorblind: high-contrast blue / orange / yellow / violet (avoids cyan↔magenta
  // and red↔green confusion); rivals also keep numbered badges to tell them apart
  cb: { player: "#2e9bff", dark: "#1560a8", enemies: [
    { ink: "#ff7a1f", dark: "#b04e0e", body: "#ff9d57" },
    { ink: "#ffd21e", dark: "#b08f10", body: "#ffe06a" },
    { ink: "#b266ff", dark: "#6f33b0", body: "#cd9bff" },
  ] },
};
let PLAYER_COLOR      = PALETTES.normal.player;   // faction 0 ink (you) — used in UI
let PLAYER_COLOR_DARK = PALETTES.normal.dark;
let ENEMY_COLORS = PALETTES.normal.enemies.map(e => ({ ...e }));
// 4 factions: 0 = you (cyan/blue), 1-3 = rival gangs. Each { ink, dark, body }.
let FACTION_COLORS = [];
let localFaction = 0;   // which faction this client controls (0 in solo/host)
function buildFactionColors() {
  FACTION_COLORS = [
    { ink: PLAYER_COLOR, dark: PLAYER_COLOR_DARK, body: PLAYER_BODY },
    ...ENEMY_COLORS.map(e => ({ ...e })),
  ];
}
function applyPalette() {
  const pal = (settings.colorblind) ? PALETTES.cb : PALETTES.normal;
  PLAYER_COLOR = pal.player; PLAYER_COLOR_DARK = pal.dark;
  ENEMY_COLORS = pal.enemies.map(e => ({ ...e }));
  buildFactionColors();
  // recolor any already-painted tiles + sharks so a mid-match toggle stays consistent
  try {
    if (map && map.length) for (const t of map) {
      if (t.team >= 0) t.inkColor = FACTION_COLORS[t.team].ink;
    }
  } catch (e) { /* map not built yet */ }
  try { for (const sh of sharks) { const fc = FACTION_COLORS[sh.faction]; sh.color = fc.ink; sh.dark = fc.dark; sh.body = fc.body; } } catch (e) {}
}
buildFactionColors();   // initial (normal) palette

// Decoration sub-types for obstacles (visual only)
const D_CORAL = 0, D_ROCK = 1, D_CRATE = 2, D_SIGN = 3, D_BARRIER = 4;

// Player weapons (picked on the weapon-select screen before a match)
const WEAPONS = [
  { name: "Tide Blaster", desc: "Balanced all-rounder.",        cost: 8,  cd: 0.13, speed: 11,  range: 6.5, splashR: 2.2, dmg: 26, splashDmg: 14, pellets: 1, spread: 0.05, big: false },
  { name: "Reef Spray",   desc: "Rapid fire, short range.",     cost: 4,  cd: 0.07, speed: 12,  range: 4.8, splashR: 1.5, dmg: 12, splashDmg: 7,  pellets: 1, spread: 0.13, big: false },
  { name: "Deep Cannon",  desc: "Slow but heavy, huge splash.", cost: 22, cd: 0.50, speed: 8.5, range: 8.5, splashR: 3.3, dmg: 40, splashDmg: 22, pellets: 1, spread: 0.02, big: true },
  { name: "Triad Burst",  desc: "Three-pellet spread blast.",   cost: 14, cd: 0.42, speed: 10,  range: 4.6, splashR: 1.8, dmg: 16, splashDmg: 9,  pellets: 3, spread: 0.26, big: false },
];
let weaponSel = 0;   // index into WEAPONS

/* ============================================================
   2. CANVAS SETUP

   Crispness strategy: draw EVERYTHING directly to the visible canvas, which is
   backed by real device pixels (cssSize * devicePixelRatio). A single base
   transform maps our logical coordinates to device pixels, so text and shapes
   rasterise at full resolution = razor sharp. We keep a moderate logical size
   (VIEW_W/VIEW_H) so the zoom and HUD stay consistent across screens.
   ============================================================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d", { alpha: false });

let VIEW_W = 0, VIEW_H = 0;   // logical render dimensions (control zoom + HUD)
let UI = 1;                    // HUD scale factor derived from VIEW_W
let safeT = 0, safeR = 0, safeB = 0, safeL = 0;  // device safe-area insets (logical px)

// read the device safe-area insets (notches / nav bars) via a CSS probe
let safeProbe = null;
function measureSafe() {
  if (!safeProbe) {
    safeProbe = document.createElement("div");
    safeProbe.style.cssText = "position:fixed;top:0;left:0;width:0;height:0;visibility:hidden;pointer-events:none;" +
      "padding-top:env(safe-area-inset-top);padding-right:env(safe-area-inset-right);" +
      "padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);";
    document.body.appendChild(safeProbe);
  }
  const cs = getComputedStyle(safeProbe);
  const k = VIEW_W / Math.max(1, window.innerWidth);   // CSS px -> logical px
  safeT = (parseFloat(cs.paddingTop) || 0) * k;
  safeR = (parseFloat(cs.paddingRight) || 0) * k;
  safeB = (parseFloat(cs.paddingBottom) || 0) * k;
  safeL = (parseFloat(cs.paddingLeft) || 0) * k;
}

function resize() {
  // perf mode renders at 1× device pixels (far fewer pixels to rasterise on
  // low-end GPUs); normal mode backs the canvas with up to 2× for crisp text.
  const dpr = settings.perf ? 1 : Math.min(window.devicePixelRatio || 1, 2);
  const cssW = window.innerWidth, cssH = window.innerHeight;
  // logical width chosen for a comfortable zoom / HUD size
  const targetW = Math.max(520, Math.min(900, Math.round(cssW / 1.6)));
  const scale = cssW / targetW;          // CSS px per logical px
  VIEW_W = Math.round(cssW / scale);
  VIEW_H = Math.round(cssH / scale);
  // back the canvas with real device pixels so everything is crisp
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width = cssW + "px";
  canvas.style.height = cssH + "px";
  // map logical coords -> device pixels (rasterise at full resolution)
  const deviceScale = canvas.width / VIEW_W;
  ctx.setTransform(deviceScale, 0, 0, deviceScale, 0, 0);
  ctx.imageSmoothingEnabled = false;
  UI = clamp(VIEW_W / 760, 0.72, 1.4);   // HUD elements scale with the viewport
  try { measureSafe(); } catch (e) { safeT = safeR = safeB = safeL = 0; }
  layoutMobileControls();
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));

/* ============================================================
   3. UTILITY FUNCTIONS
   ============================================================ */
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp  = (a, b, t) => a + (b - a) * t;
const dist  = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
const dist2 = (ax, ay, bx, by) => { const dx = ax-bx, dy = ay-by; return dx*dx+dy*dy; };
const rand  = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b));
const pick  = arr => arr[(Math.random() * arr.length) | 0];
const TAU = Math.PI * 2;

// Seeded RNG for reproducible-ish map generation
let _seed = 1337;
function srand() { _seed = (_seed * 1664525 + 1013904223) >>> 0; return _seed / 4294967296; }

// Lighten/darken a hex color by amount (-1..1). Pixel-art friendly.
function shade(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  if (amt > 0) { r = r + (255-r)*amt; g = g + (255-g)*amt; b = b + (255-b)*amt; }
  else { r = r * (1+amt); g = g * (1+amt); b = b * (1+amt); }
  return "rgb(" + (r|0) + "," + (g|0) + "," + (b|0) + ")";
}

/* ============================================================
   3b. AUDIO (procedural WebAudio SFX — no files)
   ============================================================ */
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
// short tone with optional pitch slide (volume scaled by the SFX setting)
function tone(freq, dur, type, vol, slideTo) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type || "square";
  o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
  g.gain.setValueAtTime((vol || 0.12) * settings.sfxVol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
// filtered noise burst (splats / impacts)
function noiseBurst(dur, vol, freq) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const len = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
  const n = audioCtx.createBufferSource(); n.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = "bandpass"; f.frequency.value = freq || 1100; f.Q.value = 0.7;
  const g = audioCtx.createGain(); g.gain.value = (vol || 0.2) * settings.sfxVol;
  n.connect(f); f.connect(g); g.connect(audioCtx.destination);
  n.start(t);
}
function sfx(kind) {
  if (!audioCtx || settings.sfxVol <= 0) return;
  switch (kind) {
    case "shoot":  tone(540, 0.08, "square",  0.07, 280); break;
    case "eshoot": tone(360, 0.08, "sawtooth",0.04, 200); break;
    case "hit":    tone(220, 0.10, "square",  0.10, 90);  break;
    case "hurt":   tone(170, 0.16, "square",  0.16, 70);  break;
    case "splat":  noiseBurst(0.18, 0.22, 900); tone(150, 0.2, "square", 0.12, 60); break;
    case "dive":   tone(180, 0.22, "sine",    0.10, 460); break;
    case "ulti":   tone(220, 0.5, "sawtooth", 0.18, 920); noiseBurst(0.45, 0.18, 1500); break;
    case "count":  tone(640, 0.14, "square",  0.13, 640); break;   // 3 / 2 / 1 beep
    case "go":     tone(520, 0.30, "square",  0.17, 1040); break;  // rising GO!
    case "ui":     tone(480, 0.06, "square",  0.06, 600); break;   // menu blip
    case "pickup": tone(523, 0.18, "sine",    0.13, 1047); tone(1047, 0.12, "triangle", 0.07, 1568); break; // happy chime
  }
}

/* ---- SETTINGS (persisted): music/SFX volumes 0..1 + colorblind + perf mode ---- */
// perf = lighter rendering for low-end devices (caps pixel ratio, trims the
// animated background, and bounds the particle count). See PERF_* uses below.
const settings = { musicVol: 0.6, sfxVol: 0.8, colorblind: false, perf: false };
try {
  const sv = JSON.parse(localStorage.getItem("reefRumble.settings"));
  if (sv) {
    // accept new volume keys, and migrate the old on/off booleans
    if (typeof sv.musicVol === "number") settings.musicVol = clamp(sv.musicVol, 0, 1);
    else if (sv.music === false) settings.musicVol = 0;
    if (typeof sv.sfxVol === "number") settings.sfxVol = clamp(sv.sfxVol, 0, 1);
    else if (sv.sfx === false) settings.sfxVol = 0;
    settings.colorblind = !!sv.colorblind;
    settings.perf = !!sv.perf;
  }
} catch (e) {}
applyPalette();   // apply the saved palette before anything draws
function saveSettings() { try { localStorage.setItem("reefRumble.settings", JSON.stringify(settings)); } catch (e) {} }

// player display name for multiplayer lobbies (persisted)
let playerName = "Player";
try { const n = localStorage.getItem("reefRumble.name"); if (n) playerName = n; } catch (e) {}
function sanitizeName(s) { return (s || "").replace(/[^\x20-\x7E]/g, "").trim().slice(0, 12) || "Player"; }
function setPlayerName(s) { playerName = sanitizeName(s); try { localStorage.setItem("reefRumble.name", playerName); } catch (e) {} }

/* ---- BACKGROUND MUSIC (synthesised loop, no files) ---- */
let musicGain = null, musicStep = 0, musicNextTime = 0;
const MUSIC_BPM = 96;
const M_BASS = [0, 0, 7, 5];                       // root-relative semitones
const M_ARP  = [12, 15, 19, 15, 12, 19, 24, 19];  // gentle pentatonic arp
function mnote(freq, t, dur, type, vol) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
  o.connect(g); g.connect(musicGain);
  o.start(t); o.stop(t + dur + 0.05);
}
function playMusicStep(step, t, spb) {
  const root = 196; // ~G3
  if (step % 4 === 0) { const s = M_BASS[(step / 4) % M_BASS.length]; mnote(root / 2 * Math.pow(2, s / 12), t, spb * 3.4, "triangle", 0.5); }
  const s2 = M_ARP[step % M_ARP.length]; mnote(root * Math.pow(2, s2 / 12), t, spb * 0.9, "sine", 0.16);
}
function updateMusic() {
  if (!audioCtx || settings.musicVol <= 0) return;
  if (!musicGain) { musicGain = audioCtx.createGain(); musicGain.connect(audioCtx.destination); musicNextTime = audioCtx.currentTime + 0.1; musicStep = 0; }
  musicGain.gain.value = 0.16 * settings.musicVol;   // live volume
  if (musicNextTime < audioCtx.currentTime) musicNextTime = audioCtx.currentTime + 0.05; // resync after pause/off
  const spb = 60 / MUSIC_BPM / 2; // eighth-note step
  while (musicNextTime < audioCtx.currentTime + 0.25) {
    playMusicStep(musicStep, musicNextTime, spb);
    musicStep = (musicStep + 1) % 16;
    musicNextTime += spb;
  }
}

/* ============================================================
   4. INPUT HANDLING (desktop)
   ============================================================ */
const keys = {};
let mouseScreenX = 0, mouseScreenY = 0;   // in internal-render coords
let mouseDown = false;
// hybrid devices (touch laptops) report touch support yet use a mouse — track
// the last input so the mouse aims when used and the sticks show only for touch
let usingMouse = false;

// menu hit-rects (filled in each frame by the matching draw function)
const titleBtns   = { play: null, multi: null, how: null, settings: null, credits: null };
const creditsUI   = { back: null };
const lobbyUI     = { host: null, join: null, back: null, start: null, ready: null, leave: null,
                      name: null, wPrev: null, wNext: null, sPrev: null, sNext: null };
const weaponUI    = { prev: null, next: null, start: null, back: null };
const settingsUI  = { music: null, sfx: null, colorblind: null, perf: null, back: null };
const howtoUI     = { back: null };
const pauseUI     = { resume: null, menu: null, settings: null };
const resultUI    = { rematch: null, leave: null };   // (MP) result-screen buttons
let settingsFrom = "TITLE";                 // where the SETTINGS screen returns to
let settingsDrag = null, settingsDragId = -1;  // which volume slider is being dragged
let showFirstTips = false;                      // control hints on the first match
function inR(p, r) { return r && p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h; }
function setSliderFromX(which, x) {
  const r = settingsUI[which]; if (!r) return;
  const v = clamp((x - r.x) / r.w, 0, 1);
  settings[which === "music" ? "musicVol" : "sfxVol"] = v;
}

// PWA update toast state (set by the service-worker logic near boot)
let updateReady = false, waitingWorker = null;
const toastRect = { x: 0, y: 0, w: 0, h: 0 };
function applyUpdate() { if (waitingWorker) waitingWorker.postMessage("skipWaiting"); }

window.addEventListener("keydown", e => {
  initAudio();
  const k = e.key.toLowerCase();
  keys[k] = true;
  if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(k)) e.preventDefault();
  // global hotkeys
  if (e.key === "Enter") handleEnter();
  if (k === "p" && !net.role && (game.state === "PLAYING" || game.state === "PAUSED"))
    game.state = (game.state === "PLAYING") ? "PAUSED" : "PLAYING";   // pause is solo-only
  if (k === "q" || k === "e") tryUlti();   // SPECIAL / ULTI
  if (k === "escape") {
    if (game.state === "SETTINGS") game.state = settingsFrom;
    else if (game.state === "WEAPONSELECT" || game.state === "HOWTO" || game.state === "CREDITS") game.state = "TITLE";
    else if (game.state === "LOBBY") { netReset(); game.state = "TITLE"; }
    else if (game.state === "PLAYING" && !net.role) game.state = "PAUSED";
  }
  // left/right: stage on title, weapon on the select screen
  if (k === "arrowleft" || k === "a") { if (game.state === "TITLE") cycleLayout(-1); else if (game.state === "WEAPONSELECT") cycleWeapon(-1); }
  if (k === "arrowright" || k === "d") { if (game.state === "TITLE") cycleLayout(1); else if (game.state === "WEAPONSELECT") cycleWeapon(1); }
});
window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

function toInternal(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return { x: (clientX - r.left) / r.width * VIEW_W, y: (clientY - r.top) / r.height * VIEW_H };
}
canvas.addEventListener("mousemove", e => { const p = toInternal(e.clientX, e.clientY); mouseScreenX = p.x; mouseScreenY = p.y; usingMouse = true; if (settingsDrag) setSliderFromX(settingsDrag, p.x); });
canvas.addEventListener("mousedown", e => {
  if (e.button !== 0) return;
  initAudio();
  usingMouse = true;
  const p = toInternal(e.clientX, e.clientY);
  if (updateReady && inR(p, toastRect)) { applyUpdate(); return; }
  if (game.state === "PLAYING") {
    const pbq = pauseBtn();
    if (!net.role && inCircle(p.x, p.y, pbq.x, pbq.y, pbq.r + 8)) { game.state = "PAUSED"; return; }
    mouseDown = true;   // hold to fire
    return;
  }
  menuTap(p);          // all non-gameplay screens
});
window.addEventListener("mouseup", e => { if (e.button === 0) { mouseDown = false; if (settingsDrag) { settingsDrag = null; saveSettings(); } } });
canvas.addEventListener("contextmenu", e => e.preventDefault());

// Unified tap/click handler for every non-gameplay screen
function menuTap(p) {
  switch (game.state) {
    case "TITLE":
      if (titleArrowHit(p)) return;
      if (inR(p, titleBtns.credits)) { sfx("ui"); game.state = "CREDITS"; }
      else if (inR(p, titleBtns.play)) { sfx("ui"); game.state = "WEAPONSELECT"; }
      else if (inR(p, titleBtns.multi)) { sfx("ui"); netReset(); net.status = ""; game.state = "LOBBY"; }
      else if (inR(p, titleBtns.how)) { sfx("ui"); game.state = "HOWTO"; }
      else if (inR(p, titleBtns.settings)) { sfx("ui"); settingsFrom = "TITLE"; game.state = "SETTINGS"; }
      return;
    case "LOBBY":
      lobbyTap(p);
      return;
    case "CREDITS":
      game.state = "TITLE"; sfx("ui"); return;   // tap anywhere / BACK closes
    case "WEAPONSELECT":
      if (inR(p, weaponUI.prev)) cycleWeapon(-1);
      else if (inR(p, weaponUI.next)) cycleWeapon(1);
      else if (inR(p, weaponUI.start)) { sfx("ui"); startMatch(); }
      else if (inR(p, weaponUI.back)) { sfx("ui"); game.state = "TITLE"; }
      return;
    case "SETTINGS":
      if (inR(p, settingsUI.music)) { settingsDrag = "music"; setSliderFromX("music", p.x); sfx("ui"); }
      else if (inR(p, settingsUI.sfx)) { settingsDrag = "sfx"; setSliderFromX("sfx", p.x); sfx("ui"); }
      else if (inR(p, settingsUI.colorblind)) { settings.colorblind = !settings.colorblind; applyPalette(); saveSettings(); sfx("ui"); }
      else if (inR(p, settingsUI.perf)) { settings.perf = !settings.perf; resize(); saveSettings(); sfx("ui"); }
      else if (inR(p, settingsUI.back)) { sfx("ui"); game.state = settingsFrom; }
      return;
    case "HOWTO":
      game.state = "TITLE"; sfx("ui"); return;   // tap anywhere closes
    case "GAMEOVER": case "VICTORY":
      if (net.role === "host") {
        if (inR(p, resultUI.rematch)) { sfx("ui"); netRematch(); }
        else if (inR(p, resultUI.leave)) { sfx("ui"); netReset(); game.state = "TITLE"; }
      } else if (net.role === "client") {
        if (inR(p, resultUI.leave)) { sfx("ui"); netReset(); game.state = "TITLE"; }
        // otherwise wait for the host to rematch
      } else {
        game.state = "TITLE";   // solo: tap anywhere
      }
      return;
    case "PAUSED": {
      if (inR(p, pauseUI.resume)) { sfx("ui"); game.state = "PLAYING"; }
      else if (inR(p, pauseUI.settings)) { sfx("ui"); settingsFrom = "PAUSED"; game.state = "SETTINGS"; }
      else if (inR(p, pauseUI.menu)) { sfx("ui"); game.state = "TITLE"; }
      return;
    }
  }
}
function handleEnter() {
  if (game.state === "TITLE") game.state = "WEAPONSELECT";
  else if (game.state === "WEAPONSELECT") startMatch();
  else if (game.state === "SETTINGS") game.state = settingsFrom;
  else if (game.state === "HOWTO" || game.state === "CREDITS") game.state = "TITLE";
  else if (game.state === "GAMEOVER" || game.state === "VICTORY") {
    if (net.role === "host") netRematch();          // Enter = play again (host)
    else if (net.role === "client") { /* wait for host */ }
    else game.state = "TITLE";                       // solo
  }
}

// Title-screen stage selector (positions filled in by drawTitle each frame)
const titleUI = { lx: 0, rx: 0, y: 0, r: 20 };
function cycleLayout(d) {
  const n = LAYOUT_NAMES.length;
  currentLayout = (currentLayout + d + n) % n;
  sfx("ui");
}
function cycleWeapon(d) {
  const n = WEAPONS.length;
  weaponSel = (weaponSel + d + n) % n;
  sfx("ui");
}
function titleArrowHit(p) {
  if (game.state !== "TITLE") return false;
  if (inCircle(p.x, p.y, titleUI.lx, titleUI.y, titleUI.r)) { cycleLayout(-1); return true; }
  if (inCircle(p.x, p.y, titleUI.rx, titleUI.y, titleUI.r)) { cycleLayout(1); return true; }
  return false;
}

/* ============================================================
   5. MOBILE CONTROLS
   ============================================================ */
const isTouch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);

// Virtual control state. Left = movement stick. Right = FIRE pad which doubles
// as an aim control: tap to fire (auto-aims), or drag to aim that direction.
const moveStick = { active: false, id: -1, cx: 0, cy: 0, x: 0, y: 0, dx: 0, dy: 0, r: 60 };
const btnShoot  = { x: 0, y: 0, r: 42, id: -1, pressed: false, dx: 0, dy: 0 }; // aim+fire pad
const btnDive   = { x: 0, y: 0, r: 36, id: -1, pressed: false };
const btnUlti   = { x: 0, y: 0, r: 30, id: -1, pressed: false };

function layoutMobileControls() {
  const u = (typeof UI === "number" && UI) ? UI : 1;
  const m = 60 * u;
  moveStick.cx = m; moveStick.cy = VIEW_H - m; moveStick.r = 52 * u;
  moveStick.x = moveStick.cx; moveStick.y = moveStick.cy;
  // big FIRE/aim pad in the corner; DIVE & ULTI pulled well clear of it
  btnShoot.x = VIEW_W - 66 * u; btnShoot.y = VIEW_H - 66 * u; btnShoot.r = 50 * u;
  btnDive.x  = VIEW_W - 162 * u; btnDive.y = VIEW_H - 46 * u; btnDive.r = 27 * u;
  btnUlti.x  = VIEW_W - 60 * u;  btnUlti.y = VIEW_H - 162 * u; btnUlti.r = 27 * u;
}
// set the aim direction from a touch on the fire pad (relative to its centre)
function setFireDrag(p) {
  let dx = p.x - btnShoot.x, dy = p.y - btnShoot.y;
  const len = Math.hypot(dx, dy);
  if (len > btnShoot.r) { dx = dx / len * btnShoot.r; dy = dy / len * btnShoot.r; }
  btnShoot.dx = dx / btnShoot.r; btnShoot.dy = dy / btnShoot.r;
}

function inCircle(px, py, cx, cy, r) { return dist2(px, py, cx, cy) <= r*r; }

if (isTouch) {
  canvas.addEventListener("touchstart", onTouchStart, { passive: false });
  canvas.addEventListener("touchmove", onTouchMove, { passive: false });
  canvas.addEventListener("touchend", onTouchEnd, { passive: false });
  canvas.addEventListener("touchcancel", onTouchEnd, { passive: false });
}

let wsSwipe = null;   // weapon-select swipe tracking
function onTouchStart(e) {
  e.preventDefault();
  initAudio();
  usingMouse = false;   // switch to touch controls
  for (const t of e.changedTouches) {
    const p = toInternal(t.clientX, t.clientY);
    if (updateReady && inR(p, toastRect)) { applyUpdate(); return; }
    // any non-gameplay screen routes through menuTap (plus weapon-swipe & slider drag)
    if (game.state !== "PLAYING") {
      if (game.state === "WEAPONSELECT") wsSwipe = { id: t.identifier, x: p.x };
      if (game.state === "SETTINGS" && (inR(p, settingsUI.music) || inR(p, settingsUI.sfx))) {
        settingsDrag = inR(p, settingsUI.music) ? "music" : "sfx";
        settingsDragId = t.identifier; setSliderFromX(settingsDrag, p.x); sfx("ui");
        return;
      }
      menuTap(p);
      return;
    }
    // pause button (top-right) — solo only (host-authoritative MP can't pause)
    const pbq = pauseBtn();
    if (!net.role && inCircle(p.x, p.y, pbq.x, pbq.y, pbq.r + 10)) { game.state = "PAUSED"; return; }
    // small action buttons first (ULTI / DIVE)
    if (inCircle(p.x, p.y, btnUlti.x, btnUlti.y, btnUlti.r + 8)) { btnUlti.id = t.identifier; btnUlti.pressed = true; tryUlti(); continue; }
    if (inCircle(p.x, p.y, btnDive.x, btnDive.y, btnDive.r + 8)) { btnDive.id = t.identifier; btnDive.pressed = true; continue; }
    // FIRE + aim pad: any touch on the lower-right starts firing; drag to aim
    if (p.x > VIEW_W * 0.5 && p.y > VIEW_H * 0.4 && btnShoot.id < 0) {
      btnShoot.id = t.identifier; btnShoot.pressed = true; setFireDrag(p); continue;
    }
    // movement stick: lower-left thumb
    if (p.x < VIEW_W * 0.5 && !moveStick.active) {
      moveStick.active = true; moveStick.id = t.identifier;
      moveStick.cx = p.x; moveStick.cy = p.y; moveStick.x = p.x; moveStick.y = p.y; moveStick.dx = 0; moveStick.dy = 0;
    }
  }
}
function onTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const p = toInternal(t.clientX, t.clientY);
    if (t.identifier === moveStick.id) updateStick(moveStick, p);
    else if (t.identifier === btnShoot.id) setFireDrag(p);
    else if (settingsDrag && t.identifier === settingsDragId) setSliderFromX(settingsDrag, p.x);
  }
}
function updateStick(s, p) {
  let dx = p.x - s.cx, dy = p.y - s.cy;
  const len = Math.hypot(dx, dy);
  if (len > s.r) { dx = dx / len * s.r; dy = dy / len * s.r; }
  s.x = s.cx + dx; s.y = s.cy + dy;
  s.dx = dx / s.r; s.dy = dy / s.r; // normalized -1..1
}
function onTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    // weapon-select horizontal swipe → change weapon
    if (wsSwipe && t.identifier === wsSwipe.id) {
      if (game.state === "WEAPONSELECT") {
        const dx = toInternal(t.clientX, t.clientY).x - wsSwipe.x;
        if (dx < -40) cycleWeapon(1); else if (dx > 40) cycleWeapon(-1);
      }
      wsSwipe = null;
    }
    if (settingsDrag && t.identifier === settingsDragId) { settingsDrag = null; settingsDragId = -1; saveSettings(); }
    if (t.identifier === moveStick.id) { moveStick.active = false; moveStick.id = -1; moveStick.dx = 0; moveStick.dy = 0; }
    if (t.identifier === btnShoot.id)  { btnShoot.id = -1; btnShoot.pressed = false; btnShoot.dx = 0; btnShoot.dy = 0; }
    if (t.identifier === btnDive.id)   { btnDive.id = -1; btnDive.pressed = false; }
    if (t.identifier === btnUlti.id)   { btnUlti.id = -1; btnUlti.pressed = false; }
  }
}

/* ============================================================
   6. ISOMETRIC PROJECTION
   ============================================================ */
// World (grid float) -> screen (pre-camera) coordinates
function worldToScreen(wx, wy) {
  return {
    x: (wx - wy) * (TILE_W / 2),
    y: (wx + wy) * (TILE_H / 2),
  };
}
// Screen -> world (inverse), used for mouse aim targeting
function screenToWorld(sx, sy) {
  const a = sx / (TILE_W / 2);
  const b = sy / (TILE_H / 2);
  return { x: (a + b) / 2, y: (b - a) / 2 };
}

/* ============================================================
   7. TILE MAP GENERATION
   ============================================================ */
let map = [];   // flat array of tile objects, index = y*MAP_W + x
let PLAYER_SPAWN = { x: 12, y: 18 };   // set by generateMap()
let ENEMY_SPAWNS = [];                  // set by generateMap()

function tileAt(x, y) {
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return null;
  return map[y * MAP_W + x];
}
function isWalkable(x, y) {
  const t = tileAt(x, y);
  return t && t.terrain !== T_OBST;
}

/* ----------------------------------------------------------------------------
   STAGES — three selectable, 180°-rotationally-symmetric arenas:
     0  Reef City   — corner forts + sunken central ink-pool plaza (the reference)
     1  Open Lagoon — wide open water, a central reef island + scattered cover
     2  Coral Maze  — tight reef corridors and chambers for cat-and-mouse play
   A connectivity pass guarantees every spawn can reach the rest of the arena.
   ---------------------------------------------------------------------------- */
const LAYOUT_NAMES = ["Reef City", "Open Lagoon", "Coral Maze"];
let currentLayout = 0;

function generateMap(layout) {
  if (layout == null) layout = currentLayout;
  currentLayout = ((layout % LAYOUT_NAMES.length) + LAYOUT_NAMES.length) % LAYOUT_NAMES.length;
  _seed = 20240601 + currentLayout * 4099;
  map = [];
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      map.push({
        x, y, terrain: T_FLOOR, deco: -1, height: 1,
        team: -1, ink: 0, inkColor: null,   // team: -1 none, 0-3 faction
        pulse: 0, tint: (x + y) & 1,   // checkerboard tile shading
      });
    }
  }
  const CX = MAP_W / 2 - 0.5, CY = MAP_H / 2 - 0.5;  // arena centre (11.5, 11.5)

  // helpers ------------------------------------------------------------------
  const setO = (x, y, deco, h) => { const t = tileAt(x, y); if (t) { t.terrain = T_OBST; t.deco = deco; t.height = h || 1; } };
  const setRamp = (x, y) => { const t = tileAt(x, y); if (t && t.terrain === T_FLOOR) t.terrain = T_RAMP; };
  const clearTile = (x, y) => { const t = tileAt(x, y); if (t && t.terrain === T_OBST) { t.terrain = T_FLOOR; t.deco = -1; } };
  const sym = (x, y, deco, h) => { setO(x, y, deco, h); setO(MAP_W - 1 - x, MAP_H - 1 - y, deco, h); };

  // Reef border wall (common to every stage) --------------------------------
  for (let i = 0; i < MAP_W; i++) {
    const wall = (i % 4 === 0) ? D_ROCK : D_CORAL;
    setO(i, 0, wall, rand(0.8, 1.6));
    setO(i, MAP_H - 1, wall, rand(0.8, 1.6));
    setO(0, i, (i % 4 === 2) ? D_ROCK : D_CORAL, rand(0.8, 1.6));
    setO(MAP_W - 1, i, (i % 4 === 2) ? D_ROCK : D_CORAL, rand(0.8, 1.6));
  }
  setO(7, 0, D_SIGN, 1.5); setO(16, 0, D_SIGN, 1.5);
  setO(7, MAP_H - 1, D_SIGN, 1.5); setO(16, MAP_H - 1, D_SIGN, 1.5);

  // ---- LAYOUT 0: REEF CITY -------------------------------------------------
  if (currentLayout === 0) {
    const fort = (ox, oy, doorDX, doorDY) => {
      for (let dx = 0; dx < 4; dx++) for (let dy = 0; dy < 4; dy++) {
        if (!(dx === 0 || dy === 0 || dx === 3 || dy === 3)) continue;
        const door = (Math.sign(dx - 1.5) === doorDX && (dy === (doorDY > 0 ? 3 : 0) || dx === (doorDX > 0 ? 3 : 0))) ||
                     (Math.sign(dy - 1.5) === doorDY && (dx === (doorDX > 0 ? 3 : 0) || dy === (doorDY > 0 ? 3 : 0)));
        if (door) continue;
        setO(ox + dx, oy + dy, ((dx + dy) & 1) ? D_CRATE : D_BARRIER, 1);
      }
    };
    fort(3, 3, 1, 1); fort(MAP_W - 7, 3, -1, 1); fort(3, MAP_H - 7, 1, -1); fort(MAP_W - 7, MAP_H - 7, -1, -1);
    [[2, 10], [2, 12], [3, 11]].forEach(([x, y]) => sym(x, y, D_CORAL, rand(0.9, 1.5)));
    [[10, 2], [12, 2], [11, 3]].forEach(([x, y]) => sym(x, y, D_CORAL, rand(0.9, 1.5)));
    sym(8, 8, D_ROCK, 1); sym(15, 8, D_CRATE, 1);
    for (let y = 0; y < MAP_H; y++) for (let x = 0; x < MAP_W; x++) {
      const d = dist(x, y, CX, CY);
      if (d >= 4 && d < 5.3) setRamp(x, y);
    }
    for (let y = 0; y < MAP_H; y++) for (let x = 0; x < MAP_W; x++)
      if (dist(x, y, CX, CY) < 4) clearTile(x, y);

  // ---- LAYOUT 1: OPEN LAGOON ----------------------------------------------
  } else if (currentLayout === 1) {
    // central reef island (cover) ringed by a sandbar of ramps
    sym(11, 11, D_CORAL, 1.4); setO(12, 11, D_CORAL, 1.2); setO(11, 12, D_ROCK, 1.0);
    for (let y = 0; y < MAP_H; y++) for (let x = 0; x < MAP_W; x++) {
      const d = dist(x, y, CX, CY);
      if (d >= 2.0 && d < 3.2) setRamp(x, y);
    }
    // a handful of scattered cover clusters (symmetric, sparse)
    [[6, 6, D_CORAL], [9, 5, D_ROCK], [5, 13, D_CRATE], [16, 9, D_ROCK], [7, 17, D_CORAL]]
      .forEach(([x, y, d]) => sym(x, y, d, rand(0.9, 1.5)));

  // ---- LAYOUT 2: CORAL MAZE -----------------------------------------------
  } else {
    // vertical reef walls with passage gaps
    const vWall = (cx) => { for (let y = 2; y <= MAP_H - 3; y++) { if (y >= 8 && y <= 15) continue; if (y % 5 === 0) continue; setO(cx, y, (y & 1) ? D_CORAL : D_ROCK, rand(0.9, 1.4)); } };
    const hWall = (cy) => { for (let x = 2; x <= MAP_W - 3; x++) { if (x >= 8 && x <= 15) continue; if (x % 5 === 0) continue; setO(x, cy, (x & 1) ? D_CORAL : D_ROCK, rand(0.9, 1.4)); } };
    vWall(6); vWall(MAP_W - 7); hWall(6); hWall(MAP_H - 7);
    // inner chamber walls around the centre, with doorways
    [[10, 9], [13, 9], [9, 10], [9, 13], [14, 10], [14, 13], [10, 14], [13, 14]]
      .forEach(([x, y]) => setO(x, y, D_CRATE, 1));
    // scattered coral nubs for texture
    [[4, 10], [10, 4], [18, 12], [12, 18]].forEach(([x, y]) => sym(x, y, D_CORAL, rand(0.8, 1.3)));
  }

  // Spawn points (common) ----------------------------------------------------
  PLAYER_SPAWN = { x: CX, y: MAP_H - 4 };
  ENEMY_SPAWNS = [
    { x: 4.5, y: 4.5 },
    { x: MAP_W - 5.5, y: 4.5 },
    { x: CX, y: 4 },
  ];
  // clear a small pocket around every spawn so nobody starts boxed in
  [PLAYER_SPAWN, ...ENEMY_SPAWNS].forEach(s => {
    const sx = Math.floor(s.x), sy = Math.floor(s.y);
    clearTile(sx, sy); clearTile(sx + 1, sy); clearTile(sx - 1, sy); clearTile(sx, sy + 1); clearTile(sx, sy - 1);
  });

  // CONNECTIVITY GUARANTEE: flood from player spawn; carve a corridor to any
  // spawn that ended up walled off so every stage is always fully playable.
  ensureConnectivity(clearTile);
}

// Flood-fill walkable tiles from the player spawn; for any enemy spawn that is
// unreachable, clear a Manhattan corridor toward the centre until it connects.
function ensureConnectivity(clearTile) {
  const reachFrom = (sx, sy) => {
    const seen = new Uint8Array(MAP_W * MAP_H);
    const stack = [[sx, sy]]; seen[sy * MAP_W + sx] = 1;
    while (stack.length) {
      const [x, y] = stack.pop();
      for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
        const nx = x + dx, ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= MAP_W || ny >= MAP_H) continue;
        const k = ny * MAP_W + nx;
        if (seen[k]) continue;
        if (!isWalkable(nx, ny)) continue;
        seen[k] = 1; stack.push([nx, ny]);
      }
    }
    return seen;
  };
  const psx = Math.floor(PLAYER_SPAWN.x), psy = Math.floor(PLAYER_SPAWN.y);
  for (const s of ENEMY_SPAWNS) {
    let seen = reachFrom(psx, psy);
    let sx = Math.floor(s.x), sy = Math.floor(s.y);
    if (seen[sy * MAP_W + sx]) continue;
    // carve toward the centre (interior tiles only) until we touch reachable ground
    let guard = 0;
    while (!seen[sy * MAP_W + sx] && guard++ < 64) {
      if (sx > 1 && sx < MAP_W - 2) sx += Math.sign((MAP_W / 2) - sx) || 0;
      else if (sy > 1 && sy < MAP_H - 2) sy += Math.sign((MAP_H / 2) - sy) || 0;
      clearTile(sx, sy);
      seen = reachFrom(psx, psy);
    }
  }
}

// Count tiles paintable (floor+ramp) for territory %
let paintableTotal = 0;
function countPaintable() {
  paintableTotal = 0;
  for (const t of map) if (t.terrain !== T_OBST) paintableTotal++;
}

/* ============================================================
   8. ENTITY FACTORIES + OBJECT POOLS
   ============================================================ */
// Projectile pool
const projectiles = [];
function spawnProjectile(x, y, dx, dy, faction, color, dark, speed, range) {
  let p = projectiles.find(o => !o.alive);
  if (!p) { p = {}; projectiles.push(p); }
  p.alive = true; p.x = x; p.y = y; p.dx = dx; p.dy = dy;
  p.faction = faction; p.color = color; p.dark = dark;
  p.speed = speed; p.range = range; p.travelled = 0;
  p.r = 0.28; p.spin = rand(0, TAU);
  // damage / paint defaults (a shooter's weapon overrides these after spawning)
  p.directDmg = 14;
  p.splashDmg = 8;
  p.splashR = SPLASH_RADIUS;
  return p;
}

// Particle pool
const particles = [];
const PERF_PARTICLE_CAP = 70;   // (perf mode) hard ceiling on live particle objects
let perfPI = 0;                 // round-robin recycle index for the cap
function spawnParticle(x, y, vx, vy, color, life, size, gravity) {
  let p = particles.find(o => !o.alive);
  if (!p) {
    // perf mode: don't grow the pool past the cap — recycle the oldest slot
    if (settings.perf && particles.length >= PERF_PARTICLE_CAP) p = particles[(perfPI++) % particles.length];
    else { p = {}; particles.push(p); }
  }
  p.alive = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
  p.color = color; p.life = life; p.maxLife = life; p.size = size;
  p.gravity = gravity == null ? 0.6 : gravity; p.z = 0; p.vz = rand(0.2, 1.2);
  return p;
}
// Floating text (damage / pickups)
const floaters = [];
function spawnFloater(x, y, text, color) {
  floaters.push({ x, y, text, color, life: 1.0 });
}

// Unified shark factory — any faction can be the local player (needed in MP).
// Humans get 100 HP, bots 60 (keeps solo identical: you=100, gangs=60).
function makeShark(faction, isBot) {
  const fc = FACTION_COLORS[faction];
  const s = faction === 0 ? PLAYER_SPAWN : (ENEMY_SPAWNS[faction - 1] || { x: 4, y: 4 });
  const maxHp = isBot ? ENEMY_MAX_HP : PLAYER_MAX_HP;
  return {
    faction, isBot, id: faction - 1, maxHp,
    color: fc.ink, dark: fc.dark, body: fc.body,
    x: s.x, y: s.y, vx: 0, vy: 0, aim: 0,
    hp: maxHp, ink: INK_MAX,
    diving: false, wasDiving: false,
    speed: 0, iframe: 0, shootCd: 0,
    dead: false, respawn: 0,
    squash: 0, facing: 1, walkPhase: 0,
    score: 0, kills: 0,
    special: 0, ultiFlash: 0,
    speedBoost: 0, shield: 0, popIn: 0,
    weaponIdx: 0, weapon: WEAPONS[0],
    spawn: [s.x, s.y],
    // AI fields (used when isBot)
    state: "PAINT", stateTimer: rand(1, 3), targetX: s.x, targetY: s.y,
    path: null, pathIdx: 0, pathCd: 0, pgx: -1, pgy: -1,
    // per-frame input for human-controlled factions (host injects this in MP)
    netInput: null,
    // interpolation targets (clients lerp toward these from snapshots)
    netX: s.x, netY: s.y, netAim: 0,
  };
}
function makePlayer() { return makeShark(0, false); }
function makeEnemy(idx) { return makeShark(idx + 1, true); }

/* A* on the tile grid (4-neighbour, Manhattan heuristic). Returns an array of
   {x,y} tile steps from start to goal (excluding start), or null if no path.
   Grid is only 24x24 so a linear open-set is plenty fast for a few agents. */
function aStar(sx, sy, gx, gy) {
  if (!isWalkable(sx, sy) || !isWalkable(gx, gy)) return null;
  if (sx === gx && sy === gy) return [];
  const W = MAP_W, H = MAP_H, N = W * H;
  const idx = (x, y) => y * W + x;
  const came = new Int32Array(N).fill(-1);
  const gS = new Float32Array(N).fill(Infinity);
  const fS = new Float32Array(N).fill(Infinity);
  const inOpen = new Uint8Array(N), closed = new Uint8Array(N);
  const h = (x, y) => Math.abs(x - gx) + Math.abs(y - gy);
  const start = idx(sx, sy), goal = idx(gx, gy);
  const open = [start]; inOpen[start] = 1; gS[start] = 0; fS[start] = h(sx, sy);
  let iter = 0;
  while (open.length && iter++ < 1500) {
    // pop lowest f
    let bi = 0; for (let i = 1; i < open.length; i++) if (fS[open[i]] < fS[open[bi]]) bi = i;
    const cur = open[bi]; open.splice(bi, 1); inOpen[cur] = 0;
    if (cur === goal) {
      const path = []; let c = cur;
      while (c !== start) { path.push({ x: c % W, y: (c / W) | 0 }); c = came[c]; }
      path.reverse(); return path;
    }
    closed[cur] = 1;
    const cx = cur % W, cy = (cur / W) | 0;
    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || ny < 0 || nx >= W || ny >= H || !isWalkable(nx, ny)) continue;
      const n = idx(nx, ny);
      if (closed[n]) continue;
      const tg = gS[cur] + 1;
      if (tg < gS[n]) {
        came[n] = cur; gS[n] = tg; fS[n] = tg + h(nx, ny);
        if (!inOpen[n]) { open.push(n); inOpen[n] = 1; }
      }
    }
  }
  return null;
}

/* ============================================================
   GAME STATE OBJECT
   ============================================================ */
const game = {
  state: "TITLE",     // TITLE, PLAYING, PAUSED, GAMEOVER, VICTORY
  time: MATCH_TIME,
  shake: 0,
  shakeX: 0, shakeY: 0,
  flash: 0,
  countdown: -1,      // start-of-match 3-2-1-GO timer (>-0.7 = showing)
  pct: { factions: [0, 0, 0, 0] },   // territory % per faction (0=you,1-3=gangs)
  result: null,
};
let player = makePlayer();
let enemies = [];
let sharks = [];      // [player, ...enemies] — uniform list of all 4 factions
let netDirty = null;  // (MP host) Set of tile indices painted since last snapshot

// ---- multiplayer / network state (see NETWORK section) ----
const net = {
  role: null,          // null=solo, "host", or "client"
  peer: null,          // PeerJS Peer
  conns: [],           // (host) DataConnections to each joined client
  hostConn: null,      // (client) DataConnection to the host
  roomCode: null,      // shared room code (host's peer id)
  status: "",          // lobby status / error line
  mode: null,          // lobby sub-screen: null | "host" | "join"
  players: [],         // lobby roster: [{faction, name, ready, isLocal}]
  factionConn: {},     // (host) faction id -> DataConnection
  ultiPending: false,  // (client) edge-triggered ulti to send next input
  snapAccum: 0,        // (host) snapshot send timer
  inputAccum: 0,       // (client) input send timer
  lastSnap: null,      // (client) most recent snapshot to apply
  started: false,      // match has begun
  startWarned: false,  // (host) shown the "not everyone is ready" warning once
};

const camera = { x: 0, y: 0, tx: 0, ty: 0 };

// Start a match. opts (multiplayer):
//   localFaction : which faction this client renders/controls (default 0)
//   humans       : Set/array of faction ids that are human-controlled (rest = bots)
//   weapons      : { faction: weaponIdx } overrides (host syncs everyone's pick)
//   stage        : layout index to load (host syncs it)
//   netRole      : "host" | "client" (omitted = solo)
function startMatch(opts) {
  opts = opts || {};
  initAudio();
  generateMap(opts.stage != null ? opts.stage : undefined);
  countPaintable();
  localFaction = opts.localFaction || 0;
  const humanSet = opts.humans ? new Set(opts.humans) : new Set([0]);  // solo: only you
  const weaps = opts.weapons || {};
  // build all 4 factions; index of array == faction id
  const all = [];
  for (let f = 0; f < 4; f++) {
    const isBot = !humanSet.has(f);
    const sh = makeShark(f, isBot);
    const wi = (weaps[f] != null) ? weaps[f] : (f === localFaction ? weaponSel : 0);
    sh.weaponIdx = wi; sh.weapon = WEAPONS[wi] || WEAPONS[0];
    all.push(sh);
  }
  player = all[localFaction];           // the local human's shark (camera/HUD/input)
  enemies = all.filter(s => s !== player);
  sharks = all;                          // all 4 factions, indexable by faction id
  projectiles.length = 0; particles.length = 0; floaters.length = 0; impacts.length = 0;
  pickups.length = 0; pickupTimer = 4; flashes.length = 0; auras.length = 0; inkStorm = null;
  localProj.length = 0; netEvents.length = 0;   // clear MP predicted shots / events
  game.time = MATCH_TIME;
  game.shake = 0; game.flash = 0;
  game.countdown = 3.0;      // 3 · 2 · 1 · GO! intro
  game.state = "PLAYING";
  // show control tips during the very first match only
  try { showFirstTips = !localStorage.getItem("reefRumble.played"); localStorage.setItem("reefRumble.played", "1"); }
  catch (e) { showFirstTips = false; }
  sfx("count");              // beep for the opening "3"
  // snap camera to player
  const sp = worldToScreen(player.x, player.y);
  camera.x = camera.tx = sp.x; camera.y = camera.ty = sp.y;
  // paint small starting puddles under each shark so dive works immediately
  for (const sh of sharks) paintTiles(sh.x, sh.y, sh === player ? 2.2 : 2.0, sh.faction, sh.color);
}

/* ============================================================
   9. PLAYER LOGIC
   ============================================================ */
function speedForTile(ent, tileTeam, diving) {
  const ownsHere = (tileTeam === ent.faction);
  const enemyHere = (tileTeam >= 0 && !ownsHere);
  if (diving && ownsHere) return PLAYER_SPEED_DIVE;
  if (ownsHere) return PLAYER_SPEED_OWN_INK;
  if (enemyHere) return PLAYER_SPEED_ENEMY_INK;
  return PLAYER_SPEED_NORMAL;
}

// Circle-vs-tile collision: try to move, blocked by obstacle tiles.
function moveEntity(ent, mvx, mvy, dt) {
  const rad = 0.32;
  let nx = ent.x + mvx * dt;
  let ny = ent.y + mvy * dt;
  // resolve X
  if (!collides(nx, ent.y, rad)) ent.x = nx;
  else { ent.vx = 0; }
  // resolve Y
  if (!collides(ent.x, ny, rad)) ent.y = ny;
  else { ent.vy = 0; }
  ent.x = clamp(ent.x, 1.0, MAP_W - 2.0);
  ent.y = clamp(ent.y, 1.0, MAP_H - 2.0);
}
function collides(x, y, rad) {
  // check the 4 tile corners around the point
  for (let oy = -1; oy <= 1; oy++) {
    for (let ox = -1; ox <= 1; ox++) {
      const tx = Math.floor(x + ox * rad);
      const ty = Math.floor(y + oy * rad);
      const t = tileAt(tx, ty);
      if (t && t.terrain === T_OBST) {
        // AABB overlap of point-circle vs tile cell
        const cx = clamp(x, tx, tx + 1);
        const cy = clamp(y, ty, ty + 1);
        if (dist2(x, y, cx, cy) < rad * rad) return true;
      }
    }
  }
  return false;
}

function updatePlayer(dt) {
  if (player.dead) {
    player.respawn -= dt;
    if (player.respawn <= 0) {
      player.dead = false; player.hp = player.maxHp || PLAYER_MAX_HP; player.ink = INK_MAX;
      player.x = PLAYER_SPAWN.x; player.y = PLAYER_SPAWN.y; player.iframe = PLAYER_IFRAMES * 1.5;
      paintTiles(player.x, player.y, 2.0, player.faction, player.color);
      respawnFX(player, player.color);   // pop back in
    }
    return;
  }

  // --- gather movement input ---
  let ix = 0, iy = 0;
  if (keys["w"] || keys["arrowup"])   iy -= 1;
  if (keys["s"] || keys["arrowdown"]) iy += 1;
  if (keys["a"] || keys["arrowleft"]) ix -= 1;
  if (keys["d"] || keys["arrowright"])ix += 1;
  if (moveStick.active) { ix += moveStick.dx; iy += moveStick.dy; }
  // screen-axis input -> world axis (rotate into iso grid space)
  // Moving "up" on screen should move toward -x,-y in world. Convert:
  let wx = (ix + iy);
  let wy = (iy - ix);
  const il = Math.hypot(wx, wy);
  if (il > 0.001) { wx /= il; wy /= il; }
  // apply input magnitude (joystick analog)
  const inMag = Math.min(1, Math.hypot(ix, iy));

  const tHere = tileAt(Math.floor(player.x), Math.floor(player.y));
  const teamHere = tHere ? tHere.team : -1;

  // --- dive logic ---
  const wantDive = keys["shift"] || btnDive.pressed;
  const onOwnInk = teamHere === player.faction;
  if (wantDive && onOwnInk) player.diving = true;
  if (!wantDive || !onOwnInk) player.diving = false;
  if (player.diving && !player.wasDiving) sfx("dive");
  player.wasDiving = player.diving;

  player.speed = speedForTile(player, teamHere, player.diving);
  if (player.speedBoost > 0) player.speed *= 1.4;   // SPEED power-up
  const sp = player.speed * inMag;
  player.vx = wx * sp; player.vy = wy * sp;
  if (il > 0.001) {
    moveEntity(player, player.vx, player.vy, dt);
    player.walkPhase += dt * 10;
    // facing for sprite flip based on world dx mapped to screen
    const scr = worldToScreen(wx, wy);
    player.facing = scr.x >= 0 ? 1 : -1;
  }

  // --- aim ---
  if (isTouch && !usingMouse) {
    // FIRE pad controls the aim: drag it to point that way; a plain tap auto-aims
    // the nearest rival; otherwise aim where you're moving.
    let aimed = false;
    const dragMag = Math.abs(btnShoot.dx) + Math.abs(btnShoot.dy);
    if (btnShoot.pressed && dragMag > 0.3) {
      const w = screenToWorld(btnShoot.dx, btnShoot.dy);     // screen drag -> world dir
      player.aim = Math.atan2(w.y, w.x); aimed = true;
    } else if (btnShoot.pressed && !player.diving) {
      let best = null, bd = 8;
      for (const e of enemies) { if (e.dead) continue; const d = dist(player.x, player.y, e.x, e.y); if (d < bd) { bd = d; best = e; } }
      if (best) { player.aim = Math.atan2(best.y - player.y, best.x - player.x); aimed = true; }
    }
    if (!aimed && il > 0.001) player.aim = Math.atan2(wy, wx);
    const scr = worldToScreen(Math.cos(player.aim), Math.sin(player.aim));
    player.facing = scr.x >= 0 ? 1 : -1;
  } else {
    // mouse aim — measure from the shark's on-screen BODY (a bit above its feet)
    // so the cursor lines up with where you actually see the character. The
    // screen->world delta is then the world aim direction (shake-free origin).
    const sc = worldToScreen(player.x, player.y);
    const psx = sc.x - camera.x + VIEW_W / 2;
    const psy = sc.y - camera.y + VIEW_H / 2 - 14;   // 14px up = body height
    const w = screenToWorld(mouseScreenX - psx, mouseScreenY - psy);
    if (Math.abs(w.x) + Math.abs(w.y) > 0.0001) player.aim = Math.atan2(w.y, w.x);
    const scr = worldToScreen(Math.cos(player.aim), Math.sin(player.aim));
    player.facing = scr.x >= 0 ? 1 : -1;
  }

  // --- shooting (uses the selected weapon's stats) ---
  const wpn = player.weapon || WEAPONS[0];
  player.shootCd -= dt;
  const wantShoot = (mouseDown || keys[" "] || btnShoot.pressed);
  if (wantShoot && !player.diving && player.shootCd <= 0 && player.ink >= wpn.cost) {
    player.shootCd = wpn.cd;
    player.ink -= wpn.cost;
    player.special = Math.min(100, player.special + 1.3); // build SPECIAL meter
    player.squash = -0.5; // recoil stretch
    for (let i = 0; i < wpn.pellets; i++) {
      const spreadOff = wpn.pellets > 1 ? (i - (wpn.pellets - 1) / 2) * wpn.spread : 0;
      const ang = player.aim + spreadOff + rand(-wpn.spread, wpn.spread) * (wpn.pellets > 1 ? 0.3 : 1);
      const dx = Math.cos(ang), dy = Math.sin(ang);
      const pr = spawnProjectile(player.x + dx * 0.4, player.y + dy * 0.4, dx, dy, player.faction, player.color, player.dark, wpn.speed, wpn.range);
      pr.directDmg = wpn.dmg; pr.splashDmg = wpn.splashDmg; pr.splashR = wpn.splashR; pr.r = wpn.big ? 0.42 : 0.28;
    }
    const fa = player.aim;
    addFlash(player.x + Math.cos(fa) * 0.45, player.y + Math.sin(fa) * 0.45, fa, player.color);
    sfx("shoot");
  }

  // ulti flash decay
  if (player.ultiFlash > 0) player.ultiFlash -= dt;

  // --- ink recharge ---
  rechargeInk(player, teamHere === player.faction, teamHere, dt);

  // --- enemy-ink damage over time ---
  if (teamHere >= 0 && teamHere !== player.faction && !player.diving) {
    damagePlayer(dt * 4, true);
  }

  // timers
  if (player.iframe > 0) player.iframe -= dt;
  if (player.speedBoost > 0) player.speedBoost -= dt;
  if (player.shield > 0) player.shield -= dt;
  if (player.popIn > 0) player.popIn -= dt;
  player.squash = lerp(player.squash, 0, dt * 10);
}

// (MP host) Drive a remote human faction's shark from its latest net input,
// instead of the AI. Mirrors updatePlayer's movement/aim/shoot/dive/recharge but
// reads e.netInput = { ix, iy, aim, fire, dive, ulti } and avoids camera/mouse.
function driveHumanShark(e, dt) {
  if (e.dead) {
    e.respawn -= dt;
    if (e.respawn <= 0) {
      e.dead = false; e.hp = e.maxHp || PLAYER_MAX_HP; e.ink = INK_MAX;
      e.x = e.spawn[0]; e.y = e.spawn[1]; e.iframe = PLAYER_IFRAMES * 1.5;
      paintTiles(e.x, e.y, 2.0, e.faction, e.color);
      respawnFX(e, e.color);
    }
    return;
  }
  const inp = e.netInput || { ix: 0, iy: 0, aim: e.aim, fire: false, dive: false, ulti: false };

  // movement (screen-axis input -> world axis, same transform as the player)
  let ix = inp.ix || 0, iy = inp.iy || 0;
  let wx = (ix + iy), wy = (iy - ix);
  const il = Math.hypot(wx, wy);
  if (il > 0.001) { wx /= il; wy /= il; }
  const inMag = Math.min(1, Math.hypot(ix, iy));

  const tHere = tileAt(Math.floor(e.x), Math.floor(e.y));
  const teamHere = tHere ? tHere.team : -1;
  const onOwnInk = teamHere === e.faction;

  // dive
  const wantDive = !!inp.dive;
  if (wantDive && onOwnInk) e.diving = true;
  if (!wantDive || !onOwnInk) e.diving = false;

  e.speed = speedForTile(e, teamHere, e.diving);
  if (e.speedBoost > 0) e.speed *= 1.4;
  const sp = e.speed * inMag;
  e.vx = wx * sp; e.vy = wy * sp;
  if (il > 0.001) {
    moveEntity(e, e.vx, e.vy, dt);
    e.walkPhase += dt * 10;
  }

  // aim comes resolved from the client
  if (typeof inp.aim === "number") e.aim = inp.aim;
  const scr = worldToScreen(Math.cos(e.aim), Math.sin(e.aim));
  e.facing = scr.x >= 0 ? 1 : -1;

  // shooting (selected weapon)
  const wpn = e.weapon || WEAPONS[0];
  e.shootCd -= dt;
  if (inp.fire && !e.diving && e.shootCd <= 0 && e.ink >= wpn.cost) {
    e.shootCd = wpn.cd;
    e.ink -= wpn.cost;
    e.special = Math.min(100, e.special + 1.3);
    e.squash = -0.5;
    for (let i = 0; i < wpn.pellets; i++) {
      const spreadOff = wpn.pellets > 1 ? (i - (wpn.pellets - 1) / 2) * wpn.spread : 0;
      const ang = e.aim + spreadOff + rand(-wpn.spread, wpn.spread) * (wpn.pellets > 1 ? 0.3 : 1);
      const dx = Math.cos(ang), dy = Math.sin(ang);
      const pr = spawnProjectile(e.x + dx * 0.4, e.y + dy * 0.4, dx, dy, e.faction, e.color, e.dark, wpn.speed, wpn.range);
      pr.directDmg = wpn.dmg; pr.splashDmg = wpn.splashDmg; pr.splashR = wpn.splashR; pr.r = wpn.big ? 0.42 : 0.28;
    }
    addFlash(e.x + Math.cos(e.aim) * 0.45, e.y + Math.sin(e.aim) * 0.45, e.aim, e.color);
    if (dist(e.x, e.y, player.x, player.y) < 11) sfx("shoot");
  }

  if (inp.ulti) doUlti(e);
  if (e.ultiFlash > 0) e.ultiFlash -= dt;

  rechargeInk(e, onOwnInk, teamHere, dt);
  // standing on rival ink chips HP (no hit-flash spam — direct, like the player)
  if (teamHere >= 0 && teamHere !== e.faction && !e.diving && e.shield <= 0) {
    e.hp -= dt * 4;
    if (e.hp <= 0 && !e.dead) {
      e.hp = 0; e.dead = true; e.respawn = RESPAWN_DELAY; e.diving = false;
      deathBurst(e.x, e.y, e.color); sfx("splat");
    }
  }

  if (e.iframe > 0) e.iframe -= dt;
  if (e.speedBoost > 0) e.speedBoost -= dt;
  if (e.shield > 0) e.shield -= dt;
  if (e.popIn > 0) e.popIn -= dt;
  e.squash = lerp(e.squash, 0, dt * 10);
}

function rechargeInk(ent, onOwn, tileTeam, dt) {
  if (onOwn) ent.ink += (ent.diving ? 60 : 22) * dt;
  else if (tileTeam === -1) ent.ink += 5 * dt;   // neutral ground: slow trickle
  // enemy ink: no recharge
  ent.ink = clamp(ent.ink, 0, INK_MAX);
}

// Big juicy splat when a shark is taken out — ink explosion + shockwave rings +
// spray, arcing droplets, white pop sparks, and rising bubbles.
function deathBurst(x, y, color) {
  addImpact(x, y, "#ffffff", true, color);   // white shockwave ring
  addImpact(x, y, color, true, color);       // ink shockwave ring
  for (let i = 0; i < 30; i++) {             // radial ink spray
    const a = (i / 30) * TAU + rand(-0.15, 0.15), sp = rand(2.5, 7.5);
    spawnParticle(x, y, Math.cos(a) * sp, Math.sin(a) * sp, color, rand(0.5, 1.1), rand(1.5, 3.5));
  }
  for (let i = 0; i < 10; i++)               // arcing droplets that fall back down
    spawnParticle(x, y, rand(-3, 3), rand(-3, 3), shade(color, 0.15), rand(0.5, 1.0), rand(2, 3.5), 1.6);
  for (let i = 0; i < 8; i++)                // white pop sparks
    spawnParticle(x, y, rand(-5, 5), rand(-5, 5), "#eaffff", rand(0.22, 0.5), rand(1, 2));
  for (let i = 0; i < 6; i++)                // rising bubbles
    spawnParticle(x + rand(-0.5, 0.5), y, rand(-0.6, 0.6), rand(-0.4, 0.4), "#bfe9ff", rand(0.6, 1.1), rand(1, 2), 0.05);
  game.shake = Math.min(13, game.shake + 9);
  // (MP host) replicate the splat burst to clients
  if (net.role === "host") netEvents.push({ k: 2, x: +x.toFixed(2), y: +y.toFixed(2), c: color });
}

// Cheerful "pop back in" when a shark respawns — halo rings + sparkle puff + a
// squash-stretch scale pop (ent.popIn drives the sprite scale in drawShark).
function respawnFX(ent, color) {
  addAura(ent.x, ent.y, color);
  addAura(ent.x, ent.y, "#eaffff");
  for (let i = 0; i < 16; i++) {
    const a = rand(0, TAU);
    spawnParticle(ent.x, ent.y, Math.cos(a) * rand(1, 3), Math.sin(a) * rand(1, 3) - 0.6, color, rand(0.4, 0.8), rand(1.5, 3), 0.2);
  }
  ent.popIn = 0.45;
}

function damagePlayer(amount, fromInk) {
  if (player.dead) return;
  if (player.shield > 0) {                 // SHIELD power-up absorbs all damage
    if (!fromInk) { spawnFloater(player.x, player.y - 1, "BLOCKED", "#ffd23d"); }
    return;
  }
  if (!fromInk && player.iframe > 0) return;
  player.hp -= amount;
  if (!fromInk) {
    player.iframe = PLAYER_IFRAMES;
    game.shake = Math.min(8, game.shake + 4);
    game.flash = 0.4;
    spawnFloater(player.x, player.y - 1, "-" + Math.round(amount), "#ff5b5b");
    sfx("hurt");
  }
  if (player.hp <= 0 && !player.dead) {
    player.hp = 0; player.dead = true; player.respawn = RESPAWN_DELAY; player.diving = false;
    deathBurst(player.x, player.y, player.color);
    game.flash = 0.55;            // red wipeout flash
    sfx("splat");
  }
}

/* SPECIAL / ULTI — "INK STORM": when the meter is full, blast a huge ring of
   ink around the shark, damage nearby rivals, and refill the ink tank. Works for
   any faction's shark so the host can resolve a remote human's ulti too. */
function doUlti(sh) {
  if (sh.dead || sh.diving || sh.special < 100) return;
  sh.special = 0;
  sh.ink = INK_MAX;
  sh.ultiFlash = 0.4;
  sh.iframe = Math.max(sh.iframe, 0.5); // brief safety on cast
  if (dist(sh.x, sh.y, player.x, player.y) < 16) game.shake = Math.min(14, game.shake + 11);
  // big paint burst in expanding rings
  for (let r = 1.4; r <= 5.0; r += 0.7) paintTiles(sh.x, sh.y, r, sh.faction, sh.color);
  // damage + knock rival-faction sharks in range
  for (const o of sharks)
    if (o !== sh && !o.dead && o.faction !== sh.faction && dist(sh.x, sh.y, o.x, o.y) < 5.0)
      damageShark(o, 45, sh.faction);
  startInkStorm(sh.x, sh.y, sh.color);
  spawnFloater(sh.x, sh.y - 1.8, "INK STORM!", sh.color);
  sfx("ulti");
}
function tryUlti() {
  if (game.state !== "PLAYING" || player.dead || player.diving || player.special < 100) return;
  // client: queue the ulti to send to the host (host runs the authoritative cast)
  if (net.role === "client") { net.ultiPending = true; return; }
  doUlti(player);
}

/* INK STORM — an animated swirling vortex with expanding shockwave rings, a
   spiralling ink cyclone and a glowing core, instead of a flat screen flash. */
let inkStorm = null;
function startInkStorm(x, y, color) {
  color = color || PLAYER_COLOR;
  inkStorm = { x, y, t: 0.85, max: 0.85, color };
  // initial outward burst + a rising ink geyser
  for (let i = 0; i < 46; i++) {
    const a = (i / 46) * TAU, sp = rand(3, 8.5);
    spawnParticle(x, y, Math.cos(a) * sp, Math.sin(a) * sp, i % 4 === 0 ? "#eaffff" : color, rand(0.5, 1.0), rand(2, 4), 0.3);
  }
  for (let i = 0; i < 14; i++)
    spawnParticle(x + rand(-0.6, 0.6), y, rand(-1, 1), rand(-2, -0.6), color, rand(0.6, 1.1), rand(2, 3.5), 0.45);
}
function updateInkStorm(dt) {
  if (!inkStorm) return;
  inkStorm.t -= dt;
  if (inkStorm.t <= 0) { inkStorm = null; return; }
  const age = 1 - inkStorm.t / inkStorm.max;
  // continuous cyclone: a few tangential (swirling) particles per frame
  for (let i = 0; i < 4; i++) {
    const a = age * TAU * 3 + i * 1.7 + rand(-0.2, 0.2);
    const rad = 0.5 + age * 4.6;
    const px = inkStorm.x + Math.cos(a) * rad, py = inkStorm.y + Math.sin(a) * rad;
    const tx = -Math.sin(a), ty = Math.cos(a);     // tangential = swirl
    spawnParticle(px, py, tx * 3.4 + Math.cos(a) * 1.4, ty * 3.4 + Math.sin(a) * 1.4,
      i === 0 ? "#eaffff" : inkStorm.color, rand(0.3, 0.6), rand(1.5, 3), 0.2);
  }
}
function drawInkStorm() {
  if (!inkStorm) return;
  const s = project(inkStorm.x, inkStorm.y);
  const age = 1 - inkStorm.t / inkStorm.max;       // 0..1
  const alpha = inkStorm.t / inkStorm.max;         // fade out
  const maxR = Math.min(VIEW_W, VIEW_H) * 0.42;
  ctx.save();
  // staggered expanding shockwave rings
  for (let k = 0; k < 3; k++) {
    const rt = clamp(age * 1.3 - k * 0.22, 0, 1);
    if (rt <= 0 || rt >= 1) continue;
    const rad = rt * maxR;
    ctx.globalAlpha = (1 - rt) * 0.55 * alpha;
    ctx.strokeStyle = (k % 2) ? "#eaffff" : inkStorm.color;
    ctx.lineWidth = (3 - rt * 2) * UI;
    ctx.beginPath(); ctx.ellipse(s.x, s.y, rad, rad * 0.5, 0, 0, TAU); ctx.stroke();
  }
  // glowing vortex core
  const coreR = (26 + Math.sin(age * 30) * 5) * UI * (0.7 + 0.5 * (1 - age));
  const grd = ctx.createRadialGradient(s.x, s.y - 6, 0, s.x, s.y - 6, coreR);
  grd.addColorStop(0, "rgba(220,255,255," + (0.55 * alpha) + ")");
  grd.addColorStop(0.5, "rgba(44,202,218," + (0.32 * alpha) + ")");
  grd.addColorStop(1, "rgba(44,202,218,0)");
  ctx.globalAlpha = 1; ctx.fillStyle = grd;
  ctx.fillRect(s.x - coreR, s.y - 6 - coreR, coreR * 2, coreR * 2);
  ctx.restore();
}

/* ============================================================
   10. ENEMY AI
   ============================================================ */
function updateEnemy(e, dt) {
  if (e.dead) {
    e.respawn -= dt;
    if (e.respawn <= 0) {
      e.dead = false; e.hp = e.maxHp || ENEMY_MAX_HP; e.ink = INK_MAX;
      e.x = e.spawn[0]; e.y = e.spawn[1]; e.iframe = 1.0;
      paintTiles(e.x, e.y, 2.0, e.faction, e.color);
      respawnFX(e, e.color);   // pop back in
    }
    return;
  }
  e.stateTimer -= dt;
  if (e.popIn > 0) e.popIn -= dt;
  e.shootCd -= dt;
  if (e.iframe > 0) e.iframe -= dt;
  if (e.speedBoost > 0) e.speedBoost -= dt;
  if (e.shield > 0) e.shield -= dt;

  const tHere = tileAt(Math.floor(e.x), Math.floor(e.y));
  const teamHere = tHere ? tHere.team : -1;
  const onOwn = teamHere === e.faction;

  const dToPlayer = (player.dead) ? 999 : dist(e.x, e.y, player.x, player.y);
  // player diving reduces detection radius
  const detect = player.diving ? 3.5 : 7.0;

  // --- choose state ---
  if (e.stateTimer <= 0) {
    if (e.ink < 25) e.state = "RECHARGE";
    else if (dToPlayer < detect) e.state = "CHASE";
    else e.state = "PAINT";
    e.stateTimer = rand(1.2, 2.8);

    if (e.state === "PAINT") {
      // grab a nearby power-up if one is close, otherwise wander to paint
      let best = null, bestD = 7;
      for (const p of pickups) {
        if (!p.active) continue;
        const d = dist(e.x, e.y, p.x, p.y);
        if (d < bestD) { bestD = d; best = p; }
      }
      if (best) { e.targetX = best.x; e.targetY = best.y; }
      else {
        e.targetX = clamp(e.x + rand(-6, 6), 2, MAP_W - 3);
        e.targetY = clamp(e.y + rand(-6, 6), 2, MAP_H - 3);
      }
    } else if (e.state === "RECHARGE") {
      // head toward nearest own-ink-ish: just hold near current or wander to own puddle
      e.targetX = e.spawn[0]; e.targetY = e.spawn[1];
    }
  }

  // chase: hold a shooting STANDOFF distance and circle the player instead of
  // gluing onto them. Aiming for a point on a ring around the player makes the
  // rival approach when far, back off when too close, and strafe while in range.
  if (e.state === "CHASE" && !player.dead) {
    e.aim = Math.atan2(player.y - e.y, player.x - e.x);
    const STANDOFF = 4.2;
    const dd = dToPlayer || 1;
    const ux = (e.x - player.x) / dd, uy = (e.y - player.y) / dd;   // player -> enemy dir
    const perpx = -uy, perpy = ux;                                  // sideways
    const swirl = Math.sin(bgT * 1.1 + e.id * 2.1) * 2.6;          // gentle orbit
    e.targetX = clamp(player.x + ux * STANDOFF + perpx * swirl, 1.5, MAP_W - 2.5);
    e.targetY = clamp(player.y + uy * STANDOFF + perpy * swirl, 1.5, MAP_H - 2.5);
  }

  // --- dive when recharging on own ink ---
  e.diving = (e.state === "RECHARGE" && onOwn && e.ink < INK_MAX - 5);

  // --- A* path planning toward the target tile (throttled per agent) ---
  e.pathCd -= dt;
  const gx = clamp(Math.round(e.targetX), 1, MAP_W - 2);
  const gy = clamp(Math.round(e.targetY), 1, MAP_H - 2);
  if (e.pathCd <= 0 || e.pgx !== gx || e.pgy !== gy) {
    e.pathCd = 0.4 + Math.random() * 0.3;
    e.pgx = gx; e.pgy = gy;
    // snap an unwalkable goal to the nearest open tile
    let ggx = gx, ggy = gy;
    if (!isWalkable(ggx, ggy)) {
      search: for (let r = 1; r <= 3; r++)
        for (let oy = -r; oy <= r; oy++)
          for (let ox = -r; ox <= r; ox++)
            if (isWalkable(gx + ox, gy + oy)) { ggx = gx + ox; ggy = gy + oy; break search; }
    }
    e.path = aStar(Math.floor(e.x), Math.floor(e.y), ggx, ggy);
    e.pathIdx = 0;
  }

  // --- steering: follow the path's next waypoint, else head straight ---
  let tx = e.targetX, ty = e.targetY;
  if (e.path && e.path.length) {
    while (e.pathIdx < e.path.length &&
           dist(e.x, e.y, e.path[e.pathIdx].x + 0.5, e.path[e.pathIdx].y + 0.5) < 0.45) e.pathIdx++;
    if (e.pathIdx < e.path.length) { tx = e.path[e.pathIdx].x + 0.5; ty = e.path[e.pathIdx].y + 0.5; }
  }
  let dx = tx - e.x, dy = ty - e.y;
  const d = Math.hypot(e.targetX - e.x, e.targetY - e.y) || 1; // distance to FINAL goal
  const dl = Math.hypot(dx, dy) || 1;
  dx /= dl; dy /= dl;
  // micro-avoidance safety: if the immediate step is blocked, sidestep
  if (collides(e.x + dx * 0.7, e.y + dy * 0.7, 0.34)) {
    const tmp = dx; dx = -dy; dy = tmp; // rotate 90°
  }

  let spd = speedForTile(e, teamHere, e.diving);
  if (e.speedBoost > 0) spd *= 1.4;                 // SPEED power-up
  if (e.state === "RECHARGE" && onOwn) spd *= 0.4; // sit and recharge
  if (d > 0.25) {
    e.vx = dx * spd; e.vy = dy * spd;
    moveEntity(e, e.vx, e.vy, dt);
    e.walkPhase += dt * 8;
    if (e.state !== "CHASE") e.aim = Math.atan2(dy, dx);
  }
  const scr = worldToScreen(dx, dy);
  e.facing = scr.x >= 0 ? 1 : -1;

  // --- shooting ---
  const canSeePlayer = e.state === "CHASE" && dToPlayer < 9 && !player.dead && !player.diving;
  if (!e.diving && e.shootCd <= 0 && e.ink >= SHOT_COST) {
    let shoot = false;
    let ang = e.aim;
    if (canSeePlayer) {
      // lead aim slightly
      ang = Math.atan2(player.y - e.y, player.x - e.x) + rand(-0.12, 0.12);
      shoot = true; e.shootCd = rand(0.45, 0.9);
    } else if (e.state === "PAINT" && Math.random() < 0.5) {
      ang = e.aim + rand(-0.2, 0.2);
      shoot = true; e.shootCd = rand(0.5, 1.1);
    }
    if (shoot) {
      e.ink -= SHOT_COST;
      e.squash = -0.4;
      const cx = Math.cos(ang), cy = Math.sin(ang);
      spawnProjectile(e.x + cx*0.4, e.y + cy*0.4, cx, cy, e.faction, e.color, e.dark, 9.5, 6);
      addFlash(e.x + cx*0.45, e.y + cy*0.45, ang, e.color); // muzzle VFX
      if (dist(e.x, e.y, player.x, player.y) < 11) sfx("eshoot"); // only audible if near
    }
  }

  rechargeInk(e, onOwn, teamHere, dt);
  e.squash = lerp(e.squash, 0, dt * 10);
}

// Keep sharks from stacking: softly push overlapping entities apart (only into
// non-obstacle space) so enemies spread out instead of clumping on one target.
function resolveSeparation() {
  const MIN = 0.72;
  for (let i = 0; i < enemies.length; i++) {
    const a = enemies[i]; if (a.dead) continue;
    for (let j = i + 1; j < enemies.length; j++) {
      const b = enemies[j]; if (b.dead) continue;
      let dx = b.x - a.x, dy = b.y - a.y;
      let d = Math.hypot(dx, dy);
      if (d > 0.0001 && d < MIN) {
        dx /= d; dy /= d;
        const push = (MIN - d) * 0.5;
        const ax = a.x - dx * push, ay = a.y - dy * push;
        const bx = b.x + dx * push, by = b.y + dy * push;
        if (!collides(ax, ay, 0.3)) { a.x = ax; a.y = ay; }
        if (!collides(bx, by, 0.3)) { b.x = bx; b.y = by; }
      }
    }
    // and don't let an enemy stand on top of the player
    if (!player.dead) {
      let dx = a.x - player.x, dy = a.y - player.y, d = Math.hypot(dx, dy);
      if (d > 0.0001 && d < MIN) {
        dx /= d; dy /= d; const push = (MIN - d);
        const ax = a.x + dx * push, ay = a.y + dy * push;
        if (!collides(ax, ay, 0.3)) { a.x = ax; a.y = ay; }
      }
    }
  }
}

/* ============================================================
   11. PROJECTILE LOGIC
   ============================================================ */
function updateProjectiles(dt) {
  for (const p of projectiles) {
    if (!p.alive) continue;
    const step = p.speed * dt;
    p.x += p.dx * step; p.y += p.dy * step;
    p.travelled += step;
    p.spin += dt * 12;
    // trail droplets
    if (Math.random() < 0.5)
      spawnParticle(p.x, p.y, rand(-0.5,0.5), rand(-0.5,0.5), p.color, 0.25, 1, 0.1);

    let hit = false;
    // out of range
    if (p.travelled >= p.range) hit = true;
    // obstacle / wall
    const t = tileAt(Math.floor(p.x), Math.floor(p.y));
    if (!t || t.terrain === T_OBST) hit = true;
    // entity hits — any shark of a different faction (no friendly fire)
    if (!hit) {
      for (const sh of sharks) {
        if (sh.faction === p.faction || sh.dead || sh.iframe > 0) continue;
        const rr = (sh === player ? 0.34 : 0.32);
        if (dist2(p.x, p.y, sh.x, sh.y) < rr * rr + p.r * p.r) {
          damageShark(sh, p.directDmg, p.faction); hit = true; break;
        }
      }
    }
    if (hit) {
      p.alive = false;
      onSplash(p.x, p.y, p.faction, p.color, p.dark, p.splashR, p.splashDmg);
    }
  }
}

// route damage to the right per-shark handler
function damageShark(sh, amount, byFaction) {
  if (sh === player) damagePlayer(amount, false);
  else damageEnemy(sh, amount, byFaction);
}

function damageEnemy(e, amount, byFaction) {
  if (e.dead) return;
  if (byFaction == null) byFaction = 0;
  if (e.shield > 0) { spawnFloater(e.x, e.y - 1, "BLOCK", "#ffd23d"); return; }
  e.hp -= amount;
  e.iframe = 0.15;
  spawnFloater(e.x, e.y - 1, "-" + amount, "#fff");
  for (let i = 0; i < 6; i++)
    spawnParticle(e.x, e.y, rand(-3,3), rand(-3,3), e.color, rand(0.3,0.6), rand(1,2.5));
  sfx("hit");
  if (e.hp <= 0) {
    e.dead = true; e.respawn = RESPAWN_DELAY; e.diving = false;
    const killer = sharks.find(s => s.faction === byFaction);
    if (killer) { killer.score = (killer.score || 0) + 100; killer.kills = (killer.kills || 0) + 1; killer.special = Math.min(100, (killer.special || 0) + 22); }
    const kc = FACTION_COLORS[byFaction] ? FACTION_COLORS[byFaction].ink : PLAYER_COLOR;
    spawnFloater(e.x, e.y - 1.5, "SPLATTED!", kc);
    deathBurst(e.x, e.y, e.color);
    paintTiles(e.x, e.y, 2.5, byFaction, kc);   // bonus paint where they died
    sfx("splat");
  }
}

/* ============================================================
   12. INK SPLASH / PAINTING
   ============================================================ */
function onSplash(x, y, faction, color, dark, splashR, splashDmg) {
  splashR = splashR || SPLASH_RADIUS;
  splashDmg = splashDmg == null ? 12 : splashDmg;
  paintTiles(x, y, splashR, faction, color);
  // damage every rival-faction shark inside the splash radius
  let didHit = false;
  for (const sh of sharks) {
    if (sh.faction === faction || sh.dead || sh.iframe > 0) continue;
    if (dist(x, y, sh.x, sh.y) < splashR * 0.6) { damageShark(sh, splashDmg, faction); didHit = true; }
  }
  splashFX(x, y, color, splashR, didHit);
  // (MP host) tell clients a splash happened here so they replay the same VFX
  if (net.role === "host") netEvents.push({ k: 1, x: +x.toFixed(2), y: +y.toFixed(2), c: color, r: +splashR.toFixed(2), h: didHit ? 1 : 0 });
}

// VFX-only part of a splash (no paint / no damage) — shared by the host sim and
// the client event replay so a bullet impact looks identical on every screen.
function splashFX(x, y, color, splashR, didHit) {
  const big = splashR >= 2.8;
  // ink splat decal + expanding ring on the floor (bigger/brighter on a hit)
  addImpact(x, y, didHit ? "#ffffff" : color, didHit || big, color);
  // radial splash particles
  const n = didHit ? 14 : 9;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + rand(-0.3, 0.3);
    spawnParticle(x, y, Math.cos(a)*rand(1,4), Math.sin(a)*rand(1,4), color, rand(0.3,0.7), rand(1.5,3));
  }
  // arcing ink droplets that lob up and fall back to the floor
  for (let i = 0; i < (didHit ? 7 : 4); i++)
    spawnParticle(x, y, rand(-2, 2), rand(-2, 2), shade(color, 0.15), rand(0.45, 0.8), rand(1.5, 2.6), 1.4);
  // tiny screen shake from impact (very gentle, only when close)
  const near = dist(x, y, player.x, player.y);
  if (near < 6) game.shake = Math.min(3, game.shake + (didHit ? 2 : 1));
}

/* ink-splat decals — a central blob + flung satellite droplets + a ring */
const impacts = [];
function addImpact(x, y, color, big, inkColor) {
  const pts = []; const n = big ? 6 : 4;
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), rr = rand(0.4, 1.0) * (big ? 1.5 : 1);
    pts.push({ dx: Math.cos(a) * rr, dy: Math.sin(a) * rr, r: rand(1.5, 3.5) * (big ? 1.2 : 1) });
  }
  impacts.push({ x, y, life: 0.5, max: 0.5, color, ink: inkColor || color, big: !!big, pts });
}
function updateImpacts(dt) {
  for (let i = impacts.length - 1; i >= 0; i--) { impacts[i].life -= dt; if (impacts[i].life <= 0) impacts.splice(i, 1); }
}
function drawImpacts() {
  for (const im of impacts) {
    const t = 1 - im.life / im.max;        // 0..1 expansion
    const r = project(im.x, im.y);
    const a = 1 - t;
    // central ink blob
    ctx.globalAlpha = a * 0.7; ctx.fillStyle = im.ink;
    const R = (im.big ? 10 : 7) * (0.6 + t * 0.7);
    ctx.beginPath(); ctx.ellipse(r.x, r.y, R, R * 0.5, 0, 0, TAU); ctx.fill();
    // satellite droplets flung outward across the floor
    for (const p of im.pts) {
      const sx = r.x + p.dx * (TILE_W / 2) * (0.4 + t * 1.1);
      const sy = r.y + p.dy * (TILE_H / 2) * (0.4 + t * 1.1);
      const pr = p.r * (1 - t * 0.6);
      if (pr > 0.4) { ctx.beginPath(); ctx.ellipse(sx, sy, pr, pr * 0.5, 0, 0, TAU); ctx.fill(); }
    }
    // expanding rim ring
    ctx.globalAlpha = a * 0.6; ctx.strokeStyle = shade(im.color, 0.4); ctx.lineWidth = im.big ? 2 : 1;
    ctx.beginPath(); ctx.ellipse(r.x, r.y, (im.big ? 28 : 16) * t, (im.big ? 14 : 8) * t, 0, 0, TAU); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

/* muzzle flashes — a brief bright burst + spike at the gun barrel when firing */
const flashes = [];
function addFlash(x, y, ang, color) {
  const d = worldToScreen(Math.cos(ang), Math.sin(ang));
  const dl = Math.hypot(d.x, d.y) || 1;
  flashes.push({ x, y, dx: d.x / dl, dy: d.y / dl, life: 0.1, max: 0.1, color });
  // a few bright sparks in the firing direction
  for (let i = 0; i < 5; i++) {
    const a = ang + rand(-0.45, 0.45);
    spawnParticle(x, y, Math.cos(a) * rand(2, 5), Math.sin(a) * rand(2, 5), i < 2 ? "#ffffff" : color, rand(0.12, 0.28), rand(1, 2.2), 0.1);
  }
}
function updateFlashes(dt) {
  for (let i = flashes.length - 1; i >= 0; i--) { flashes[i].life -= dt; if (flashes[i].life <= 0) flashes.splice(i, 1); }
}
function drawFlashes() {
  for (const fl of flashes) {
    const s = project(fl.x, fl.y);
    const t = clamp(fl.life / fl.max, 0, 1);
    ctx.globalAlpha = t;
    ctx.fillStyle = shade(fl.color, 0.5);
    ctx.beginPath(); ctx.arc(s.x, s.y, 7 * t + 2, 0, TAU); ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(s.x, s.y, 3.5 * t + 1, 0, TAU); ctx.fill();
    ctx.strokeStyle = fl.color; ctx.lineWidth = 2;
    const len = 12 * t + 4;
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x + fl.dx * len, s.y + fl.dy * len); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

/* rising halo rings — a positive "glow" used for power-ups and respawns */
const auras = [];
function addAura(x, y, color) { auras.push({ x, y, color, life: 0.55, max: 0.55 }); }
function updateAuras(dt) { for (let i = auras.length - 1; i >= 0; i--) { auras[i].life -= dt; if (auras[i].life <= 0) auras.splice(i, 1); } }
function drawAuras() {
  for (const a of auras) {
    const t = 1 - a.life / a.max;             // 0..1
    const s = project(a.x, a.y);
    const cyo = s.y - 6 - t * 18;             // ring rises as it grows
    const rad = 6 + t * 22;
    ctx.globalAlpha = (1 - t) * 0.85;
    ctx.strokeStyle = a.color; ctx.lineWidth = 2.5 - t * 1.5;
    ctx.beginPath(); ctx.ellipse(s.x, cyo, rad, rad * 0.7, 0, 0, TAU); ctx.stroke();
    ctx.globalAlpha = (1 - t) * 0.5;
    ctx.beginPath(); ctx.ellipse(s.x, cyo, rad * 0.6, rad * 0.42, 0, 0, TAU); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

/* ============================================================
   12b. POWER-UPS (floating reef pickups)
   ============================================================ */
const PU_INK = 0, PU_SPEED = 1, PU_SHIELD = 2, PU_SPECIAL = 3;
const PU_INFO = [
  { key: "INK FULL",   col: "#19e6ff" },
  { key: "SPEED UP",   col: "#7cff4d" },
  { key: "SHIELD",     col: "#ffd23d" },
  { key: "ULTI READY", col: "#b56bff" },
];
const pickups = [];
let pickupTimer = 4;
const MAX_PICKUPS = 3;

function spawnPickup() {
  for (let tries = 0; tries < 30; tries++) {
    const x = randi(3, MAP_W - 3), y = randi(3, MAP_H - 3);
    if (!isWalkable(x, y)) continue;
    if (dist(x, y, PLAYER_SPAWN.x, PLAYER_SPAWN.y) < 3) continue;
    if (pickups.some(p => p.active && Math.floor(p.x) === x && Math.floor(p.y) === y)) continue;
    pickups.push({ active: true, x: x + 0.5, y: y + 0.5, type: randi(0, 4), bob: rand(0, TAU), life: 18 });
    return;
  }
}
function updatePickups(dt) {
  pickupTimer -= dt;
  const activeCount = pickups.reduce((n, p) => n + (p.active ? 1 : 0), 0);
  if (pickupTimer <= 0 && activeCount < MAX_PICKUPS) { spawnPickup(); pickupTimer = rand(5, 9); }
  for (const p of pickups) {
    if (!p.active) continue;
    p.bob += dt * 3; p.life -= dt;
    if (p.life <= 0) { p.active = false; continue; }
    // player grabs first, then any rival that walks over it
    if (!player.dead && dist(p.x, p.y, player.x, player.y) < 0.75) { collectPickup(p, player); continue; }
    for (const e of enemies) {
