  ctx.fillStyle = "#06202e"; rrect(r.x, r.y, r.w, r.h);
  ctx.fillStyle = value <= 0 ? "#3c5560" : PLAYER_COLOR; rrect(r.x, r.y, r.w * value, r.h);
  ctx.strokeStyle = "rgba(40,196,228,0.5)"; ctx.lineWidth = 1;
  ctx.strokeRect(Math.round(r.x) + 0.5, Math.round(r.y) + 0.5, Math.round(r.w), Math.round(r.h));
  // knob
  const kx = r.x + r.w * value, ky = r.y + r.h / 2, kr = r.h * 1.1;
  ctx.fillStyle = "#eaffff"; ctx.beginPath(); ctx.arc(kx, ky, kr, 0, TAU); ctx.fill();
  ctx.fillStyle = value <= 0 ? "#3c5560" : PLAYER_COLOR; ctx.beginPath(); ctx.arc(kx, ky, kr * 0.55, 0, TAU); ctx.fill();
  ctx.textAlign = "left";
}
// compact ON/OFF toggle row
function drawToggle(r, label, on, S) {
  ctx.textBaseline = "middle"; ctx.textAlign = "left";
  ctx.fillStyle = "#cfe9ff"; ctx.font = "bold " + Math.round(11 * S) + "px monospace";
  ctx.fillText(label, r.x, r.y + r.h / 2);
  const pw = 46 * S, ph = 20 * S, px = r.x + r.w - pw, py = r.y + (r.h - ph) / 2;
  ctx.fillStyle = on ? "#1f6e42" : "#3a4650"; rrect(px, py, pw, ph);
  const knob = ph - 4;
  ctx.fillStyle = on ? "#3dff8a" : "#9fb3bd"; rrect(on ? px + pw - knob - 2 : px + 2, py + 2, knob, knob);
  ctx.fillStyle = "#eaffff"; ctx.font = "bold " + Math.round(8 * S) + "px monospace"; ctx.textAlign = "center";
  ctx.fillText(on ? "ON" : "OFF", on ? px + (pw - knob) / 2 : px + pw - (pw - knob) / 2, py + ph / 2);
  ctx.textBaseline = "alphabetic"; ctx.textAlign = "left";
}
function drawSettings() {
  const S = ovScale(), cx = VIEW_W / 2, cy = VIEW_H / 2;
  const pw = Math.min(VIEW_W * 0.84, 380 * S), ph = Math.min(VIEW_H * 0.94, 340 * S);
  const py0 = cy - ph / 2;
  hudPanel(cx - pw / 2, py0, pw, ph);
  ctx.textAlign = "center"; ctx.fillStyle = PLAYER_COLOR; ctx.font = "bold " + Math.round(26 * S) + "px 'Trebuchet MS'";
  ctx.fillText("SETTINGS", cx, py0 + 34 * S);
  const rw = pw * 0.74, rx = cx - rw / 2; let ry = py0 + 66 * S;
  settingsUI.music = { x: rx, y: ry, w: rw, h: 11 * S }; drawSliderRow(settingsUI.music, "MUSIC", settings.musicVol, S); ry += 44 * S;
  settingsUI.sfx = { x: rx, y: ry, w: rw, h: 11 * S }; drawSliderRow(settingsUI.sfx, "SOUND FX", settings.sfxVol, S); ry += 30 * S;
  settingsUI.colorblind = { x: rx, y: ry, w: rw, h: 24 * S }; drawToggle(settingsUI.colorblind, "COLORBLIND", settings.colorblind, S); ry += 30 * S;
  settingsUI.perf = { x: rx, y: ry, w: rw, h: 24 * S }; drawToggle(settingsUI.perf, "PERFORMANCE", settings.perf, S);
  ctx.textAlign = "center"; ctx.fillStyle = "#6f93a6"; ctx.font = Math.round(7.5 * S) + "px monospace";
  ctx.fillText("Lighter visuals for low-end devices", cx, ry + 22 * S);
  settingsUI.back = { x: cx - 54 * S, y: py0 + ph - 38 * S, w: 108 * S, h: 28 * S };
  drawBtn(settingsUI.back, "BACK", "#7fb0c6", false, 12 * S);
  ctx.textAlign = "left";
}

/* ---------- HOW TO PLAY ---------- */
function drawHowTo() {
  const S = ovScale(), cx = VIEW_W / 2;
  const pw = Math.min(VIEW_W * 0.88, 480 * S), ph = Math.min(VIEW_H * 0.88, 380 * S);
  const x0 = cx - pw / 2, y0 = VIEW_H / 2 - ph / 2;
  hudPanel(x0, y0, pw, ph);
  ctx.textAlign = "center"; ctx.fillStyle = PLAYER_COLOR; ctx.font = "bold " + Math.round(24 * S) + "px 'Trebuchet MS'";
  ctx.fillText("HOW TO PLAY", cx, y0 + 34 * S);
  const rows = [
    ["PAINT", "Ink the reef — most coverage at 0:00 wins."],
    ["MOVE", isTouch ? "Left stick moves; aim follows you." : "WASD / arrows to move, mouse to aim."],
    ["FIRE", isTouch ? "FIRE button (auto-aims nearby rivals)." : "Click or Space to shoot."],
    ["DIVE", isTouch ? "DIVE on your own ink: faster + hidden." : "Shift on your own ink: faster + hidden."],
    ["SPECIAL", isTouch ? "Fill meter, tap ULTI for an Ink Storm." : "Fill meter, press Q for an Ink Storm."],
    ["PICKUPS", "Grab Ink / Speed / Shield / Special — rivals want them too."],
  ];
  let yy = y0 + 58 * S; const lh = Math.min(42 * S, (ph - 96 * S) / rows.length);
  const keyX = x0 + pw * 0.05, valX = x0 + pw * 0.30, maxW = pw * 0.66;
  for (const row of rows) {
    ctx.textAlign = "left"; ctx.fillStyle = PLAYER_COLOR; ctx.font = "bold " + Math.round(11 * S) + "px monospace";
    ctx.fillText(row[0], keyX, yy + 8 * S);
    let fs = 10 * S; ctx.font = Math.round(fs) + "px monospace";
    while (ctx.measureText(row[1]).width > maxW && fs > 7) { fs--; ctx.font = Math.round(fs) + "px monospace"; }
    ctx.fillStyle = "#cfe9ff"; ctx.fillText(row[1], valX, yy + 8 * S);
    yy += lh;
  }
  howtoUI.back = { x: cx - 52 * S, y: y0 + ph - 36 * S, w: 104 * S, h: 26 * S };
  drawBtn(howtoUI.back, "BACK", "#7fb0c6", false, 11 * S);
  ctx.textAlign = "left";
}

// Big centered "3 · 2 · 1 · GO!" intro overlay
function drawCountdown() {
  const S = ovScale(), cd = game.countdown;
  const cx = VIEW_W / 2, cy = VIEW_H * 0.42;

  // match-intro banner ("TURF WAR — <Stage>") that slides in then out
  const bannerA = cd > 0 ? clamp((3 - cd) * 2.5, 0, 1) : clamp(1 + cd / 0.7, 0, 1);
  if (bannerA > 0.01) {
    ctx.save(); ctx.globalAlpha = bannerA;
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd23d"; ctx.font = "bold " + Math.round(20 * S) + "px 'Trebuchet MS', sans-serif";
    ctx.fillText("TURF WAR", cx, VIEW_H * 0.22);
    ctx.fillStyle = "#cfe9ff"; ctx.font = "bold " + Math.round(12 * S) + "px monospace";
    ctx.fillText(LAYOUT_NAMES[currentLayout], cx, VIEW_H * 0.22 + 18 * S);
    ctx.restore(); ctx.textAlign = "left";
  }

  let label, col, scale, alpha;
  if (cd > 0) {
    label = String(Math.ceil(cd));
    col = "#eaffff";
    const age = clamp(Math.ceil(cd) - cd, 0, 1);   // 0 = just popped in
    scale = 1.5 - 0.5 * age;                        // pop big then settle
    alpha = 1;
  } else {
    label = "GO!";
    col = "#3dff8a";
    alpha = clamp(1 + cd / 0.7, 0, 1);             // fade out over ~0.7s
    scale = 1.2 + (-cd) * 0.9;                      // and zoom out
  }
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold " + Math.round(74 * S * scale) + "px 'Trebuchet MS', sans-serif";
  ctx.fillStyle = "rgba(3,12,24,0.55)"; ctx.fillText(label, cx + 3 * S, cy + 3 * S);
  ctx.fillStyle = col; ctx.fillText(label, cx, cy);
  ctx.globalAlpha = 1; ctx.textBaseline = "alphabetic"; ctx.textAlign = "left";
  ctx.restore();

  // first-match control tips
  if (showFirstTips) {
    const tip = isTouch
      ? "Left stick: MOVE   ·   right FIRE pad: AIM + SHOOT (drag to aim)   ·   DIVE on your own ink   ·   ULTI when charged"
      : "WASD: move   ·   Mouse: aim   ·   Click/Space: shoot   ·   Shift: dive on your ink   ·   Q: ulti";
    ctx.textAlign = "center";
    let fs = 11 * S; ctx.font = Math.round(fs) + "px monospace";
    while (ctx.measureText(tip).width > VIEW_W * 0.92 && fs > 7) { fs--; ctx.font = Math.round(fs) + "px monospace"; }
    const ty = VIEW_H * 0.66;
    ctx.fillStyle = "rgba(6,20,34,0.8)";
    const tw = ctx.measureText(tip).width + 18 * S;
    rrect(cx - tw / 2, ty - 12 * S, tw, 20 * S);
    ctx.fillStyle = "#cfe9ff"; ctx.fillText(tip, cx, ty + 2 * S);
    ctx.textAlign = "left";
  }
}

function drawPause() {
  const S = ovScale(), cx = VIEW_W / 2, cy = VIEW_H / 2;
  ctx.fillStyle = "rgba(4,14,24,0.82)"; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  // card
  const pw = Math.min(VIEW_W * 0.86, 344 * S), ph = 204 * S;
  const px0 = cx - pw / 2, py0 = cy - ph / 2;
  hudPanel(px0, py0, pw, ph);
  ctx.textAlign = "center";
  // pause glyph (two bars) + title
  ctx.fillStyle = PLAYER_COLOR;
  ctx.fillRect(Math.round(cx - 11 * S), Math.round(py0 + 20 * S), Math.round(7 * S), Math.round(20 * S));
  ctx.fillRect(Math.round(cx + 4 * S), Math.round(py0 + 20 * S), Math.round(7 * S), Math.round(20 * S));
  ctx.fillStyle = PLAYER_COLOR; ctx.font = "bold " + Math.round(24 * S) + "px 'Trebuchet MS'";
  ctx.fillText("PAUSED", cx, py0 + 62 * S);
  // stage + time remaining
  const t = Math.max(0, Math.ceil(game.time));
  const ts = Math.floor(t / 60) + ":" + (t % 60 < 10 ? "0" : "") + (t % 60);
  ctx.fillStyle = "#7fb0c6"; ctx.font = "bold " + Math.round(10 * S) + "px monospace";
  ctx.fillText(LAYOUT_NAMES[currentLayout] + "   ·   " + ts + " left", cx, py0 + 78 * S);
  // RESUME + MAIN MENU side by side
  const bw = pw * 0.42, bh = 38 * S, gap = pw * 0.06, by = py0 + 98 * S;
  pauseUI.resume = { x: cx - gap / 2 - bw, y: by, w: bw, h: bh };
  pauseUI.menu   = { x: cx + gap / 2, y: by, w: bw, h: bh };
  drawBtn(pauseUI.resume, "RESUME", "#37e07a", true, 15 * S, 0.85 + 0.15 * Math.sin(bgT * 6));
  drawBtn(pauseUI.menu, "MAIN MENU", "#ff8a8a", false, 13 * S);
  // SETTINGS below
  const sbw = pw * 0.6, sbh = 30 * S, sby = by + bh + 10 * S;
  pauseUI.settings = { x: cx - sbw / 2, y: sby, w: sbw, h: sbh };
  drawBtn(pauseUI.settings, "SETTINGS", "#7fb0c6", false, 12 * S);
  // hint
  ctx.fillStyle = "#5a8aa0"; ctx.font = Math.round(8 * S) + "px monospace";
  ctx.fillText(isTouch ? "tap a button to continue" : "P or Esc resumes", cx, py0 + ph - 7 * S);
  ctx.textAlign = "left";
}

function drawResult(win) {
  const S = ovScale(), cx = VIEW_W / 2;
  ctx.fillStyle = "rgba(4,14,24,0.9)"; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  const pw = Math.min(VIEW_W * 0.9, 380 * S), ph = Math.min(VIEW_H * 0.94, 404 * S);
  const px0 = cx - pw / 2, py0 = VIEW_H / 2 - ph / 2;
  hudPanel(px0, py0, pw, ph);
  ctx.textAlign = "center";
  const r = game.result || { total: 0, killScore: 0, coverScore: 0 };

  // build the four-faction standings
  const fp = game.pct.factions || [0, 0, 0, 0];
  let rno = 0;
  const facs = [];
  for (let i = 0; i < 4; i++) {
    const me = (i === localFaction);
    facs.push({ n: me ? "YOU" : "Rival " + (++rno), p: fp[i] || 0, c: FACTION_COLORS[i].ink, me });
  }
  const meRow = facs[localFaction];
  const ranked = facs.slice().sort((a, b) => b.p - a.p);
  const rank = ranked.indexOf(meRow) + 1;
  const ord = ["1st", "2nd", "3rd", "4th"];

  // title + placing
  ctx.font = "bold " + Math.round(34 * S) + "px 'Trebuchet MS'";
  ctx.fillStyle = win ? "#3dff8a" : "#ff6b6b";
  ctx.fillText(win ? "VICTORY!" : "DEFEAT", cx, py0 + 34 * S);
  ctx.font = "bold " + Math.round(11 * S) + "px monospace"; ctx.fillStyle = "#cfe9ff";
  ctx.fillText(win ? ord[rank - 1] + " PLACE — you ruled the reef!" : ord[rank - 1] + " of 4 — out-inked this time", cx, py0 + 54 * S);

  // four-faction segmented bar
  const bx = px0 + pw * 0.1, by = py0 + 66 * S, bw = pw * 0.8, bh = 14 * S;
  ctx.fillStyle = "#06202e"; rrect(bx, by, bw, bh);
  let xo = bx;
  for (const f of facs) { const w = bw * f.p / 100; if (w > 0.5) { ctx.fillStyle = f.c; rrect(xo, by, w, bh); } xo += w; }
  ctx.strokeStyle = "rgba(40,196,228,0.45)"; ctx.lineWidth = 1; ctx.strokeRect(Math.round(bx) + 0.5, Math.round(by) + 0.5, Math.round(bw), Math.round(bh));

  // ranked standings list
  const yy = py0 + 96 * S, rh = Math.min(26 * S, (ph * 0.42) / 4);
  ctx.font = "bold " + Math.round(12 * S) + "px monospace"; ctx.textBaseline = "middle";
  for (let i = 0; i < ranked.length; i++) {
    const f = ranked[i], rowY = yy + i * rh + rh / 2;
    if (f.me) { ctx.fillStyle = "rgba(44,202,218,0.12)"; rrect(bx - 4 * S, rowY - rh / 2, bw + 8 * S, rh); }
    ctx.textAlign = "left"; ctx.fillStyle = f.me ? "#eaffff" : "#8fb4c6"; ctx.fillText((i + 1) + ".", bx, rowY);
    ctx.fillStyle = f.c; rrect(bx + 20 * S, rowY - 5 * S, 10 * S, 10 * S);
    ctx.fillStyle = f.me ? "#eaffff" : "#cfe9ff"; ctx.fillText(f.n, bx + 36 * S, rowY);
    ctx.textAlign = "right"; ctx.fillStyle = f.c; ctx.fillText(Math.round(f.p) + "%", bx + bw, rowY);
  }
  ctx.textBaseline = "alphabetic";

  // score breakdown
  const sy = yy + 4 * rh + 22 * S;
  ctx.textAlign = "center"; ctx.fillStyle = "#9cc7da"; ctx.font = Math.round(11 * S) + "px monospace";
  ctx.fillText("Coverage " + r.coverScore + "    ·    Splats x" + player.kills + "  " + r.killScore, cx, sy);
  ctx.fillStyle = PLAYER_COLOR; ctx.font = "bold " + Math.round(18 * S) + "px monospace";
  ctx.fillText("TOTAL  " + r.total, cx, sy + 24 * S);

  // bottom: multiplayer rematch controls, or solo "tap for title" prompt
  if (net.role) {
    const bw = pw * 0.40, bh = 30 * S, gap = pw * 0.04, byy = py0 + ph - 40 * S;
    if (net.role === "host") {
      resultUI.rematch = { x: cx - bw - gap / 2, y: byy, w: bw, h: bh };
      drawBtn(resultUI.rematch, "PLAY AGAIN", PLAYER_COLOR, true, 13 * S);
      resultUI.leave = { x: cx + gap / 2, y: byy, w: bw, h: bh };
      drawBtn(resultUI.leave, "LEAVE", "#e2724f", false, 12 * S);
    } else {
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(bgT * 6);
      ctx.fillStyle = "#9cc7da"; ctx.font = Math.round(10 * S) + "px monospace";
      ctx.fillText("Waiting for host to start a rematch…", cx, byy - 6 * S);
      ctx.globalAlpha = 1;
      resultUI.rematch = null;
      resultUI.leave = { x: cx - bw / 2, y: byy, w: bw, h: bh };
      drawBtn(resultUI.leave, "LEAVE", "#e2724f", false, 12 * S);
    }
  } else {
    resultUI.rematch = resultUI.leave = null;
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(bgT * 6);
    ctx.fillStyle = "#fff"; ctx.font = "bold " + Math.round(12 * S) + "px monospace";
    ctx.fillText(isTouch ? "TAP for title" : "CLICK or ENTER for title", cx, py0 + ph - 10 * S);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = "left";
}

/* ============================================================
   MAIN LOOP (rAF + delta time)
   ============================================================ */
let lastT = 0;
function frame(now) {
  if (!lastT) lastT = now;
  let dt = (now - lastT) / 1000;
  lastT = now;
  dt = Math.min(dt, 0.05); // clamp big gaps (tab switches)

  // orientation hint only matters during play (the menus support portrait)
  const hint = document.getElementById("rotateHint");
  const inPlay = (game.state === "PLAYING" || game.state === "PAUSED");
  if (isTouch && inPlay && window.innerHeight > window.innerWidth * 1.3) hint.style.display = "flex";
  else hint.style.display = "none";

  update(dt);
  render();
  updateMusic();    // schedule background-music notes (no-op if muted)
  requestAnimationFrame(frame);
}

// ---- PWA: service worker — offline + auto-update (needs http/https) ----
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      // check for a new version on load, on focus, and every minute
      const poll = () => reg.update().catch(() => {});
      poll();
      setInterval(poll, 60 * 1000);
      window.addEventListener("focus", poll);
      // a new worker installed while we're already controlled = update available.
      // Surface a tap-to-refresh toast instead of reloading mid-game.
      const onUpdate = (nw) => nw && nw.addEventListener("statechange", () => {
        if (nw.state === "installed" && navigator.serviceWorker.controller) { waitingWorker = nw; updateReady = true; }
      });
      if (reg.waiting && navigator.serviceWorker.controller) { waitingWorker = reg.waiting; updateReady = true; }
      reg.addEventListener("updatefound", () => onUpdate(reg.installing));
    }).catch(() => { /* offline unavailable on file:// — serve over http(s) */ });

    // when the (user-accepted) new worker takes control, reload once to apply it
    let reloaded = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (reloaded) return; reloaded = true; location.reload();
    });
  });
}

// boot
resize();
generateMap();   // generate once so title can show nothing odd; real reset on start
countPaintable();
requestAnimationFrame(frame);
</script>
