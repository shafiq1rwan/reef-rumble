      if (!e.dead && dist(p.x, p.y, e.x, e.y) < 0.75) { collectPickup(p, e); break; }
    }
  }
}
function collectPickup(p, ent) {
  p.active = false;
  const info = PU_INFO[p.type];
  const isPlayer = (ent === player);
  if (p.type === PU_INK) ent.ink = INK_MAX;
  else if (p.type === PU_SPEED) ent.speedBoost = 6;
  else if (p.type === PU_SHIELD) ent.shield = 6;
  else { // SPECIAL: player charges ulti; rivals just top up ink + a little heal
    if (isPlayer) ent.special = 100;
    else { ent.ink = INK_MAX; ent.hp = Math.min(ENEMY_MAX_HP, ent.hp + 20); }
  }
  // positive collect VFX: a glowing halo + an upward sparkle fountain (not a splat)
  spawnFloater(ent.x, ent.y - 1.2, info.key, info.col);
  addAura(ent.x, ent.y, info.col);
  for (let i = 0; i < 14; i++) {                 // sparkles drifting UP into the shark
    const a = rand(0, TAU);
    spawnParticle(ent.x, ent.y, Math.cos(a) * rand(0.3, 1.1), Math.sin(a) * rand(0.3, 1.1) - 1.1, info.col, rand(0.5, 0.95), rand(1.5, 3), 0.12);
  }
  for (let i = 0; i < 6; i++)                    // bright white twinkles
    spawnParticle(ent.x, ent.y - 0.3, rand(-1, 1), rand(-1.6, -0.4), "#eaffff", rand(0.3, 0.6), rand(1, 2), 0.1);
  ent.popIn = Math.max(ent.popIn || 0, 0.28);    // little celebratory squash-pop
  if (isPlayer) sfx("pickup");
}
function drawPickup(p) {
  const s = project(p.x, p.y);
  const info = PU_INFO[p.type];
  const fy = s.y - 8 - Math.sin(p.bob) * 3;
  // blink when about to expire
  if (p.life < 4 && Math.floor(p.life * 8) % 2 === 0) return;
  // ground shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath(); ctx.ellipse(s.x, s.y, 8, 4, 0, 0, TAU); ctx.fill();
  // glow + capsule
  ctx.globalAlpha = 0.35; ctx.fillStyle = info.col;
  ctx.beginPath(); ctx.arc(s.x, fy, 12, 0, TAU); ctx.fill(); ctx.globalAlpha = 1;
  ctx.fillStyle = "#06202b"; rrect(s.x - 9, fy - 9, 18, 18);
  ctx.strokeStyle = info.col; ctx.lineWidth = 2;
  ctx.strokeRect(Math.round(s.x - 9) + 0.5, Math.round(fy - 9) + 0.5, 18, 18);
  // glyph
  ctx.fillStyle = info.col;
  ctx.save(); ctx.translate(s.x, fy);
  if (p.type === PU_INK) {            // droplet
    ctx.beginPath(); ctx.arc(0, 1, 4, 0, TAU); ctx.fill();
    poly(0, -6, [[-3, 5], [3, 5], [0, -2]]);
  } else if (p.type === PU_SPEED) {   // double chevron
    poly(-5, 0, [[0, -5], [0, 5], [4, 0]]); poly(0, 0, [[0, -5], [0, 5], [4, 0]]);
  } else if (p.type === PU_SHIELD) {  // shield
    poly(0, -6, [[-5, 0], [5, 0], [5, 4], [0, 9], [-5, 4]]);
  } else {                            // star
    for (let i = 0; i < 5; i++) { const a = -Math.PI / 2 + i * TAU / 5; ctx.fillRect(Math.cos(a) * 5 - 1, Math.sin(a) * 5 - 1, 2, 2); }
    ctx.fillRect(-1, -1, 2, 2);
  }
  ctx.restore();
}

// Paint tiles within radius; closer = stronger; gradual overwrite of opposite ink.
function paintTiles(cx, cy, radius, team, color) {
  const minX = Math.max(0, Math.floor(cx - radius));
  const maxX = Math.min(MAP_W - 1, Math.ceil(cx + radius));
  const minY = Math.max(0, Math.floor(cy - radius));
  const maxY = Math.min(MAP_H - 1, Math.ceil(cy + radius));
  for (let ty = minY; ty <= maxY; ty++) {
    for (let tx = minX; tx <= maxX; tx++) {
      const t = map[ty * MAP_W + tx];
      if (t.terrain === T_OBST) continue;        // never paint obstacles
      const d = dist(cx, cy, tx + 0.5, ty + 0.5);
      if (d > radius) continue;
      const strength = (1 - d / radius);          // 0..1
      const add = 0.35 + strength * 0.9;          // coverage added
      if (t.team === team) {
        t.ink = clamp(t.ink + add, 0, 1);
      } else if (t.team === -1) {
        t.team = team; t.ink = clamp(add, 0, 1); t.inkColor = color;
      } else {
        // overwrite opposing ink gradually
        t.ink -= add;
        if (t.ink <= 0) { t.team = team; t.ink = clamp(-t.ink, 0.05, 1); t.inkColor = color; }
      }
      if (t.team === team) t.inkColor = color;
      t.pulse = 1;       // tile pulse animation
      if (netDirty) netDirty.add(ty * MAP_W + tx);   // (MP) mark for delta sync
    }
  }
}

// Count tiles covered by each of the 4 factions
function tallyTerritory() {
  const f = [0, 0, 0, 0];
  for (const t of map) {
    if (t.terrain === T_OBST) continue;
    if (t.team >= 0) f[t.team]++;
  }
  return f;
}

// Recompute territory percentages (throttled)
let pctTimer = 0;
function updateTerritory(dt) {
  pctTimer -= dt;
  if (pctTimer > 0) return;
  pctTimer = 0.4; // update a few times per second (cheap)
  const f = tallyTerritory();
  const tot = paintableTotal || 1;
  game.pct.factions = [f[0] / tot * 100, f[1] / tot * 100, f[2] / tot * 100, f[3] / tot * 100];
}

/* ============================================================
   13. PARTICLES
   ============================================================ */
function updateParticles(dt) {
  for (const p of particles) {
    if (!p.alive) continue;
    p.life -= dt;
    if (p.life <= 0) { p.alive = false; continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.92; p.vy *= 0.92;
    // simple vertical hop using z
    p.z += p.vz * dt; p.vz -= p.gravity * dt * 6;
    if (p.z < 0) { p.z = 0; p.vz *= -0.4; }
  }
  for (const f of floaters) { f.life -= dt; f.y -= dt * 1.2; }
  for (let i = floaters.length - 1; i >= 0; i--) if (floaters[i].life <= 0) floaters.splice(i, 1);
}

/* ============================================================
   14. CAMERA
   ============================================================ */
function updateCamera(dt) {
  const target = worldToScreen(player.x, player.y);
  camera.tx = target.x; camera.ty = target.y;
  camera.x = lerp(camera.x, camera.tx, clamp(dt * 6, 0, 1));
  camera.y = lerp(camera.y, camera.ty, clamp(dt * 6, 0, 1));
  // screen shake decay — gentle: capped low amplitude + fast decay so it
  // adds punch without making the player dizzy
  if (game.shake > 0.05) {
    const amt = Math.min(game.shake, 5) * 0.35;   // effective max ~1.75px
    game.shakeX = rand(-amt, amt);
    game.shakeY = rand(-amt, amt);
    game.shake = Math.max(0, game.shake - dt * 28); // quicker settle
  } else { game.shake = 0; game.shakeX = 0; game.shakeY = 0; }
  if (game.flash > 0) game.flash = Math.max(0, game.flash - dt * 1.5);
}

// world -> final screen pixel (with camera + shake), origin centered
function project(wx, wy) {
  const s = worldToScreen(wx, wy);
  return {
    x: s.x - camera.x + VIEW_W / 2 + game.shakeX,
    y: s.y - camera.y + VIEW_H / 2 + game.shakeY,
  };
}

/* ============================================================
   17. UPDATE LOOP (logic)
   ============================================================ */
function hostSnap(dt) {
  if (net.role !== "host") return;
  net.snapAccum += dt;
  if (net.snapAccum >= 1 / SNAP_HZ) { net.snapAccum = 0; netBroadcast(buildSnapshot()); }
}

function update(dt) {
  // CLIENT: never run the sim — interpolate snapshots + send input only
  if (net.role === "client") {
    if (game.state === "PLAYING") netClientTick(dt);
    return;
  }

  if (game.state !== "PLAYING") return;

  // intro "3 · 2 · 1 · GO!" — freeze the action (and the match clock) until GO
  if (game.countdown > -0.7) {
    const prevCeil = Math.ceil(Math.max(0, game.countdown));
    game.countdown -= dt;
    const nowCeil = Math.ceil(Math.max(0, game.countdown));
    if (nowCeil !== prevCeil) sfx(nowCeil > 0 ? "count" : "go");
    if (game.countdown > 0) { updateCamera(dt); hostSnap(dt); return; }   // stay frozen on 3/2/1
    // at GO the match begins; "GO!" keeps flashing for a beat while we play on
  }

  // match timer
  game.time -= dt;
  if (game.time <= 0) { game.time = 0; endMatch(); return; }

  updatePlayer(dt);
  for (const e of enemies) {
    // host: human-controlled factions are driven by their net input, not the AI
    if (net.role === "host" && !e.isBot) driveHumanShark(e, dt);
    else updateEnemy(e, dt);
  }
  resolveSeparation();
  updateProjectiles(dt);
  updateParticles(dt);
  updateImpacts(dt);
  updateFlashes(dt);
  updateAuras(dt);
  updateInkStorm(dt);
  updatePickups(dt);
  updateTerritory(dt);
  updateCamera(dt);

  // decay tile pulses
  for (const t of map) if (t.pulse > 0) t.pulse = Math.max(0, t.pulse - dt * 3);

  hostSnap(dt);   // stream authoritative state to clients
}

function endMatch() {
  const f = tallyTerritory();
  const tot = paintableTotal || 1;
  game.pct.factions = f.map(c => c / tot * 100);
  // four-way turf war: you win by holding the MOST reef of all four factions
  const mine = f[localFaction], best = Math.max(...f);
  const win = mine >= best && mine > 0;
  game.result = {
    win, counts: f.slice(),
    coverScore: Math.round(game.pct.factions[localFaction] * 10),
    killScore: player.kills * 100,
    total: Math.round(game.pct.factions[localFaction] * 10) + player.kills * 100,
  };
  game.state = win ? "VICTORY" : "GAMEOVER";
  if (net.role === "host") netBroadcast({ t: "end", counts: f });
}

/* ============================================================
   17b. NETWORK  (PeerJS, host-authoritative free-for-all)
   ----------------------------------------------------------
   Handshake via the free PeerJS cloud broker; gameplay is peer-to-peer.
   Host simulates everything and streams snapshots; clients send input and
   render the authoritative state. Works from static hosting (GitHub Pages).
   ============================================================ */
const NET_ID_PREFIX = "reefrumble-";      // namespace on the shared public broker
const SNAP_HZ = 20, INPUT_HZ = 30;
let netProj = [];                          // (client) projectiles from last snapshot
let netEvents = [];                         // (host) hit/death VFX events since last snapshot
let localProj = [];                         // (client) own predicted projectiles (visual)
let netReady = false;                      // PeerJS library present?

function netAvailable() { return typeof Peer !== "undefined"; }

function genCode() {
  const A = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";   // no easily-confused chars
  let s = "";
  for (let i = 0; i < 5; i++) s += A[Math.floor(Math.random() * A.length)];
  return s;
}

function netReset() {
  try { if (net.peer) net.peer.destroy(); } catch (e) {}
  net.role = null; net.peer = null; net.conns = []; net.hostConn = null;
  net.roomCode = null; net.mode = null; net.players = []; net.factionConn = {};
  net.ultiPending = false; net.snapAccum = 0; net.inputAccum = 0;
  net.lastSnap = null; net.started = false; net.startWarned = false;
  netProj = []; netEvents = []; localProj = []; netDirty = null;
}

function netBroadcast(msg) {
  for (const c of net.conns) { try { if (c.open) c.send(msg); } catch (e) {} }
}

function rosterMsg() {
  return { t: "lobby", roster: net.players.map(p => ({ faction: p.faction, name: p.name, ready: p.ready })) };
}

// ---------- HOST ----------
function netHost() {
  if (!netAvailable()) { net.status = "PeerJS not loaded"; return; }
  netReset();
  net.role = "host"; net.mode = "host"; net.status = "Creating room…";
  net.roomCode = genCode();
  net.players = [{ faction: 0, name: playerName, ready: true, isLocal: true, weaponIdx: weaponSel }];
  net.peer = new Peer(NET_ID_PREFIX + net.roomCode);
  net.peer.on("open", () => { net.status = "Room ready — share the code"; });
  net.peer.on("error", (e) => {
    // code clash on the broker → just try another
    if (e && e.type === "unavailable-id") { net.roomCode = genCode(); try { net.peer.destroy(); } catch (x) {} netHost(); return; }
    net.status = "Network error: " + (e && e.type ? e.type : "unknown");
  });
  net.peer.on("connection", (conn) => {
    conn.on("open", () => hostOnConnect(conn));
    conn.on("data", (d) => hostOnData(conn, d));
    conn.on("close", () => hostOnClose(conn));
    conn.on("error", () => hostOnClose(conn));
  });
}

function freeFaction() {
  for (let f = 1; f <= 3; f++) if (!net.factionConn[f]) return f;
  return -1;
}

function hostOnConnect(conn) {
  if (net.started) { try { conn.send({ t: "full_reject", reason: "in progress" }); conn.close(); } catch (e) {} return; }
  const f = freeFaction();
  if (f < 0) { try { conn.send({ t: "full_reject", reason: "room full" }); conn.close(); } catch (e) {} return; }
  conn._faction = f; net.factionConn[f] = conn; net.conns.push(conn);
  net.players.push({ faction: f, name: "Player " + f, ready: false, conn });
  conn.send({ t: "assign", faction: f, code: net.roomCode, stage: currentLayout });
  net.startWarned = false;   // a new arrival → re-arm the "not ready" warning
  netBroadcast(rosterMsg());
}

function hostOnData(conn, msg) {
  if (!msg || !msg.t) return;
  const f = conn._faction;
  if (msg.t === "join") {
    const p = net.players.find(x => x.faction === f);
    if (p) { if (msg.name) p.name = msg.name; if (msg.weaponIdx != null) p.weaponIdx = msg.weaponIdx; }
    netBroadcast(rosterMsg());
  } else if (msg.t === "ready") {
    const p = net.players.find(x => x.faction === f);
    if (p) p.ready = !!msg.ready;
    // someone changed their ready state → clear any stale "not ready" warning
    net.startWarned = false;
    if (allPlayersReady()) net.status = "Everyone's ready — tap START";
    else net.status = "Room ready — share the code";
    netBroadcast(rosterMsg());
  } else if (msg.t === "weapon") {
    const p = net.players.find(x => x.faction === f);
    if (p && msg.weaponIdx != null) p.weaponIdx = msg.weaponIdx;
  } else if (msg.t === "input" && net.started) {
    const sh = sharks[f];
    if (sh) sh.netInput = msg.in;
  }
}

function hostOnClose(conn) {
  const f = conn._faction;
  net.conns = net.conns.filter(c => c !== conn);
  if (f != null) {
    delete net.factionConn[f];
    net.players = net.players.filter(p => p.faction !== f);
    // mid-match: that faction reverts to a bot
    if (net.started && sharks[f]) { sharks[f].isBot = true; sharks[f].netInput = null; }
    net.startWarned = false;
    netBroadcast(rosterMsg());
  }
}

// true when every joined (non-host) player has tapped READY (host is always ready)
function allPlayersReady() {
  return net.players.every(p => p.faction === 0 || p.ready);
}
// host may only START with at least one joined player AND everyone readied
function canStartMatch() {
  return net.players.length >= 2 && allPlayersReady();
}

function netStartHost() {
  if (net.role !== "host") return;
  const humans = [0, ...Object.keys(net.factionConn).map(Number)];
  const weapons = {};
  for (const p of net.players) weapons[p.faction] = p.weaponIdx || 0;
  netDirty = new Set();
  net.started = true;
  netBroadcast({ t: "start", stage: currentLayout, humans, weapons });
  startMatch({ localFaction: 0, humans, weapons, stage: currentLayout, netRole: "host" });
  netDirty.clear();   // starting puddles are deterministic on every client
}

// host: after a match ends, send the whole room back to the lobby (room intact),
// so everyone can re-ready and play again without re-sharing the code.
function netRematch() {
  if (net.role !== "host") return;
  net.started = false; net.startWarned = false; net.lastSnap = null; netDirty = null;
  for (const p of net.players) p.ready = (p.faction === 0);   // host stays ready
  net.status = allPlayersReady() ? "Everyone's ready — tap START" : "Room ready — share the code";
  netBroadcast({ t: "rematch" });
  netBroadcast(rosterMsg());
  game.state = "LOBBY";
}

// ---------- CLIENT ----------
function netJoin(code) {
  if (!netAvailable()) { net.status = "PeerJS not loaded"; return; }
  netReset();
  net.role = "client"; net.mode = "join"; net.status = "Connecting…";
  net.roomCode = code;
  net.peer = new Peer();
  net.peer.on("open", () => {
    const conn = net.peer.connect(NET_ID_PREFIX + code, { reliable: true });
    net.hostConn = conn;
    conn.on("open", () => {
      net.status = "Connected — waiting in lobby";
      conn.send({ t: "join", name: playerName, weaponIdx: weaponSel });
    });
    conn.on("data", (d) => clientOnData(d));
    conn.on("close", () => clientLostHost());
    conn.on("error", () => clientLostHost());
  });
  net.peer.on("error", (e) => {
    const ty = e && e.type ? e.type : "unknown";
    net.status = (ty === "peer-unavailable") ? "Room not found — check the code" : "Network error: " + ty;
  });
}

function clientOnData(msg) {
  if (!msg || !msg.t) return;
  if (msg.t === "assign") {
    localFaction = msg.faction; net.roomCode = msg.code;
    if (msg.stage != null) currentLayout = msg.stage;
    net.status = "In lobby — faction " + msg.faction;
  } else if (msg.t === "lobby") {
    net.players = msg.roster.map(p => ({ ...p, isLocal: p.faction === localFaction }));
  } else if (msg.t === "stage") {
    if (msg.stage != null) currentLayout = msg.stage;   // host changed the arena
  } else if (msg.t === "rematch") {
    // host sent us back to the lobby for another round — re-ready up
    net.started = false; net.lastSnap = null;
    const me = net.players.find(p => p.faction === localFaction);
    if (me) me.ready = false;
    net.status = "Back in lobby — ready up";
    game.state = "LOBBY";
  } else if (msg.t === "start") {
    if (msg.stage != null) currentLayout = msg.stage;
    net.started = true;
    startMatch({ localFaction, humans: msg.humans, weapons: msg.weapons, stage: msg.stage, netRole: "client" });
  } else if (msg.t === "snap") {
    net.lastSnap = msg;
  } else if (msg.t === "end") {
    clientEndMatch(msg.counts);
  } else if (msg.t === "full_reject") {
    clientLostHost(msg.reason === "room full" ? "Room is full" : "Match already started");
  }
}

function clientLostHost(reason) {
  if (net.role !== "client") return;
  netReset();
  net.status = reason || "Host disconnected";
  game.state = "TITLE";
}

function clientEndMatch(counts) {
  const tot = paintableTotal || 1;
  const f = counts || tallyTerritory();
  game.pct.factions = f.map(c => c / tot * 100);
  const mine = f[localFaction], best = Math.max(...f);
  const win = mine >= best && mine > 0;
  game.result = {
    win, counts: f.slice(),
    coverScore: Math.round(game.pct.factions[localFaction] * 10),
    killScore: (player.kills || 0) * 100,
    total: Math.round(game.pct.factions[localFaction] * 10) + (player.kills || 0) * 100,
  };
  game.state = win ? "VICTORY" : "GAMEOVER";
}

// ---------- SNAPSHOT (host build / client apply) ----------
function buildSnapshot() {
  const s = sharks.map(sh => ({
    f: sh.faction,
    x: +sh.x.toFixed(2), y: +sh.y.toFixed(2), a: +sh.aim.toFixed(2),
    hp: Math.round(sh.hp), ink: Math.round(sh.ink), sp: Math.round(sh.special),
    dv: sh.diving ? 1 : 0, dd: sh.dead ? 1 : 0, fc: sh.facing,
    wi: sh.weaponIdx || 0, sb: sh.speedBoost > 0 ? 1 : 0, sd: sh.shield > 0 ? 1 : 0,
    uf: +(sh.ultiFlash || 0).toFixed(2),
  }));
  const pr = [];
  for (const p of projectiles) if (p.alive) pr.push({ x: +p.x.toFixed(2), y: +p.y.toFixed(2), f: p.faction, r: +(p.r || 0.28).toFixed(2) });
  const pk = [];
  for (const p of pickups) if (p.active) pk.push({ x: +p.x.toFixed(2), y: +p.y.toFixed(2), ty: p.type });
  const tiles = [];
  if (netDirty) { for (const i of netDirty) { const t = map[i]; if (t) tiles.push([i, t.team, +t.ink.toFixed(2)]); } netDirty.clear(); }
  const ev = netEvents; netEvents = [];   // drain hit/death VFX events
  return {
    t: "snap", s, pr, pk, tiles, ev,
    pct: game.pct.factions.map(v => +v.toFixed(1)),
    time: +game.time.toFixed(1), cd: +game.countdown.toFixed(2), st: game.state,
  };
}

function netApply(snap) {
  if (!snap) return;
  for (const sd of snap.s) {
    const sh = sharks[sd.f]; if (!sh) continue;
    sh.netX = sd.x; sh.netY = sd.y;
    sh.hp = sd.hp; sh.ink = sd.ink; sh.special = sd.sp;
    sh.diving = !!sd.dv; sh.dead = !!sd.dd;
    sh.speedBoost = sd.sb ? 1 : 0; sh.shield = sd.sd ? 1 : 0;
    sh.weaponIdx = sd.wi; sh.weapon = WEAPONS[sd.wi] || WEAPONS[0];
    if (sd.uf > 0) sh.ultiFlash = sd.uf;
    if (sh !== player) { sh.netAim = sd.a; sh.facing = sd.fc; }   // keep local aim responsive
  }
  if (snap.tiles) for (const tup of snap.tiles) {
    const t = map[tup[0]]; if (!t) continue;
    t.team = tup[1]; t.ink = tup[2];
    t.inkColor = t.team >= 0 ? FACTION_COLORS[t.team].ink : null;
    t.pulse = 1;
  }
  netProj = snap.pr || [];
  // replay hit/death VFX events so impacts/splats look juicy on the client too
  if (snap.ev) for (const e of snap.ev) {
    if (e.k === 1) splashFX(e.x, e.y, e.c, e.r, !!e.h);   // bullet splash
    else if (e.k === 2) deathBurst(e.x, e.y, e.c);        // splat burst
  }
  // rebuild client pickup list for rendering
  pickups.length = 0;
  for (const p of (snap.pk || [])) pickups.push({ x: p.x, y: p.y, type: p.ty, active: true, life: 10, bob: 0 });
  if (snap.pct) game.pct.factions = snap.pct;
  if (typeof snap.time === "number") game.time = snap.time;
  if (typeof snap.cd === "number") game.countdown = snap.cd;
  if (snap.st && snap.st !== game.state && (snap.st === "PLAYING" || snap.st === "PAUSED")) game.state = snap.st;
}

// Build this client's serialized input (aim resolved here from local controls).
function gatherNetInput() {
  let ix = 0, iy = 0;
  if (keys["w"] || keys["arrowup"]) iy -= 1;
  if (keys["s"] || keys["arrowdown"]) iy += 1;
  if (keys["a"] || keys["arrowleft"]) ix -= 1;
  if (keys["d"] || keys["arrowright"]) ix += 1;
  if (moveStick.active) { ix += moveStick.dx; iy += moveStick.dy; }
  let aim = player.aim;
  if (isTouch && !usingMouse) {
    let aimed = false;
    const dragMag = Math.abs(btnShoot.dx) + Math.abs(btnShoot.dy);
    if (btnShoot.pressed && dragMag > 0.3) { const w = screenToWorld(btnShoot.dx, btnShoot.dy); aim = Math.atan2(w.y, w.x); aimed = true; }
    else if (btnShoot.pressed) {
      let best = null, bd = 8;
      for (const e of enemies) { if (e.dead) continue; const d = dist(player.x, player.y, e.x, e.y); if (d < bd) { bd = d; best = e; } }
      if (best) { aim = Math.atan2(best.y - player.y, best.x - player.x); aimed = true; }
    }
    if (!aimed) { const wx = (ix + iy), wy = (iy - ix); if (Math.hypot(wx, wy) > 0.001) aim = Math.atan2(wy, wx); }
  } else {
    const sc = worldToScreen(player.x, player.y);
    const psx = sc.x - camera.x + VIEW_W / 2;
    const psy = sc.y - camera.y + VIEW_H / 2 - 14;
    const w = screenToWorld(mouseScreenX - psx, mouseScreenY - psy);
    if (Math.abs(w.x) + Math.abs(w.y) > 0.0001) aim = Math.atan2(w.y, w.x);
  }
  player.aim = aim;   // local responsiveness for reticle/blaster
  const fire = (mouseDown || keys[" "] || btnShoot.pressed) ? 1 : 0;
  const dive = (keys["shift"] || btnDive.pressed) ? 1 : 0;
  const ulti = net.ultiPending ? 1 : 0; net.ultiPending = false;
  return { ix: +ix.toFixed(2), iy: +iy.toFixed(2), aim: +aim.toFixed(3), fire, dive, ulti };
}

// (client) Predict the LOCAL shark's movement immediately from live input, using
// the same primitives the host runs (speedForTile / moveEntity), so your own shark
// responds with zero round-trip lag. Movement only — host stays authoritative for
// ink / hp / paint / shooting; netClientTick reconciles drift against snapshots.
function predictLocalShark(dt) {
  const sh = player;
  // gather movement input (mirrors updatePlayer / gatherNetInput)
  let ix = 0, iy = 0;
  if (keys["w"] || keys["arrowup"]) iy -= 1;
  if (keys["s"] || keys["arrowdown"]) iy += 1;
  if (keys["a"] || keys["arrowleft"]) ix -= 1;
  if (keys["d"] || keys["arrowright"]) ix += 1;
  if (moveStick.active) { ix += moveStick.dx; iy += moveStick.dy; }
  let wx = (ix + iy), wy = (iy - ix);     // screen-axis -> world-axis
  const il = Math.hypot(wx, wy);
  if (il > 0.001) { wx /= il; wy /= il; }
  const inMag = Math.min(1, Math.hypot(ix, iy));

  const tHere = tileAt(Math.floor(sh.x), Math.floor(sh.y));
  const teamHere = tHere ? tHere.team : -1;

  // dive (same rule as updatePlayer; affects predicted speed feel)
  const wantDive = keys["shift"] || btnDive.pressed;
  const onOwnInk = teamHere === sh.faction;
  if (wantDive && onOwnInk) sh.diving = true;
  if (!wantDive || !onOwnInk) sh.diving = false;

  sh.speed = speedForTile(sh, teamHere, sh.diving);
  if (sh.speedBoost > 0) sh.speed *= 1.4;
  const sp = sh.speed * inMag;
  sh.vx = wx * sp; sh.vy = wy * sp;
  if (il > 0.001) { moveEntity(sh, sh.vx, sh.vy, dt); sh.walkPhase += dt * 10; }

  // face the way we aim (aim is already set locally in gatherNetInput)
  const scr = worldToScreen(Math.cos(sh.aim), Math.sin(sh.aim));
  sh.facing = scr.x >= 0 ? 1 : -1;
}

// (client) Predict your OWN shots so firing feels instant: muzzle flash + sound +
// a visual projectile the moment you press fire, instead of waiting for the host's
// echo. Ink/cooldown are estimated locally (host corrects via snapshots); the host
// stays authoritative for actual damage + paint (its splash arrives as an event).
function predictLocalFire(dt) {
  const sh = player;
  sh.shootCd = (sh.shootCd || 0) - dt;
  if (sh.dead || sh.diving) return;
  const wpn = sh.weapon || WEAPONS[0];
  const firing = (mouseDown || keys[" "] || btnShoot.pressed);
  if (firing && sh.shootCd <= 0 && sh.ink >= wpn.cost) {
    sh.shootCd = wpn.cd;
    sh.ink = Math.max(0, sh.ink - wpn.cost);   // local estimate; snapshot re-syncs
    sh.squash = -0.5;
    for (let i = 0; i < wpn.pellets; i++) {
      const spreadOff = wpn.pellets > 1 ? (i - (wpn.pellets - 1) / 2) * wpn.spread : 0;
      const ang = sh.aim + spreadOff + rand(-wpn.spread, wpn.spread) * (wpn.pellets > 1 ? 0.3 : 1);
      const dx = Math.cos(ang), dy = Math.sin(ang);
      localProj.push({ x: sh.x + dx * 0.4, y: sh.y + dy * 0.4, dx, dy, speed: wpn.speed, range: wpn.range,
        travelled: 0, color: sh.color, r: wpn.big ? 0.42 : 0.28, alive: true });
    }
    addFlash(sh.x + Math.cos(sh.aim) * 0.45, sh.y + Math.sin(sh.aim) * 0.45, sh.aim, sh.color);
    sfx("shoot");
  }
}
// move/expire the client's own predicted projectiles (visual only — no paint/damage)
function updateLocalProj(dt) {
  for (const p of localProj) {
    if (!p.alive) continue;
    const step = p.speed * dt;
    p.x += p.dx * step; p.y += p.dy * step; p.travelled += step;
    const t = tileAt(Math.floor(p.x), Math.floor(p.y));
    if (p.travelled >= p.range || !t || t.terrain === T_OBST) p.alive = false;
  }
  for (let i = localProj.length - 1; i >= 0; i--) if (!localProj[i].alive) localProj.splice(i, 1);
}

// (client) smooth toward the latest authoritative shark transforms + run VFX only
function netClientTick(dt) {
  if (net.lastSnap) { netApply(net.lastSnap); net.lastSnap = null; }
  // --- local shark: predict movement now, reconcile against the snapshot ---
  if (player.netX != null) {
    if (player.dead || game.countdown > 0) {
      // dead/frozen: no prediction — sit at the authoritative position
      player.x = player.netX; player.y = player.netY;
    } else {
      predictLocalShark(dt);
      const ex = player.netX - player.x, ey = player.netY - player.y;
      if (Math.hypot(ex, ey) > 1.5) {          // respawn / knockback / big desync → snap
        player.x = player.netX; player.y = player.netY;
      } else {                                  // normal drift → gently correct (invisible)
        const c = Math.min(1, dt * 6);
        player.x += ex * c; player.y += ey * c;
      }
      predictLocalFire(dt);   // instant muzzle/shot feedback for your own fire
    }
    if (player.ultiFlash > 0) player.ultiFlash -= dt;
    if (player.popIn > 0) player.popIn -= dt;
    player.squash = lerp(player.squash || 0, 0, dt * 10);
  }
  // --- other sharks: interpolate toward their net targets ---
  const k = Math.min(1, dt * 14);
  for (const sh of sharks) {
    if (sh === player) continue;
    if (sh.netX != null) { sh.x += (sh.netX - sh.x) * k; sh.y += (sh.netY - sh.y) * k; }
    if (sh.netAim != null) sh.aim = sh.netAim;
    if (sh.ultiFlash > 0) sh.ultiFlash -= dt;
    if (sh.popIn > 0) sh.popIn -= dt;
    sh.squash = lerp(sh.squash || 0, 0, dt * 10);
    if (Math.abs(sh.netX - sh.x) + Math.abs(sh.netY - sh.y) > 0.02) sh.walkPhase += dt * 8;
  }
  // local-only visual effects (host owns the sim)
  updateLocalProj(dt);
  updateParticles(dt); updateImpacts(dt); updateFlashes(dt); updateAuras(dt); updateInkStorm(dt);
  for (const p of pickups) p.bob += dt * 3;
  updateCamera(dt);
  for (const t of map) if (t.pulse > 0) t.pulse = Math.max(0, t.pulse - dt * 3);
  // send input to host
  net.inputAccum += dt;
  if (net.inputAccum >= 1 / INPUT_HZ) {
    net.inputAccum = 0;
    if (net.hostConn && net.hostConn.open && game.state === "PLAYING") {
      try { net.hostConn.send({ t: "input", in: gatherNetInput() }); } catch (e) {}
    }
  }
}

/* ============================================================
   18. RENDER LOOP
   ============================================================ */
function render() {
  renderScene();
  drawUpdateToast();   // always on top, on every screen
}

// "UPDATE READY — TAP TO REFRESH" banner (PWA), shown when a new build installed
function drawUpdateToast() {
  if (!updateReady) { toastRect.w = 0; return; }
  const S = ovScale();
  const txt = "UPDATE READY · TAP TO REFRESH";
  ctx.font = "bold " + Math.round(10 * S) + "px monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const w = ctx.measureText(txt).width + 26 * S, h = 24 * S;
  const x = Math.round(VIEW_W / 2 - w / 2), y = Math.round(64 * S);
  toastRect.x = x; toastRect.y = y; toastRect.w = w; toastRect.h = h;
  ctx.fillStyle = "rgba(7,22,36,0.96)"; rrect(x, y, w, h);
  ctx.globalAlpha = 0.6 + 0.4 * Math.sin(bgT * 6);
  ctx.strokeStyle = "#ffd23d"; ctx.lineWidth = Math.max(1, 1.5 * S);
  ctx.strokeRect(x + 0.5, y + 0.5, w, h);
  ctx.globalAlpha = 1;
  ctx.fillStyle = "#ffd23d"; ctx.fillText(txt, VIEW_W / 2, y + h / 2 + 1);
  ctx.textBaseline = "alphabetic"; ctx.textAlign = "left";
}

function renderScene() {
  // clear with deep-ocean background
  ctx.fillStyle = "#06182a";
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  drawWaterBackground();

  if (game.state === "TITLE") { drawTitle(); return; }
  if (game.state === "WEAPONSELECT") { drawWeaponSelect(); return; }
  if (game.state === "SETTINGS") { drawSettings(); return; }
  if (game.state === "HOWTO") { drawHowTo(); return; }
  if (game.state === "CREDITS") { drawCredits(); return; }
  if (game.state === "LOBBY") { drawLobby(); return; }

  drawArena();

  // HUD overlays
  drawHUD();
  drawMinimap();
  if (isTouch && !usingMouse) drawMobileControls();

  // start-of-match countdown overlay
  if (game.state === "PLAYING" && game.countdown > -0.7) drawCountdown();

  if (game.state === "PAUSED")   drawPause();
  if (game.state === "GAMEOVER") drawResult(false);
  if (game.state === "VICTORY")  drawResult(true);

  // damage flash
  if (game.flash > 0) {
    ctx.fillStyle = "rgba(255,40,40," + (game.flash * 0.4) + ")";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
  // ulti (ink storm) — a soft cyan bloom, gentle now that the vortex does the work
  if (game.state === "PLAYING" && player.ultiFlash > 0) {
    ctx.fillStyle = "rgba(120,235,255," + (player.ultiFlash * 0.18) + ")";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
}

/* ---------- ANIMATED OCEAN (drawn BEFORE the stage so the arena floats) ----------
   Lightweight: navy depth bands + two parallax layers of drifting wave dashes +
   seeded twinkling sparkles + rising bubbles + cyan/magenta ink-reflection glow
   under the stage + animated foam framing the stage rim. All loops smoothly. */
let bgT = 0;
function drawWaterBackground() {
  bgT += 0.01;
  const t = bgT;
  const parX = camera.x * 0.3, parY = camera.y * 0.3;   // gentle parallax with camera

  // 1) deep navy base + slow depth bands
  ctx.fillStyle = "#020c18";
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  const bands = settings.perf ? 4 : 7;
  for (let i = 0; i < bands; i++) {
    const y = Math.floor(i / bands * VIEW_H), h = Math.ceil(VIEW_H / bands) + 1;
    ctx.fillStyle = shade("#06192e", 0.03 + 0.05 * Math.sin(t * 0.5 + i * 0.6));
    ctx.fillRect(0, y, VIEW_W, h);
  }

  // perf mode: skip the animated wave/sparkle/bubble/glow layers entirely —
  // one cheap wave layer keeps it from looking dead, then bail before the
  // expensive radial-gradient glows + foam.
  if (settings.perf) {
    drawWaveLayer(t * 0.7, parX, parY, 38, 60, "rgba(90,175,220,0.08)", 0.0);
    return;
  }

  // 2) drifting wave dashes — two parallax layers for depth
  drawWaveLayer(t * 0.7, parX,       parY,       30, 46, "rgba(70,160,210,0.10)", 0.0);
  drawWaveLayer(t * 1.1, parX * 1.4, parY * 1.4, 38, 60, "rgba(120,200,235,0.07)", 0.5);

  // 3) seeded twinkling sparkles (positions fixed, brightness animates)
  let sd = 0x51ED0;
  const sr = () => { sd = (sd * 1664525 + 1013904223) >>> 0; return sd / 4294967296; };
  for (let i = 0; i < 36; i++) {
    const rx = sr(), ry = sr(), rp = sr(), rc = sr();
    const tw = Math.sin(t * 3 + rp * TAU);
    if (tw > 0.45) {
      ctx.globalAlpha = ((tw - 0.45) / 0.55) * 0.85;
      ctx.fillStyle = rc > 0.5 ? "#cdf6ff" : "#8fd0ff";
      const x = ((rx * VIEW_W - parX * 0.15) % VIEW_W + VIEW_W) % VIEW_W;
      const s = tw > 0.85 ? 2 : 1;
      ctx.fillRect(x | 0, (ry * VIEW_H) | 0, s, s);
    }
  }
  ctx.globalAlpha = 1;

  // 4) tiny rising bubbles (seeded, wrap-around)
  sd = 0xB0BB1E;
  for (let i = 0; i < 16; i++) {
    const rx = sr(), spd = sr(), rr = sr(), wob = sr();
    const x = ((rx * VIEW_W - parX * 0.2 + Math.sin(t * 1.4 + wob * TAU) * 6) % VIEW_W + VIEW_W) % VIEW_W;
    const y = VIEW_H - ((t * (10 + spd * 22) + wob * 240) % (VIEW_H + 30));
    const r = 1 + Math.floor(rr * 2.2);
    ctx.globalAlpha = 0.16; ctx.strokeStyle = "#9fd8ff"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x | 0, y | 0, r, 0, TAU); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // 5) ink reflection glow + foam rim around the stage (only during play)
  if (game.state !== "TITLE" && game.state !== "LOBBY") {
    const ctr = project(MAP_W / 2 - 0.5, MAP_H / 2 - 0.5);
    const fp = game.pct.factions || [0, 0, 0, 0];
    const myPct = fp[localFaction] || 0;
    const rivalPct = fp.reduce((s, v, i) => s + (i === localFaction ? 0 : v), 0);
    waterGlow(ctr.x - 50, ctr.y + 24, 260, "25,230,255", 0.45 + myPct / 130);
    waterGlow(ctr.x + 50, ctr.y + 24, 260, "255,61,240", 0.45 + rivalPct / 130);
    drawStageFoam(t, ctr);
  }
}

function drawWaveLayer(t, parX, parY, rowGap, dashGap, color, off) {
  ctx.fillStyle = color;
  const ox = ((parX % dashGap) + dashGap) % dashGap;
  const oy = ((parY % rowGap) + rowGap) % rowGap;
  for (let ry = -rowGap; ry < VIEW_H + rowGap; ry += rowGap) {
    const baseY = ry - oy, phase = t + ry * 0.05 + off;
    for (let dx = -dashGap; dx < VIEW_W + dashGap; dx += dashGap) {
      const x = dx - ox + Math.sin(phase + dx * 0.03) * 6;
      const len = 12 + Math.sin(phase * 1.3 + dx * 0.05) * 6;
      const y = baseY + Math.sin(phase + dx * 0.02) * 3;
      ctx.fillRect(x | 0, y | 0, len | 0, 2);
    }
  }
}

function waterGlow(x, y, r, rgb, strength) {
  strength = clamp(strength, 0, 1);
  if (strength <= 0.02) return;
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, "rgba(" + rgb + "," + (0.16 * strength).toFixed(3) + ")");
  g.addColorStop(1, "rgba(" + rgb + ",0)");
  ctx.fillStyle = g;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

function drawStageFoam(t, ctr) {
  const hw = TILE_W / 2, hh = TILE_H / 2;
  const N = project(0, 0); N.y -= hh;
  const E = project(MAP_W - 1, 0); E.x += hw;
  const S = project(MAP_W - 1, MAP_H - 1); S.y += hh;
  const Wv = project(0, MAP_H - 1); Wv.x -= hw;
  foamEdge(N.x, N.y, E.x, E.y, ctr.x, ctr.y, t);
  foamEdge(E.x, E.y, S.x, S.y, ctr.x, ctr.y, t);
  foamEdge(S.x, S.y, Wv.x, Wv.y, ctr.x, ctr.y, t);
  foamEdge(Wv.x, Wv.y, N.x, N.y, ctr.x, ctr.y, t);
}
function foamEdge(ax, ay, bx, by, cx, cy, t) {
  const segs = 22;
  for (let i = 0; i <= segs; i++) {
    const u = i / segs;
    let x = ax + (bx - ax) * u, y = ay + (by - ay) * u;
    let ox = x - cx, oy = y - cy; const ol = Math.hypot(ox, oy) || 1; ox /= ol; oy /= ol;
    const wave = Math.sin(t * 3 + i * 0.8 + (ax + ay) * 0.012);
    const push = 2 + Math.max(0, wave) * 4;
    x += ox * push; y += oy * push;
    ctx.globalAlpha = 0.22 + 0.4 * Math.max(0, wave);
    ctx.fillStyle = (i % 4 === 0) ? "#eaffff" : "#a9e0ff";
    const s = wave > 0.4 ? 2 : 1;
    ctx.fillRect(x | 0, y | 0, s + 1, s);
  }
  ctx.globalAlpha = 1;
}

// Raycast where a shot from (x,y) along ang would first land (obstacle or range end)
function predictImpact(x, y, ang, range) {
  const dx = Math.cos(ang), dy = Math.sin(ang), step = 0.18;
  let d = step;
  for (; d < range; d += step) {
    const t = tileAt(Math.floor(x + dx * d), Math.floor(y + dy * d));
    if (!t || t.terrain === T_OBST) break;
  }
  d = Math.min(d, range);
  return { x: x + dx * d, y: y + dy * d };
}

// Aim reticle drawn on the ground at the predicted impact point
function drawReticle() {
  if (game.state !== "PLAYING" || player.dead || player.diving) return;
  const muzX = player.x + Math.cos(player.aim) * 0.4;
  const muzY = player.y + Math.sin(player.aim) * 0.4;
  const imp = predictImpact(muzX, muzY, player.aim, (player.weapon || WEAPONS[0]).range);
  const r = project(imp.x, imp.y);
  const pulse = 0.6 + 0.4 * Math.sin(bgT * 10);
  const lowInk = player.ink < SHOT_COST;
  const col = lowInk ? "#ff6b6b" : player.color;
  ctx.globalAlpha = 0.85 * pulse;
  ctx.strokeStyle = col; ctx.lineWidth = 2;
  // iso-flattened ring on the floor
  ctx.beginPath(); ctx.ellipse(r.x, r.y, 12, 6, 0, 0, TAU); ctx.stroke();
  // crosshair ticks
  ctx.beginPath();
  ctx.moveTo(r.x - 16, r.y); ctx.lineTo(r.x - 9, r.y);
  ctx.moveTo(r.x + 9, r.y);  ctx.lineTo(r.x + 16, r.y);
  ctx.moveTo(r.x, r.y - 9);  ctx.lineTo(r.x, r.y - 12);
  ctx.moveTo(r.x, r.y + 9);  ctx.lineTo(r.x, r.y + 12);
  ctx.stroke();
  // centre dot
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(r.x) - 1, Math.round(r.y) - 1, 2, 2);
  ctx.globalAlpha = 1;
}

/* ---------- ARENA RENDER (tiles -> ink -> deco -> entities -> fx) ---------- */
function drawArena() {
  // 1) tiles + ink (back-to-front by depth)
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      drawTile(map[y * MAP_W + x]);
    }
  }

  // 1b) aim reticle + impact rings on the ground (under decorations/entities)
  drawReticle();
  drawImpacts();

  // 2) build depth-sorted draw list of decorations + entities + projectiles
  const drawList = [];
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const t = map[y * MAP_W + x];
      if (t.terrain === T_OBST) drawList.push({ depth: x + y, type: "deco", t });
    }
  }
  for (const e of enemies) if (!e.dead)
    drawList.push({ depth: e.x + e.y + 0.5, type: "enemy", e });
  if (!player.dead) drawList.push({ depth: player.x + player.y + 0.5, type: "player" });
  for (const p of projectiles) if (p.alive) drawList.push({ depth: p.x + p.y + 0.4, type: "proj", p });
  // client: projectiles come from the host's snapshot (render-only blobs). Skip
  // your OWN faction's shots — those are drawn from local prediction instead so
  // there's no doubled/laggy ghost of your fire.
  if (net.role === "client") {
    for (const p of netProj) {
      if (p.f === localFaction) continue;
      const fc = FACTION_COLORS[p.f] || FACTION_COLORS[0];
      drawList.push({ depth: p.x + p.y + 0.4, type: "proj", p: { x: p.x, y: p.y, color: fc.ink, travelled: 0, range: 1 } });
    }
    for (const p of localProj) if (p.alive)
      drawList.push({ depth: p.x + p.y + 0.4, type: "proj", p: { x: p.x, y: p.y, color: p.color, travelled: p.travelled, range: p.range } });
  }
  for (const p of pickups) if (p.active) drawList.push({ depth: p.x + p.y + 0.3, type: "pickup", p });

  drawList.sort((a, b) => a.depth - b.depth);
  for (const item of drawList) {
    if (item.type === "deco") drawDeco(item.t);
    else if (item.type === "enemy") drawShark(item.e, false);
    else if (item.type === "player") drawShark(player, true);
    else if (item.type === "proj") drawProjectile(item.p);
    else if (item.type === "pickup") drawPickup(item.p);
  }

  // 3) muzzle flashes, auras, particles + floaters on top
  drawFlashes();
  drawAuras();
  drawParticles();
  drawInkStorm();
  drawFloaters();
}

// Draw a single isometric tile (diamond top + side faces for 2.5D)
function drawTile(t) {
  const p = project(t.x, t.y);
  // cull off-screen
  if (p.x < -TILE_W || p.x > VIEW_W + TILE_W || p.y < -TILE_H*3 || p.y > VIEW_H + TILE_H*3) return;

  const hw = TILE_W / 2, hh = TILE_H / 2;
  // base floor color — deep neon-tinted teal so bright ink pops
  let top = t.tint ? "#0d3a54" : "#114862";
  if (t.terrain === T_RAMP) top = "#175a7c";

  // ink overlay color blend
  let inked = false, inkC = null;
  if (t.team >= 0 && t.ink > 0) {
    inkC = t.inkColor || FACTION_COLORS[t.team].ink;
    const pulseAmt = t.pulse * 0.4;
    top = shade(inkC, -0.12 + t.ink * 0.18 + pulseAmt);
    inked = true;
  }

  // top diamond
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - hh);
  ctx.lineTo(p.x + hw, p.y);
  ctx.lineTo(p.x, p.y + hh);
  ctx.lineTo(p.x - hw, p.y);
  ctx.closePath();
  ctx.fillStyle = top;
  ctx.fill();

  // neon grid lines (cyan glow on neutral floor, brighter on inked)
  ctx.strokeStyle = inked ? "rgba(190,255,255,0.16)" : "rgba(45,210,235,0.13)";
  ctx.lineWidth = 1;
  ctx.stroke();

  // neon rim: glow along the two upper edges of an inked tile
  if (inked) {
    ctx.globalAlpha = 0.45 + t.pulse * 0.55;
    ctx.strokeStyle = shade(inkC, 0.55);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x - hw, p.y); ctx.lineTo(p.x, p.y - hh); ctx.lineTo(p.x + hw, p.y);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // side faces (thickness) — left + right, darker for depth
  const sideCol = inked
    ? shade(inkC, -0.5)
    : (t.tint ? "#072b3f" : "#0a3a52");
  ctx.fillStyle = sideCol;
  // left face
  ctx.beginPath();
  ctx.moveTo(p.x - hw, p.y);
  ctx.lineTo(p.x, p.y + hh);
  ctx.lineTo(p.x, p.y + hh + TILE_TH);
  ctx.lineTo(p.x - hw, p.y + TILE_TH);
  ctx.closePath();
  ctx.fill();
  // right face
  ctx.fillStyle = shade(sideCol, -0.12);
  ctx.beginPath();
  ctx.moveTo(p.x + hw, p.y);
  ctx.lineTo(p.x, p.y + hh);
  ctx.lineTo(p.x, p.y + hh + TILE_TH);
  ctx.lineTo(p.x + hw, p.y + TILE_TH);
  ctx.closePath();
  ctx.fill();
}

// Decoration / obstacle render (coral, rock, crate, sign, barrier)
function drawDeco(t) {
  const p = project(t.x, t.y);
  if (p.x < -TILE_W || p.x > VIEW_W + TILE_W || p.y < -TILE_H*4 || p.y > VIEW_H + TILE_H*2) return;
  const px = Math.round(p.x), py = Math.round(p.y);
  const h = (t.height || 1) * 22;

  switch (t.deco) {
    case D_CORAL: {
      // neon coral: stacked rounded blobs
      const cols = ["#ff7ad6", "#ff4fa3", "#ffa64f"];
      const c = cols[(t.x + t.y) % cols.length];
      // base rock
      ctx.fillStyle = "#2a3f4f";
      rrect(px-10, py-6, 20, 12);
      // coral branches as little columns
      for (let i = -1; i <= 1; i++) {
        const bx = px + i * 7;
        const bh = h * (0.7 + (i+1)*0.15);
        ctx.fillStyle = shade(c, -0.2);
        ctx.fillRect(bx-3, py - bh, 6, bh);
        ctx.fillStyle = c;
        ctx.fillRect(bx-3, py - bh, 4, bh);
        // glow tip
        ctx.fillStyle = shade(c, 0.4);
        ctx.fillRect(bx-3, py - bh - 4, 6, 5);
      }
      break;
    }
    case D_ROCK: {
      ctx.fillStyle = "#3a4a55";
      poly(px, py, [[-12,2],[-8,-h*0.6],[0,-h],[9,-h*0.55],[12,2]]);
      ctx.fillStyle = "#4d5f6b";
      poly(px, py, [[-12,2],[-8,-h*0.6],[-2,-h*0.5],[-2,2]]);
      // barnacle dots
      ctx.fillStyle = "#7fd6c2";
      ctx.fillRect(px+2, py - h*0.4, 3, 3);
      ctx.fillRect(px-5, py - h*0.2, 2, 2);
      break;
    }
    case D_CRATE: {
      const ch = 26;
      ctx.fillStyle = "#7a5230"; ctx.fillRect(px-12, py-ch, 24, ch);
      ctx.fillStyle = "#a06e3e"; ctx.fillRect(px-12, py-ch, 24, 6);
      ctx.fillStyle = "#5f3f23";
      ctx.fillRect(px-12, py-ch, 2, ch); ctx.fillRect(px+10, py-ch, 2, ch);
      ctx.fillRect(px-2, py-ch, 4, ch);
      // anchor symbol
      ctx.fillStyle = "#cfe9ff"; ctx.fillRect(px-1, py-ch+8, 2, 10);
      break;
    }
    case D_SIGN: {
      // neon ocean-graffiti sign on a post
      ctx.fillStyle = "#33424d"; ctx.fillRect(px-2, py-h, 4, h);
      const glow = ["#19e6ff","#ff3df0","#7cff4d"][(t.x*3+t.y)%3];
      ctx.fillStyle = "#10202b"; rrect(px-14, py-h-18, 28, 18);
      ctx.fillStyle = glow; rrect(px-12, py-h-16, 24, 14);
      ctx.fillStyle = "#06182a";
      ctx.fillRect(px-7, py-h-11, 4, 4);
      ctx.fillRect(px+3, py-h-11, 4, 4);
      ctx.fillRect(px-7, py-h-6, 14, 3);
      break;
    }
    default: { // barrier
      ctx.fillStyle = "#cf5b2a";
      ctx.fillRect(px-12, py-18, 24, 18);
      ctx.fillStyle = "#f0f0f0";
      for (let i = 0; i < 3; i++) ctx.fillRect(px-12 + i*9, py-18, 4, 18);
      ctx.fillStyle = "#2a3540"; ctx.fillRect(px-12, py-2, 24, 4);
      break;
    }
  }
}

// rounded-ish rect helper (pixel friendly = plain rect)
function rrect(x, y, w, h) { ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); }
function poly(cx, cy, pts) {
  ctx.beginPath();
  ctx.moveTo(cx + pts[0][0], cy + pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(cx + pts[i][0], cy + pts[i][1]);
  ctx.closePath(); ctx.fill();
}

/* ---------- CHARACTER: chibi shark warrior (procedural pixels) ---------- */
function drawShark(ent, isPlayer) {
  const p = project(ent.x, ent.y);
  let px = Math.round(p.x), py = Math.round(p.y);
  const col = ent.body, dark = ent.dark, ink = ent.color;   // each shark = its faction colors
  const isSelf = (ent.faction === localFaction);            // "you" = the local faction

  // i-frame blink
  if (ent.iframe > 0 && Math.floor(ent.iframe * 14) % 2 === 0) return;

  const face = ent.facing >= 0 ? 1 : -1;

  // squash/stretch
  // respawn pop: scale up from small (with a slight overshoot) over ~0.45s
  let pop = 1;
  if (ent.popIn > 0) { const k = 1 - ent.popIn / 0.45; pop = clamp(0.25 + k * 0.95, 0.25, 1.12); }
  const sq = (1 + (ent.squash || 0) * 0.3) * pop;
  const st = (1 - (ent.squash || 0) * 0.3) * pop;

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath();
  ctx.ellipse(px, py + 6, 12 * sq, 5, 0, 0, TAU);
  ctx.fill();

  // power-up auras (any entity holding the buff)
  if (ent.shield > 0) {
    ctx.strokeStyle = "rgba(255,210,61," + (0.45 + 0.4 * Math.sin(bgT * 12)) + ")";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(px, py - 12, 17, 22, 0, 0, TAU); ctx.stroke();
  }
  if (ent.speedBoost > 0 && Math.random() < 0.4)
    spawnParticle(ent.x, ent.y, rand(-0.4, 0.4), rand(-0.4, 0.4), "#7cff4d", 0.3, 1.5, 0.1);

  if (ent.diving) {
    // DIVE POSE: low silhouette, only the dorsal fin + eyes break the surface
    ctx.strokeStyle = shade(ink, 0.3); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(px, py + 2, 14, 6, 0, 0, TAU); ctx.stroke();
    ctx.fillStyle = dark; poly(px, py, [[-7 * face, 2], [3 * face, 2], [-2 * face, -12]]);
    ctx.fillStyle = col;  poly(px, py, [[-5 * face, 2], [1 * face, 2], [-2 * face, -9]]);
    // beady eyes just above the waterline
    ctx.fillStyle = "#fff"; ctx.fillRect(px + 1 * face, py - 1, 2, 2); ctx.fillRect(px + 4 * face, py - 1, 2, 2);
    ctx.fillStyle = "#06202b"; ctx.fillRect(px + 1 * face, py - 1, 1, 1); ctx.fillRect(px + 4 * face, py - 1, 1, 1);
    if (Math.random() < 0.3) spawnParticle(ent.x, ent.y, rand(-1, 1), rand(-1, 1), ink, 0.3, 1.2, 0.05);
    return;
  }

  // ============ CHIBI SHARK STREET-WARRIOR (big round head, tiny body) ============
  // Drawn facing-right from a local origin on the FEET; ctx.scale handles the
  // left/right flip + squash/stretch. Local +x = forward, -y = up.
  const bob = Math.sin(ent.walkPhase) * 1.0;
  const moving = (Math.abs(ent.vx) + Math.abs(ent.vy)) > 0.5;
  ctx.save();
  ctx.translate(px, py + 3 + bob);
  ctx.scale(face * sq, st);
  drawChibiBody(col, dark, ink, isSelf, ent.walkPhase, moving);
  ctx.restore();

  // shell-and-coral sea-ink blaster, held low in the front hand, aimed in world space
  drawBlaster(px, py - 9 + bob, ent.aim, ink, dark, ent.weaponIdx || 0);

  // floating identity tag above the head
  const ty = py - 48 + Math.sin(bgT * 4 + ent.x * 1.7) * 1.2;
  if (isSelf) {
    // "YOU" in your faction colour with a downward pointer
    ctx.textAlign = "center";
    ctx.font = "bold 8px monospace";
    ctx.fillStyle = "#06202b"; ctx.fillText("YOU", px + 1, ty + 1);
    ctx.fillStyle = ink; ctx.fillText("YOU", px, ty);
    ctx.fillStyle = "#06202b"; poly(px, ty + 8, [[-5, -4], [5, -4], [0, 4]]);
    ctx.fillStyle = ink; poly(px, ty + 7, [[-4, -4], [4, -4], [0, 3]]);
    ctx.textAlign = "left";
  } else {
    // numbered gang badge in the rival's ink colour
    const n = ((ent.id != null ? ent.id : 0) + 1);
    ctx.fillStyle = "#06202b"; ctx.beginPath(); ctx.arc(px, ty, 6.5, 0, TAU); ctx.fill();
    ctx.fillStyle = ink; ctx.beginPath(); ctx.arc(px, ty, 5, 0, TAU); ctx.fill();
    ctx.fillStyle = "#06202b"; poly(px, ty + 7, [[-3, -3], [3, -3], [0, 3]]); // pointer
    ctx.fillStyle = "#06202b"; ctx.font = "bold 8px monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(String(n), px, ty + 1);
    ctx.textBaseline = "alphabetic"; ctx.textAlign = "left";
  }

  // ink-drip droplets when moving fast
  if ((Math.abs(ent.vx) + Math.abs(ent.vy)) > 4 && Math.random() < 0.2)
    spawnParticle(ent.x, ent.y, rand(-0.5, 0.5), rand(-0.5, 0.5), ink, 0.3, 1, 0.1);
}

// The chibi shark sprite, drawn facing-right at the current transform origin
// (feet at 0,0). Shared by the in-game shark and the weapon-select preview.
function drawChibiBody(col, dark, ink, isPlayer, phase, moving) {
  const wag = Math.sin(phase * 1.2 + bgT * 5) * (moving ? 0.55 : 0.3);
  const belly = shade(col, 0.30);
  const shell = "#e3c79a", shellSh = "#bd986a", coral = "#d98f86", weed = "#3fae5a";
  const neon = ink;

  // wagging tail
  ctx.fillStyle = dark;
  poly(-8, -7, [[2, -4], [2, 4], [-10, -2 + wag * 9]]);
  // legs + seaweed ankle wraps
  ctx.fillStyle = shade(col, -0.12);
  rrect(-4, -7, 4, 7); rrect(1, -7, 4, 7);
  ctx.fillStyle = "#0b2935"; rrect(-5, -1, 6, 2); rrect(1, -1, 6, 2);
  ctx.fillStyle = weed; rrect(-4, -4.5, 4, 1.5); rrect(1, -4.5, 4, 1.5);
  // back arm
  ctx.fillStyle = dark; rrect(-7, -15, 3, 7);
  // torso + coral-shell armour
  ctx.fillStyle = col; rrect(-6, -16, 12, 10);
  ctx.fillStyle = belly; rrect(-3, -13, 6, 6);
  ctx.fillStyle = shell; poly(0, -16, [[-6, 1], [6, 1], [5, 7], [0, 9], [-5, 7]]);
  ctx.fillStyle = shellSh; rrect(-6, -16, 12, 2);
  ctx.fillStyle = coral; rrect(-1, -15, 2, 8);
  ctx.fillStyle = shell;
  ctx.beginPath(); ctx.arc(-6, -15, 3, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -15, 3, 0, TAU); ctx.fill();
  ctx.fillStyle = coral;
  ctx.beginPath(); ctx.arc(-6, -15, 1.3, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -15, 1.3, 0, TAU); ctx.fill();
  if (!isPlayer) { ctx.fillStyle = ink; rrect(-6, -9, 12, 2); }
  // big round head
  const hy = -27;
  ctx.fillStyle = dark; poly(-3, hy - 9, [[0, 2], [-4, -9], [7, -1]]);
  ctx.fillStyle = col; ctx.beginPath(); ctx.ellipse(0, hy, 12, 11, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(2, hy + 5, 8, 5, 0, 0, Math.PI); ctx.fill();
  ctx.fillStyle = shade(col, 0.18); ctx.beginPath(); ctx.ellipse(-4, hy - 6, 4, 2.5, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = col; ctx.beginPath(); ctx.ellipse(11, hy + 3, 4, 4, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = shade(col, -0.28); rrect(2, hy + 6, 11, 1.4);
  ctx.fillStyle = "#ffffff"; for (let i = 0; i < 4; i++) ctx.fillRect(4 + i * 2.4, hy + 6, 1.4, 1.6);
  ctx.fillStyle = shade(col, -0.34); for (let i = 0; i < 3; i++) ctx.fillRect(-9 + i * 1.6, hy + 1, 1, 4);
  // eyes + neon goggles
  ctx.fillStyle = "#0e2c36"; rrect(-12, hy - 4, 24, 3);
  ctx.fillStyle = shade(neon, 0.12); rrect(-12, hy - 4, 24, 1);
  const ex1 = -3, ex2 = 5, eyy = hy - 1;
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(ex1, eyy, 3.4, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, eyy, 3.4, 0, TAU); ctx.fill();
  ctx.fillStyle = "#06202b";
  ctx.beginPath(); ctx.arc(ex1 + 1, eyy, 1.7, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2 + 1, eyy, 1.7, 0, TAU); ctx.fill();
  ctx.fillStyle = "#cdf6ff"; ctx.fillRect(ex1, eyy - 1, 1, 1); ctx.fillRect(ex2, eyy - 1, 1, 1);
  ctx.strokeStyle = neon; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(ex1, eyy, 4.2, 0, TAU); ctx.stroke();
  ctx.beginPath(); ctx.arc(ex2, eyy, 4.2, 0, TAU); ctx.stroke();
  ctx.fillStyle = neon; rrect(ex1 + 3.5, eyy - 0.5, 2, 1);
  // front arm + seaweed wrist wrap
  ctx.fillStyle = col; rrect(4, -15, 4, 7);
  ctx.fillStyle = weed; rrect(4, -10, 4, 2);
  ctx.fillStyle = belly; rrect(5, -9, 3, 3);
}

// Blaster made of coral/shell parts, drawn pointing along aim angle (in world).
// Draw the held weapon, rotated toward the aim direction. `widx` selects the
// weapon silhouette (defaults to the Tide Blaster); enemies use 0.
function drawBlaster(px, py, aimWorld, ink, dark, widx) {
  const dir = worldToScreen(Math.cos(aimWorld), Math.sin(aimWorld));
  const a = Math.atan2(dir.y, dir.x);
  ctx.save();
  ctx.translate(px, py - 2);
  ctx.rotate(a);
  drawWeaponShape(widx || 0, ink, dark);
  ctx.restore();
}

// Each weapon has a distinct procedural silhouette, drawn in a local frame where
// +x is "forward" (the muzzle). Shared by the held weapon and the select icon.
function drawWeaponShape(idx, ink, dark) {
  const shell = "#e3c79a", shellLt = "#f4ead2", coral = "#d98f86", coralDk = "#b06a62";
  const glow = shade(ink, 0.4);
  if (idx === 1) {
    // ---- REEF SPRAY: stubby sprayer, top ink tank, wide multi-port fan nozzle
    ctx.fillStyle = "#b78a58"; ctx.fillRect(-1, 0, 4, 8);          // grip
    ctx.fillStyle = dark; ctx.fillRect(2, -5, 8, 11);              // body box
    ctx.fillStyle = shade(dark, 0.18); ctx.fillRect(2, -5, 8, 2);
    ctx.fillStyle = shade(ink, -0.05); ctx.beginPath(); ctx.arc(6, -7, 3.4, 0, TAU); ctx.fill(); // tank
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(5, -8, 1.2, 0, TAU); ctx.fill();
    ctx.fillStyle = shell; poly(10, 0, [[0, -6], [8, -8], [8, 8], [0, 6]]);  // flared nozzle
    ctx.fillStyle = shellLt; poly(10, 0, [[0, -6], [8, -8], [8, -6], [0, -4]]);
    ctx.fillStyle = glow; ctx.fillRect(16, -6, 2, 2); ctx.fillRect(16, -1, 2, 2); ctx.fillRect(16, 4, 2, 2); // ports
  } else if (idx === 2) {
    // ---- DEEP CANNON: big bulbous conch barrel with a huge glowing muzzle
    ctx.fillStyle = "#9c6e44"; ctx.fillRect(-2, -1, 5, 9);        // chunky grip
    ctx.fillStyle = dark; poly(3, 0, [[0, -6], [14, -9], [18, -9], [18, 9], [14, 9], [0, 6]]); // body
    ctx.fillStyle = shade(dark, 0.2); poly(3, 0, [[0, -6], [14, -9], [14, -5], [0, -2]]);       // top sheen
    ctx.fillStyle = coral; ctx.fillRect(6, -8, 2, 16); ctx.fillStyle = coralDk; ctx.fillRect(10, -9, 2, 18); // coral ridges
    ctx.fillStyle = "#06202b"; ctx.fillRect(17, -8, 4, 16);       // muzzle bore
    ctx.fillStyle = glow; ctx.fillRect(18, -6, 3, 12);
    ctx.fillStyle = ink; ctx.fillRect(19, -3, 2, 6);
  } else if (idx === 3) {
    // ---- TRIAD BURST: triple-barrel trident launcher
    ctx.fillStyle = "#b78a58"; ctx.fillRect(-1, -1, 5, 8);        // grip
    ctx.fillStyle = dark; ctx.fillRect(2, -8, 7, 16);             // breech block
    ctx.fillStyle = shade(dark, 0.18); ctx.fillRect(2, -8, 7, 2);
    ctx.fillStyle = coral; ctx.fillRect(2, -1, 7, 2);
    ctx.fillStyle = shell; ctx.fillRect(9, -8, 9, 4); ctx.fillRect(9, -2, 9, 4); ctx.fillRect(9, 4, 9, 4); // 3 barrels
    ctx.fillStyle = shellLt; ctx.fillRect(9, -8, 9, 1); ctx.fillRect(9, -2, 9, 1); ctx.fillRect(9, 4, 9, 1);
    ctx.fillStyle = glow; ctx.fillRect(16, -7, 2, 2); ctx.fillRect(16, -1, 2, 2); ctx.fillRect(16, 5, 2, 2); // muzzles
  } else {
    // ---- TIDE BLASTER: sleek balanced coral pistol
    ctx.fillStyle = "#b78a58"; ctx.fillRect(-1, 0, 4, 7);         // grip
    ctx.fillStyle = shell; ctx.fillRect(0, -3, 8, 6);             // body
    ctx.fillStyle = coral; ctx.fillRect(2, -3, 2, 6);            // coral band
    ctx.fillStyle = dark; ctx.fillRect(6, -3, 9, 6);            // barrel
    ctx.fillStyle = shellLt; ctx.fillRect(6, -3, 9, 2);
    ctx.fillStyle = glow; ctx.fillRect(14, -3, 3, 6);           // muzzle glow
    ctx.fillStyle = ink; ctx.fillRect(16, -2, 1, 4);
  }
}

function drawProjectile(p) {
  const s = project(p.x, p.y);
  const px = Math.round(s.x), py = Math.round(s.y);
  // lobbed arc: rises then falls, landing (h=0) at the end of its range so it
  // visibly "drops onto" the floor — gives the shot weight and a clear landing.
  const frac = clamp(p.travelled / p.range, 0, 1);
  const h = Math.sin(frac * Math.PI) * 16;   // pixels above the ground
  // ground shadow at the actual floor position (shows where it is / will land)
  ctx.fillStyle = "rgba(0,0,0,0.28)";
  const sw = 6 - frac * 2;
  ctx.beginPath(); ctx.ellipse(px, py, Math.max(2, sw), Math.max(1, sw * 0.5), 0, 0, TAU); ctx.fill();
  // the ink blob, drawn raised by the arc height
  const by = py - h;
  ctx.fillStyle = shade(p.color, 0.3);            // glow
  ctx.beginPath(); ctx.arc(px, by, 5, 0, TAU); ctx.fill();
  ctx.fillStyle = p.color;                          // core
  ctx.fillRect(px - 3, by - 3, 6, 6);
  ctx.fillStyle = shade(p.color, 0.5);             // highlight
  ctx.fillRect(px - 1, by - 2, 2, 2);
}

function drawParticles() {
  for (const p of particles) {
    if (!p.alive) continue;
    const s = project(p.x, p.y);
    const a = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    const sz = Math.max(1, p.size * (0.5 + a*0.5));
    ctx.fillRect(Math.round(s.x - sz/2), Math.round(s.y - sz/2 - p.z*10), Math.round(sz), Math.round(sz));
    ctx.globalAlpha = 1;
  }
}
function drawFloaters() {
  ctx.textAlign = "center";
  for (const f of floaters) {
    const s = project(f.x, f.y);
    ctx.globalAlpha = clamp(f.life, 0, 1);
    ctx.font = "bold 11px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#000";
    ctx.fillText(f.text, s.x + 1, s.y + 1);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, s.x, s.y);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = "left";
}

/* ============================================================
   15. UI RENDERING  (cohesive neon-reef HUD, scales with `UI`)
   ============================================================ */
function hudFont(px, weight) { return (weight || "bold ") + Math.round(px * UI) + "px 'Trebuchet MS', monospace"; }
function hudPanel(x, y, w, h) {
  x = Math.round(x); y = Math.round(y); w = Math.round(w); h = Math.round(h);
  ctx.fillStyle = "rgba(7,22,36,0.85)"; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = "rgba(110,225,255,0.10)"; ctx.fillRect(x, y, w, Math.max(1, 2 * UI)); // top sheen
  ctx.strokeStyle = "rgba(38,196,228,0.6)"; ctx.lineWidth = Math.max(1, UI);
  ctx.strokeRect(x + 0.5, y + 0.5, w, h);
}
function hudBar(x, y, w, h, frac, col) {
  x = Math.round(x); y = Math.round(y); w = Math.round(w); h = Math.round(h);
  ctx.fillStyle = "#06202e"; ctx.fillRect(x, y, w, h);
  const fw = Math.round((w - 2) * clamp(frac, 0, 1));
  if (fw > 0) {
    ctx.fillStyle = col; ctx.fillRect(x + 1, y + 1, fw, h - 2);
    ctx.fillStyle = "rgba(255,255,255,0.22)"; ctx.fillRect(x + 1, y + 1, fw, 1); // gloss
  }
}
function pauseBtn() { return { x: VIEW_W - safeR - 20 * UI, y: safeT + 18 * UI, r: 12 * UI }; }
function ovScale() { return clamp(Math.min(VIEW_W / 520, VIEW_H / 360), 0.6, 1.6); }
function inRect(px, py, r) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }

// chunky segmented bar (the green-bar look from the HUD mock-up)
function segBar(x, y, w, h, frac, col) {
  x = Math.round(x); y = Math.round(y); w = Math.round(w); h = Math.round(h);
  ctx.fillStyle = "#06202e"; ctx.fillRect(x, y, w, h);
  const fw = Math.round((w - 2) * clamp(frac, 0, 1));
  if (fw > 0) {
    ctx.fillStyle = col; ctx.fillRect(x + 1, y + 1, fw, h - 2);
    ctx.fillStyle = "rgba(255,255,255,0.22)"; ctx.fillRect(x + 1, y + 1, fw, Math.max(1, Math.round(h * 0.28)));
  }
  const seg = Math.max(5, Math.round(w / 9));
  ctx.fillStyle = "rgba(3,12,22,0.7)";
  for (let sx = x + seg; sx < x + w - 1; sx += seg) ctx.fillRect(sx, y, Math.max(1, Math.round(UI)), h);

function barText(cx, cy, txt) {
  ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = hudFont(8);
  ctx.fillStyle = "rgba(3,12,22,0.85)"; ctx.fillText(txt, cx + 1, cy + 1);

// round shark portrait for the status panel
function drawSharkPortrait(cx, cy, r) {
  const pBody = player.body || PLAYER_BODY, pDark = player.dark || PLAYER_BODY_DARK, pInk = player.color || PLAYER_COLOR;
  ctx.fillStyle = "#0c2c3a"; ctx.beginPath(); ctx.arc(cx, cy, r + 2, 0, TAU); ctx.fill();
  ctx.fillStyle = pBody; ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.fill();
  ctx.fillStyle = shade(pBody, 0.28); ctx.beginPath(); ctx.ellipse(cx, cy + r * 0.42, r * 0.7, r * 0.45, 0, 0, Math.PI); ctx.fill();
  ctx.fillStyle = pDark; poly(cx - 1, cy - r * 0.78, [[0, 3], [-4, -6], [6, -1]]); // fin
  ctx.fillStyle = "#0e2c36"; rrect(cx - r * 0.92, cy - r * 0.28, r * 1.84, r * 0.3); // goggle strap
  const ex = r * 0.42, ey = cy - r * 0.06, er = r * 0.3;
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(cx - ex, ey, er, 0, TAU); ctx.fill(); ctx.beginPath(); ctx.arc(cx + ex, ey, er, 0, TAU); ctx.fill();
  ctx.fillStyle = "#06202b";
  ctx.beginPath(); ctx.arc(cx - ex + 1, ey, er * 0.5, 0, TAU); ctx.fill(); ctx.beginPath(); ctx.arc(cx + ex + 1, ey, er * 0.5, 0, TAU); ctx.fill();
  ctx.strokeStyle = pInk; ctx.lineWidth = Math.max(1, UI);
  ctx.beginPath(); ctx.arc(cx - ex, ey, er + 1, 0, TAU); ctx.stroke(); ctx.beginPath(); ctx.arc(cx + ex, ey, er + 1, 0, TAU); ctx.stroke();
  ctx.fillStyle = "#fff"; for (let i = 0; i < 3; i++) ctx.fillRect(cx - r * 0.32 + i * r * 0.26, cy + r * 0.52, r * 0.13, r * 0.2); // teeth
  // HP-tinted rim
  ctx.strokeStyle = player.hp > 40 ? "#37e07a" : "#ff5b5b"; ctx.lineWidth = Math.max(1.5, 1.6 * UI);
  ctx.beginPath(); ctx.arc(cx, cy, r + 2, 0, TAU); ctx.stroke();
}
function drawAbilityGlyph(type, x, y, s, col) {
  ctx.save(); ctx.translate(x, y); ctx.fillStyle = col;
  if (type === "ink") { ctx.beginPath(); ctx.arc(0, s * 0.3, s * 0.6, 0, TAU); ctx.fill(); poly(0, -s * 0.9, [[-s * 0.45, s * 0.7], [s * 0.45, s * 0.7], [0, -s * 0.3]]); }
  else if (type === "speed") { poly(-s * 0.55, 0, [[0, -s * 0.7], [0, s * 0.7], [s * 0.55, 0]]); poly(s * 0.05, 0, [[0, -s * 0.7], [0, s * 0.7], [s * 0.55, 0]]); }
  else if (type === "shield") { poly(0, -s * 0.85, [[-s * 0.7, 0], [s * 0.7, 0], [s * 0.7, s * 0.5], [0, s], [-s * 0.7, s * 0.5]]); }
  else { ctx.beginPath(); for (let i = 0; i < 10; i++) { const a = -Math.PI / 2 + i * Math.PI / 5, rr = (i % 2) ? s * 0.45 : s; ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr); } ctx.closePath(); ctx.fill(); }
  ctx.restore();
}
function drawAbilityIcon(x, y, r, type, color, active) {
  ctx.globalAlpha = active ? 1 : 0.45;
  ctx.fillStyle = active ? shade(color, -0.55) : "rgba(8,30,46,0.85)";
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = Math.max(1.5, 2 * UI);
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.stroke();
  drawAbilityGlyph(type, x, y, r * 0.55, active ? color : "#7fb0c6");
  ctx.globalAlpha = 1;
}
function drawGear(x, y, r, col) {
  ctx.fillStyle = col;
  for (let i = 0; i < 8; i++) { ctx.save(); ctx.translate(x, y); ctx.rotate(i / 8 * TAU); ctx.fillRect(-r * 0.18, -r - 2 * UI, r * 0.36, r * 0.5); ctx.restore(); }
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
  ctx.fillStyle = "#06202b"; ctx.beginPath(); ctx.arc(x, y, r * 0.42, 0, TAU); ctx.fill();
}

function drawHUD() {
  const pad = 8 * UI;
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";

  // ===== TOP-LEFT: status panel (portrait + segmented bars + ability icons) =====
  const cw = 182 * UI, ch = 92 * UI;
  hudPanel(pad, pad, cw, ch);
  const portR = 15 * UI, portX = pad + portR + 9 * UI, portY = pad + 23 * UI;
  drawSharkPortrait(portX, portY, portR);
  const bx = portX + portR + 8 * UI, bw = pad + cw - bx - 8 * UI, bh = 11 * UI;
  let yy = pad + 7 * UI;
  segBar(bx, yy, bw, bh, player.hp / PLAYER_MAX_HP, player.hp > 40 ? "#37e07a" : "#ff5b5b");
  barText(bx + bw / 2, yy + bh / 2, Math.round(player.hp) + " / " + PLAYER_MAX_HP); yy += bh + 4 * UI;
  segBar(bx, yy, bw, bh, player.ink / INK_MAX, player.ink < SHOT_COST ? "#4b6b78" : player.color);
  barText(bx + bw / 2, yy + bh / 2, "INK  " + Math.round(player.ink)); yy += bh + 4 * UI;
  const ready = player.special >= 100;
  ctx.globalAlpha = ready ? (0.6 + 0.4 * Math.sin(bgT * 8)) : 1;
  segBar(bx, yy, bw, bh, player.special / 100, ready ? "#ffd23d" : "#b56bff");
  ctx.globalAlpha = 1;
  barText(bx + bw / 2, yy + bh / 2, ready ? "SPECIAL" : "SP  " + Math.round(player.special) + "%");
  // ability icon row
  const iconY = pad + ch - 15 * UI, iconR = 9 * UI; let icx = pad + 14 * UI;
  drawAbilityIcon(icx, iconY, iconR, "special", "#ffd23d", ready); icx += 23 * UI;
  drawAbilityIcon(icx, iconY, iconR, "speed", "#7cff4d", player.speedBoost > 0); icx += 23 * UI;
  drawAbilityIcon(icx, iconY, iconR, "shield", "#ffd23d", player.shield > 0); icx += 23 * UI;
  drawAbilityIcon(icx, iconY, iconR, "ink", player.color, player.ink >= INK_MAX - 1); icx += 20 * UI;
  if (ready) {
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(bgT * 8);
    ctx.fillStyle = "#ffd23d"; ctx.font = hudFont(9); ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText(isTouch ? "READY!" : "SPECIAL READY!", icx, iconY);
    ctx.globalAlpha = 1; ctx.textBaseline = "alphabetic";
  } else if (player.diving) {
    ctx.fillStyle = "#37e07a"; ctx.font = hudFont(9); ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText("DIVING", icx, iconY); ctx.textBaseline = "alphabetic";
  }
  ctx.textAlign = "left";

  // ===== TOP-CENTRE: timer + 4-faction territory =====
  const tw = 142 * UI, th = 50 * UI, tx = VIEW_W / 2 - tw / 2, ty = pad;
  hudPanel(tx, ty, tw, th);
  const t = Math.max(0, Math.ceil(game.time));
  const timeStr = Math.floor(t / 60) + ":" + (t % 60 < 10 ? "0" : "") + (t % 60);
  ctx.textAlign = "center";
  ctx.fillStyle = game.time < 30 ? "#ff6b6b" : "#eaffff"; ctx.font = hudFont(17);
  ctx.fillText(timeStr, VIEW_W / 2, ty + 18 * UI);
  // segmented bar split between you + the three rival gangs
  const trX = tx + 10 * UI, trY = ty + 24 * UI, trW = tw - 20 * UI, trH = 9 * UI;
  ctx.fillStyle = "#06202e"; ctx.fillRect(Math.round(trX), Math.round(trY), Math.round(trW), Math.round(trH));
  const fp = game.pct.factions || [0, 0, 0, 0];
  const facs = [[fp[localFaction] || 0, FACTION_COLORS[localFaction].ink]];   // you first
  for (let i = 0; i < 4; i++) if (i !== localFaction) facs.push([fp[i] || 0, FACTION_COLORS[i].ink]);
  let xo = trX;
  for (const f of facs) {
    const w = trW * f[0] / 100;
    if (w > 0.5) { ctx.fillStyle = f[1]; ctx.fillRect(Math.round(xo), Math.round(trY), Math.ceil(w), Math.round(trH)); }
    xo += w;
  }
  ctx.strokeStyle = "rgba(40,196,228,0.45)"; ctx.lineWidth = 1; ctx.strokeRect(Math.round(trX) + 0.5, Math.round(trY) + 0.5, Math.round(trW), Math.round(trH));
  // four mini legend chips: [square] %
  ctx.font = hudFont(7); ctx.textBaseline = "alphabetic"; ctx.textAlign = "left";
  const cwc = trW / 4;
  for (let i = 0; i < 4; i++) {
    const f = facs[i], cxp = trX + cwc * i;
    ctx.fillStyle = f[1]; ctx.fillRect(Math.round(cxp), Math.round(trY + trH + 3 * UI), Math.round(4 * UI), Math.round(4 * UI));
    ctx.fillStyle = i === 0 ? "#eaffff" : "#cfe9ff";
    ctx.fillText(Math.round(f[0]) + "%", cxp + 6 * UI, trY + trH + 8 * UI);
  }
  ctx.textAlign = "left";

  // ===== pause button (top-right) — clean two-bar pause glyph (solo only) =====
  if (!net.role) {
    const pb = pauseBtn();
    ctx.fillStyle = "rgba(7,22,36,0.9)"; ctx.beginPath(); ctx.arc(pb.x, pb.y, pb.r + 2 * UI, 0, TAU); ctx.fill();
    ctx.strokeStyle = "rgba(60,196,228,0.8)"; ctx.lineWidth = Math.max(1.5, 1.6 * UI);
    ctx.beginPath(); ctx.arc(pb.x, pb.y, pb.r + 2 * UI, 0, TAU); ctx.stroke();
    ctx.fillStyle = "#bfe9ff";
    const pbarW = Math.max(2, pb.r * 0.32), pbarH = pb.r * 1.05, pbarG = pb.r * 0.34;
    rrect(pb.x - pbarG - pbarW, pb.y - pbarH / 2, pbarW, pbarH);
    rrect(pb.x + pbarG, pb.y - pbarH / 2, pbarW, pbarH);
  }

  // ===== dead overlay (fades in so the death VFX is visible first) =====
  if (player.dead) {
    const S = ovScale();
    const elapsed = RESPAWN_DELAY - player.respawn;
    const fade = clamp(elapsed / 0.6, 0, 1);   // ramp over the first 0.6s
    ctx.fillStyle = "rgba(0,0,0," + (0.42 * fade) + ")"; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.globalAlpha = fade;
    ctx.textAlign = "center"; ctx.fillStyle = "#ff8a8a"; ctx.font = "bold " + Math.round(26 * S) + "px 'Trebuchet MS'";
    ctx.fillText("WIPED OUT!", VIEW_W / 2, VIEW_H / 2 - 6 * S);
    ctx.fillStyle = "#cfe9ff"; ctx.font = "bold " + Math.round(13 * S) + "px monospace";
    ctx.fillText("respawning in " + player.respawn.toFixed(1) + "s", VIEW_W / 2, VIEW_H / 2 + 18 * S);
    ctx.globalAlpha = 1; ctx.textAlign = "left";
  }
}

// Minimap (radar) top-right showing ink ownership
function drawMinimap() {
  const mw = 84 * UI, box = mw / MAP_W;
  // keep clear of the device's right/top safe area (notch / nav bar)
  const mx = VIEW_W - mw - safeR - 12 * UI, my = safeT + 42 * UI;
  hudPanel(mx - 4 * UI, my - 4 * UI, mw + 8 * UI, mw + 8 * UI);
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const t = map[y * MAP_W + x];
      let c;
      if (t.terrain === T_OBST) c = "#0a1f2e";
      else if (t.team >= 0) c = t.inkColor || FACTION_COLORS[t.team].ink;
      else c = "#16384b";
      ctx.fillStyle = c;
      ctx.fillRect(Math.floor(mx + x * box), Math.floor(my + y * box), Math.ceil(box), Math.ceil(box));
    }
  }
  // player blip (white, pulsing)
  ctx.fillStyle = "#fff";
  const ps = Math.max(2, 3 * UI);
  ctx.fillRect(Math.round(mx + player.x * box - ps / 2), Math.round(my + player.y * box - ps / 2), ps, ps);
  // enemy blips
  for (const e of enemies) if (!e.dead) {
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(Math.round(mx + e.x * box - 1), Math.round(my + e.y * box - 1), Math.max(2, 2 * UI), Math.max(2, 2 * UI));
  }
}

// pick the largest font size (<= maxPx) at which `text` fits within maxW
function fitFont(text, maxW, maxPx, family) {
  family = family || "'Trebuchet MS', sans-serif";
  let px = Math.max(7, Math.floor(maxPx));
  ctx.font = "bold " + px + "px " + family;
  while (px > 7 && ctx.measureText(text).width > maxW) {
    px--; ctx.font = "bold " + px + "px " + family;
  }
  return px;
}

/* ---------- LOBBY (multiplayer) ---------- */
// A "◀  LABEL: value  ▶" picker row. Draws a small caption, the value, and two
// triangle arrows; returns the { prev, next } hit-rects (null arrows when disabled).
function lobbySelectorRow(cx, y, halfW, label, value, S, enabled) {
  ctx.textAlign = "center";
  ctx.fillStyle = "#7fb0c6"; ctx.font = "bold " + Math.round(8 * S) + "px monospace";
  ctx.fillText(label, cx, y - 11 * S);
  let fs = 14 * S; ctx.font = "bold " + Math.round(fs) + "px 'Trebuchet MS', sans-serif";
  while (ctx.measureText(value).width > halfW * 1.6 && fs > 8) { fs--; ctx.font = "bold " + Math.round(fs) + "px 'Trebuchet MS', sans-serif"; }
  ctx.fillStyle = enabled ? "#eaffff" : "#9cc7da";
  ctx.fillText(value, cx, y + 5 * S);
  if (!enabled) return { prev: null, next: null };
  const lx = cx - halfW, rx = cx + halfW;
  ctx.fillStyle = "#19e6ff";
  poly(lx, y, [[7 * S, -8 * S], [7 * S, 8 * S], [-7 * S, 0]]);
  poly(rx, y, [[-7 * S, -8 * S], [-7 * S, 8 * S], [7 * S, 0]]);
  const r = 18 * S;
  return { prev: { x: lx - r, y: y - r, w: 2 * r, h: 2 * r }, next: { x: rx - r, y: y - r, w: 2 * r, h: 2 * r } };
}

// change MY lobby weapon (and tell the host, if I'm a client)
function lobbyCycleWeapon(d) {
  cycleWeapon(d);

function lobbyTap(p) {
  if (!net.mode) {
    if (inR(p, lobbyUI.host)) { sfx("ui"); netHost(); }
    else if (inR(p, lobbyUI.join)) {
      sfx("ui");
      const c = (typeof prompt === "function") ? prompt("Enter room code:") : "";
      if (c && c.trim()) netJoin(c.trim().toUpperCase());
    } else if (inR(p, lobbyUI.back)) { sfx("ui"); netReset(); game.state = "TITLE"; }
    return;
  }
  // shared loadout controls (host + client)
  if (inR(p, lobbyUI.name)) { lobbyRename(); return; }
  if (inR(p, lobbyUI.wPrev)) { lobbyCycleWeapon(-1); return; }
  if (inR(p, lobbyUI.wNext)) { lobbyCycleWeapon(1); return; }
  if (inR(p, lobbyUI.sPrev)) { lobbyCycleStage(-1); return; }
  if (inR(p, lobbyUI.sNext)) { lobbyCycleStage(1); return; }
  if (net.role === "host") {
    if (inR(p, lobbyUI.start)) {
      sfx("ui");
      // hard block: need at least one joiner AND everyone readied — no force start
      if (!canStartMatch()) {
        net.startWarned = true;
        if (net.players.length < 2) {
          net.status = "Can't start yet — waiting for players to join";
        } else {
          const waiting = net.players.filter(pl => pl.faction !== 0 && !pl.ready);
          net.status = (waiting.length === 1)
            ? ("Can't start — " + waiting[0].name + " isn't ready")
            : ("Can't start — " + waiting.length + " players aren't ready");
        }
        return;
      }
      netStartHost();
    } else if (inR(p, lobbyUI.leave)) { sfx("ui"); netReset(); game.state = "TITLE"; }
  } else {
    if (inR(p, lobbyUI.ready)) {
      sfx("ui");
      const me = net.players.find(x => x.faction === localFaction);
      const nr = !(me && me.ready); if (me) me.ready = nr;
      if (net.hostConn && net.hostConn.open) { try { net.hostConn.send({ t: "ready", ready: nr }); } catch (e) {} }
    } else if (inR(p, lobbyUI.leave)) { sfx("ui"); netReset(); game.state = "TITLE"; }
  }
}
