/* ============================================================
   9. PLAYER LOGIC
   ============================================================ */
function speedForTile(ent, owner, diving) {
  const ownsHere = (owner === OWN_PLAYER && ent === player) ||
                   (owner === OWN_ENEMY && ent !== player);
  const enemyHere = owner !== OWN_NONE && !ownsHere;
  if (diving && ownsHere) return PLAYER_SPEED_DIVE;
  if (ownsHere) return PLAYER_SPEED_OWN_INK;
  if (enemyHere) return PLAYER_SPEED_ENEMY_INK;
  return PLAYER_SPEED_NORMAL;
}

// Circle-vs-tile collision: try to move, blocked by obstacle tiles.
function moveEntity(ent, mvx, mvy, dt) {
  const rad = 0.32;
  let nx = ent.x + mvx * dt;
  let ny = ent.y + mvy * dt;
  // resolve X
  if (!collides(nx, ent.y, rad)) ent.x = nx;
  else { ent.vx = 0; }
  // resolve Y
  if (!collides(ent.x, ny, rad)) ent.y = ny;
  else { ent.vy = 0; }
  ent.x = clamp(ent.x, 1.0, MAP_W - 2.0);
  ent.y = clamp(ent.y, 1.0, MAP_H - 2.0);
}
function collides(x, y, rad) {
  // check the 4 tile corners around the point
  for (let oy = -1; oy <= 1; oy++) {
    for (let ox = -1; ox <= 1; ox++) {
      const tx = Math.floor(x + ox * rad);
      const ty = Math.floor(y + oy * rad);
      const t = tileAt(tx, ty);
      if (t && t.terrain === T_OBST) {
        // AABB overlap of point-circle vs tile cell
        const cx = clamp(x, tx, tx + 1);
        const cy = clamp(y, ty, ty + 1);
        if (dist2(x, y, cx, cy) < rad * rad) return true;
      }
    }
  }
  return false;
}

function updatePlayer(dt) {
  if (player.dead) {
    player.respawn -= dt;
    if (player.respawn <= 0) {
      player.dead = false; player.hp = PLAYER_MAX_HP; player.ink = INK_MAX;
      player.x = PLAYER_SPAWN.x; player.y = PLAYER_SPAWN.y; player.iframe = PLAYER_IFRAMES * 1.5;
      paintTiles(player.x, player.y, 2.0, OWN_PLAYER, PLAYER_COLOR);
    }
    return;
  }

  // --- gather movement input ---
  let ix = 0, iy = 0;
  if (keys["w"] || keys["arrowup"])   iy -= 1;
  if (keys["s"] || keys["arrowdown"]) iy += 1;
  if (keys["a"] || keys["arrowleft"]) ix -= 1;
  if (keys["d"] || keys["arrowright"])ix += 1;
  if (moveStick.active) { ix += moveStick.dx; iy += moveStick.dy; }
  // screen-axis input -> world axis (rotate into iso grid space)
  // Moving "up" on screen should move toward -x,-y in world. Convert:
  let wx = (ix + iy);
  let wy = (iy - ix);
  const il = Math.hypot(wx, wy);
  if (il > 0.001) { wx /= il; wy /= il; }
  // apply input magnitude (joystick analog)
  const inMag = Math.min(1, Math.hypot(ix, iy));

  const tHere = tileAt(Math.floor(player.x), Math.floor(player.y));
  const ownerHere = tHere ? tHere.owner : OWN_NONE;

  // --- dive logic ---
  const wantDive = keys["shift"] || btnDive.pressed;
  const onOwnInk = ownerHere === OWN_PLAYER;
  if (wantDive && onOwnInk) player.diving = true;
  if (!wantDive || !onOwnInk) player.diving = false;
  if (player.diving && !player.wasDiving) sfx("dive");
  player.wasDiving = player.diving;

  player.speed = speedForTile(player, ownerHere, player.diving);
  if (player.speedBoost > 0) player.speed *= 1.4;   // SPEED power-up
  const sp = player.speed * inMag;
  player.vx = wx * sp; player.vy = wy * sp;
  if (il > 0.001) {
    moveEntity(player, player.vx, player.vy, dt);
    player.walkPhase += dt * 10;
    // facing for sprite flip based on world dx mapped to screen
    const scr = worldToScreen(wx, wy);
    player.facing = scr.x >= 0 ? 1 : -1;
  }

  // --- aim ---
  if (isTouch && aimStick.active && (Math.abs(aimStick.dx) + Math.abs(aimStick.dy) > 0.15)) {
    // aim in world space from stick (screen) direction
    const w = screenToWorld(aimStick.dx, aimStick.dy);
    player.aim = Math.atan2(w.y, w.x);
    const scr = worldToScreen(Math.cos(player.aim), Math.sin(player.aim));
    player.facing = scr.x >= 0 ? 1 : -1;
  } else if (!isTouch) {
    // mouse aim: convert mouse screen pos to the world point under the cursor
    const worldTarget = screenToWorld(
      (mouseScreenX - VIEW_W/2 + camera.x),
      (mouseScreenY - VIEW_H/2 + camera.y)
    );
    player.aim = Math.atan2(worldTarget.y - player.y, worldTarget.x - player.x);
    const scr = worldToScreen(Math.cos(player.aim), Math.sin(player.aim));
    player.facing = scr.x >= 0 ? 1 : -1;
  }

  // --- shooting ---
  player.shootCd -= dt;
  const wantShoot = (mouseDown || keys[" "] || btnShoot.pressed);
  if (wantShoot && !player.diving && player.shootCd <= 0 && player.ink >= SHOT_COST) {
    player.shootCd = 0.13;
    player.ink -= SHOT_COST;
    player.special = Math.min(100, player.special + 1.3); // build SPECIAL meter
    player.squash = -0.5; // recoil stretch
    const ang = player.aim + rand(-0.05, 0.05);
    const dx = Math.cos(ang), dy = Math.sin(ang);
    // muzzle offset
    spawnProjectile(player.x + dx*0.4, player.y + dy*0.4, dx, dy, OWN_PLAYER, PLAYER_COLOR, PLAYER_COLOR_DARK, 11, 6.5, true);
    addFlash(player.x + dx*0.45, player.y + dy*0.45, ang, PLAYER_COLOR); // muzzle VFX
    sfx("shoot");
  }

  // ulti flash decay
  if (player.ultiFlash > 0) player.ultiFlash -= dt;

  // --- ink recharge ---
  rechargeInk(player, ownerHere === OWN_PLAYER, ownerHere, dt);

  // --- enemy-ink damage over time ---
  if (ownerHere === OWN_ENEMY && !player.diving) {
    damagePlayer(dt * 4, true);
  }

  // timers
  if (player.iframe > 0) player.iframe -= dt;
  if (player.speedBoost > 0) player.speedBoost -= dt;
  if (player.shield > 0) player.shield -= dt;
  player.squash = lerp(player.squash, 0, dt * 10);
}

function rechargeInk(ent, onOwn, ownerHere, dt) {
  if (onOwn) ent.ink += (ent.diving ? 60 : 22) * dt;
  else if (ownerHere === OWN_NONE) ent.ink += 5 * dt;
  // enemy ink: no recharge
  ent.ink = clamp(ent.ink, 0, INK_MAX);
}

function damagePlayer(amount, fromInk) {
  if (player.dead) return;
  if (player.shield > 0) {                 // SHIELD power-up absorbs all damage
    if (!fromInk) { spawnFloater(player.x, player.y - 1, "BLOCKED", "#ffd23d"); }
    return;
  }
  if (!fromInk && player.iframe > 0) return;
  player.hp -= amount;
  if (!fromInk) {
    player.iframe = PLAYER_IFRAMES;
    game.shake = Math.min(8, game.shake + 4);
    game.flash = 0.4;
    spawnFloater(player.x, player.y - 1, "-" + Math.round(amount), "#ff5b5b");
    sfx("hurt");
  }
  if (player.hp <= 0 && !player.dead) {
    player.hp = 0; player.dead = true; player.respawn = RESPAWN_DELAY; player.diving = false;
    // death burst
    for (let i = 0; i < 24; i++)
      spawnParticle(player.x, player.y, rand(-4,4), rand(-4,4), PLAYER_COLOR, rand(0.4,0.9), rand(1.5,3));
    game.shake = 12;
    sfx("splat");
  }
}

/* SPECIAL / ULTI — "INK STORM": when the meter is full, blast a huge ring of
   player ink around the shark, damage nearby rivals, and refill the ink tank. */
function tryUlti() {
  if (game.state !== "PLAYING" || player.dead || player.diving) return;
  if (player.special < 100) return;
  player.special = 0;
  player.ink = INK_MAX;
  player.ultiFlash = 0.6;
  player.iframe = Math.max(player.iframe, 0.4); // brief safety on cast
  game.shake = Math.min(14, game.shake + 10);
  // big paint burst in expanding rings
  for (let r = 1.4; r <= 5.0; r += 0.7) paintTiles(player.x, player.y, r, OWN_PLAYER, PLAYER_COLOR);
  // damage + knock enemies in range
  for (const e of enemies)
    if (!e.dead && dist(player.x, player.y, e.x, e.y) < 5.0) damageEnemy(e, 45);
  // particle ring
  for (let i = 0; i < 40; i++) {
    const a = (i / 40) * TAU;
    spawnParticle(player.x, player.y, Math.cos(a) * rand(3, 7), Math.sin(a) * rand(3, 7), PLAYER_COLOR, rand(0.5, 1.0), rand(2, 4));
  }
  spawnFloater(player.x, player.y - 1.5, "INK STORM!", PLAYER_COLOR);
  sfx("ulti");
}

/* ============================================================
   10. ENEMY AI
   ============================================================ */
function updateEnemy(e, dt) {
  if (e.dead) {
    e.respawn -= dt;
    if (e.respawn <= 0) {
      e.dead = false; e.hp = ENEMY_MAX_HP; e.ink = INK_MAX;
      e.x = e.spawn[0]; e.y = e.spawn[1]; e.iframe = 1.0;
      paintTiles(e.x, e.y, 2.0, OWN_ENEMY, e.color);
    }
    return;
  }
  e.stateTimer -= dt;
  e.shootCd -= dt;
  if (e.iframe > 0) e.iframe -= dt;
  if (e.speedBoost > 0) e.speedBoost -= dt;
  if (e.shield > 0) e.shield -= dt;

  const tHere = tileAt(Math.floor(e.x), Math.floor(e.y));
  const ownerHere = tHere ? tHere.owner : OWN_NONE;
  const onOwn = ownerHere === OWN_ENEMY;

  const dToPlayer = (player.dead) ? 999 : dist(e.x, e.y, player.x, player.y);
  // player diving reduces detection radius
  const detect = player.diving ? 3.5 : 7.0;

  // --- choose state ---
  if (e.stateTimer <= 0) {
    if (e.ink < 25) e.state = "RECHARGE";
    else if (dToPlayer < detect) e.state = "CHASE";
    else e.state = "PAINT";
    e.stateTimer = rand(1.2, 2.8);

    if (e.state === "PAINT") {
      // grab a nearby power-up if one is close, otherwise wander to paint
      let best = null, bestD = 7;
      for (const p of pickups) {
        if (!p.active) continue;
        const d = dist(e.x, e.y, p.x, p.y);
        if (d < bestD) { bestD = d; best = p; }
      }
      if (best) { e.targetX = best.x; e.targetY = best.y; }
      else {
        e.targetX = clamp(e.x + rand(-6, 6), 2, MAP_W - 3);
        e.targetY = clamp(e.y + rand(-6, 6), 2, MAP_H - 3);
      }
    } else if (e.state === "RECHARGE") {
      // head toward nearest own-ink-ish: just hold near current or wander to own puddle
      e.targetX = e.spawn[0]; e.targetY = e.spawn[1];
    }
  }

  // chase overrides target each frame
  if (e.state === "CHASE" && !player.dead) {
    e.targetX = player.x; e.targetY = player.y;
    e.aim = Math.atan2(player.y - e.y, player.x - e.x);
  }

  // --- dive when recharging on own ink ---
  e.diving = (e.state === "RECHARGE" && onOwn && e.ink < INK_MAX - 5);

  // --- A* path planning toward the target tile (throttled per agent) ---
  e.pathCd -= dt;
  const gx = clamp(Math.round(e.targetX), 1, MAP_W - 2);
  const gy = clamp(Math.round(e.targetY), 1, MAP_H - 2);
  if (e.pathCd <= 0 || e.pgx !== gx || e.pgy !== gy) {
    e.pathCd = 0.4 + Math.random() * 0.3;
    e.pgx = gx; e.pgy = gy;
    // snap an unwalkable goal to the nearest open tile
    let ggx = gx, ggy = gy;
    if (!isWalkable(ggx, ggy)) {
      search: for (let r = 1; r <= 3; r++)
        for (let oy = -r; oy <= r; oy++)
          for (let ox = -r; ox <= r; ox++)
            if (isWalkable(gx + ox, gy + oy)) { ggx = gx + ox; ggy = gy + oy; break search; }
    }
    e.path = aStar(Math.floor(e.x), Math.floor(e.y), ggx, ggy);
    e.pathIdx = 0;
  }

  // --- steering: follow the path's next waypoint, else head straight ---
  let tx = e.targetX, ty = e.targetY;
  if (e.path && e.path.length) {
    while (e.pathIdx < e.path.length &&
           dist(e.x, e.y, e.path[e.pathIdx].x + 0.5, e.path[e.pathIdx].y + 0.5) < 0.45) e.pathIdx++;
    if (e.pathIdx < e.path.length) { tx = e.path[e.pathIdx].x + 0.5; ty = e.path[e.pathIdx].y + 0.5; }
  }
  let dx = tx - e.x, dy = ty - e.y;
  const d = Math.hypot(e.targetX - e.x, e.targetY - e.y) || 1; // distance to FINAL goal
  const dl = Math.hypot(dx, dy) || 1;
  dx /= dl; dy /= dl;
  // micro-avoidance safety: if the immediate step is blocked, sidestep
  if (collides(e.x + dx * 0.7, e.y + dy * 0.7, 0.34)) {
    const tmp = dx; dx = -dy; dy = tmp; // rotate 90°
  }

  let spd = speedForTile(e, ownerHere, e.diving);
  if (e.speedBoost > 0) spd *= 1.4;                 // SPEED power-up
  if (e.state === "RECHARGE" && onOwn) spd *= 0.4; // sit and recharge
  if (d > 0.25) {
    e.vx = dx * spd; e.vy = dy * spd;
    moveEntity(e, e.vx, e.vy, dt);
    e.walkPhase += dt * 8;
    if (e.state !== "CHASE") e.aim = Math.atan2(dy, dx);
  }
  const scr = worldToScreen(dx, dy);
  e.facing = scr.x >= 0 ? 1 : -1;

  // --- shooting ---
  const canSeePlayer = e.state === "CHASE" && dToPlayer < 9 && !player.dead && !player.diving;
  if (!e.diving && e.shootCd <= 0 && e.ink >= SHOT_COST) {
    let shoot = false;
    let ang = e.aim;
    if (canSeePlayer) {
      // lead aim slightly
      ang = Math.atan2(player.y - e.y, player.x - e.x) + rand(-0.12, 0.12);
      shoot = true; e.shootCd = rand(0.45, 0.9);
    } else if (e.state === "PAINT" && Math.random() < 0.5) {
      ang = e.aim + rand(-0.2, 0.2);
      shoot = true; e.shootCd = rand(0.5, 1.1);
    }
    if (shoot) {
      e.ink -= SHOT_COST;
      e.squash = -0.4;
      const cx = Math.cos(ang), cy = Math.sin(ang);
      spawnProjectile(e.x + cx*0.4, e.y + cy*0.4, cx, cy, OWN_ENEMY, e.color, e.dark, 9.5, 6, false);
      addFlash(e.x + cx*0.45, e.y + cy*0.45, ang, e.color); // muzzle VFX
      if (dist(e.x, e.y, player.x, player.y) < 11) sfx("eshoot"); // only audible if near
    }
  }

  rechargeInk(e, onOwn, ownerHere, dt);
  e.squash = lerp(e.squash, 0, dt * 10);
}

// Keep sharks from stacking: softly push overlapping entities apart (only into
// non-obstacle space) so enemies spread out instead of clumping on one target.
function resolveSeparation() {
  const MIN = 0.72;
  for (let i = 0; i < enemies.length; i++) {
    const a = enemies[i]; if (a.dead) continue;
    for (let j = i + 1; j < enemies.length; j++) {
      const b = enemies[j]; if (b.dead) continue;
      let dx = b.x - a.x, dy = b.y - a.y;
      let d = Math.hypot(dx, dy);
      if (d > 0.0001 && d < MIN) {
        dx /= d; dy /= d;
        const push = (MIN - d) * 0.5;
        const ax = a.x - dx * push, ay = a.y - dy * push;
        const bx = b.x + dx * push, by = b.y + dy * push;
        if (!collides(ax, ay, 0.3)) { a.x = ax; a.y = ay; }
        if (!collides(bx, by, 0.3)) { b.x = bx; b.y = by; }
      }
    }
    // and don't let an enemy stand on top of the player
    if (!player.dead) {
      let dx = a.x - player.x, dy = a.y - player.y, d = Math.hypot(dx, dy);
      if (d > 0.0001 && d < MIN) {
        dx /= d; dy /= d; const push = (MIN - d);
        const ax = a.x + dx * push, ay = a.y + dy * push;
        if (!collides(ax, ay, 0.3)) { a.x = ax; a.y = ay; }
      }
    }
  }
}

/* ============================================================
   11. PROJECTILE LOGIC
   ============================================================ */
function updateProjectiles(dt) {
  for (const p of projectiles) {
    if (!p.alive) continue;
    const step = p.speed * dt;
    p.x += p.dx * step; p.y += p.dy * step;
    p.travelled += step;
    p.spin += dt * 12;
    // trail droplets
    if (Math.random() < 0.5)
      spawnParticle(p.x, p.y, rand(-0.5,0.5), rand(-0.5,0.5), p.color, 0.25, 1, 0.1);

    let hit = false;
    // out of range
    if (p.travelled >= p.range) hit = true;
    // obstacle / wall
    const t = tileAt(Math.floor(p.x), Math.floor(p.y));
    if (!t || t.terrain === T_OBST) hit = true;
    // entity hits
    if (!hit) {
      if (p.fromPlayer) {
        for (const e of enemies) {
          if (!e.dead && e.iframe <= 0 && dist2(p.x, p.y, e.x, e.y) < 0.32*0.32 + p.r*p.r) {
            damageEnemy(e, 26); hit = true; break;
          }
        }
      } else {
        if (!player.dead && player.iframe <= 0 && dist2(p.x, p.y, player.x, player.y) < 0.34*0.34 + p.r*p.r) {
          damagePlayer(14, false); hit = true;
        }
      }
    }
    if (hit) {
      p.alive = false;
      onSplash(p.x, p.y, p.owner, p.color, p.dark, p.fromPlayer);
    }
  }
}

function damageEnemy(e, amount) {
  if (e.dead) return;
  if (e.shield > 0) { spawnFloater(e.x, e.y - 1, "BLOCK", "#ffd23d"); return; }
  e.hp -= amount;
  e.iframe = 0.15;
  spawnFloater(e.x, e.y - 1, "-" + amount, "#fff");
  for (let i = 0; i < 6; i++)
    spawnParticle(e.x, e.y, rand(-3,3), rand(-3,3), e.color, rand(0.3,0.6), rand(1,2.5));
  sfx("hit");
  if (e.hp <= 0) {
    e.dead = true; e.respawn = RESPAWN_DELAY; e.diving = false;
    player.score += 100; player.kills += 1;
    player.special = Math.min(100, player.special + 22); // big SPECIAL gain on a splat
    spawnFloater(e.x, e.y - 1.5, "SPLATTED!", "#19e6ff");
    game.shake = Math.min(10, game.shake + 6);
    for (let i = 0; i < 20; i++)
      spawnParticle(e.x, e.y, rand(-5,5), rand(-5,5), e.color, rand(0.4,0.9), rand(1.5,3));
    // bonus paint where they died
    paintTiles(e.x, e.y, 2.5, OWN_PLAYER, PLAYER_COLOR);
    sfx("splat");
  }
}

/* ============================================================
   12. INK SPLASH / PAINTING
   ============================================================ */
function onSplash(x, y, owner, color, dark, fromPlayer) {
  paintTiles(x, y, SPLASH_RADIUS, owner, color);
  // damage entities inside splash radius
  let didHit = false;
  if (fromPlayer) {
    for (const e of enemies)
      if (!e.dead && e.iframe <= 0 && dist(x, y, e.x, e.y) < SPLASH_RADIUS * 0.6) { damageEnemy(e, 14); didHit = true; }
  } else {
    if (!player.dead && player.iframe <= 0 && dist(x, y, player.x, player.y) < SPLASH_RADIUS * 0.6)
      { damagePlayer(8, false); didHit = true; }
  }
  // ink splat decal + expanding ring on the floor (bigger/brighter on a hit)
  addImpact(x, y, didHit ? "#ffffff" : color, didHit, color);
  // radial splash particles
  const n = didHit ? 14 : 9;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + rand(-0.3, 0.3);
    spawnParticle(x, y, Math.cos(a)*rand(1,4), Math.sin(a)*rand(1,4), color, rand(0.3,0.7), rand(1.5,3));
  }
  // arcing ink droplets that lob up and fall back to the floor
  for (let i = 0; i < (didHit ? 7 : 4); i++)
    spawnParticle(x, y, rand(-2, 2), rand(-2, 2), shade(color, 0.15), rand(0.45, 0.8), rand(1.5, 2.6), 1.4);
  // tiny screen shake from impact (very gentle, only when close)
  const near = dist(x, y, player.x, player.y);
  if (near < 6) game.shake = Math.min(3, game.shake + (didHit ? 2 : 1));
}

/* ink-splat decals — a central blob + flung satellite droplets + a ring */
const impacts = [];
function addImpact(x, y, color, big, inkColor) {
  const pts = []; const n = big ? 6 : 4;
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), rr = rand(0.4, 1.0) * (big ? 1.5 : 1);
    pts.push({ dx: Math.cos(a) * rr, dy: Math.sin(a) * rr, r: rand(1.5, 3.5) * (big ? 1.2 : 1) });
  }
  impacts.push({ x, y, life: 0.5, max: 0.5, color, ink: inkColor || color, big: !!big, pts });
}
function updateImpacts(dt) {
  for (let i = impacts.length - 1; i >= 0; i--) { impacts[i].life -= dt; if (impacts[i].life <= 0) impacts.splice(i, 1); }
}
function drawImpacts() {
  for (const im of impacts) {
    const t = 1 - im.life / im.max;        // 0..1 expansion
    const r = project(im.x, im.y);
    const a = 1 - t;
    // central ink blob
    ctx.globalAlpha = a * 0.7; ctx.fillStyle = im.ink;
    const R = (im.big ? 10 : 7) * (0.6 + t * 0.7);
    ctx.beginPath(); ctx.ellipse(r.x, r.y, R, R * 0.5, 0, 0, TAU); ctx.fill();
    // satellite droplets flung outward across the floor
    for (const p of im.pts) {
      const sx = r.x + p.dx * (TILE_W / 2) * (0.4 + t * 1.1);
      const sy = r.y + p.dy * (TILE_H / 2) * (0.4 + t * 1.1);
      const pr = p.r * (1 - t * 0.6);
      if (pr > 0.4) { ctx.beginPath(); ctx.ellipse(sx, sy, pr, pr * 0.5, 0, 0, TAU); ctx.fill(); }
    }
    // expanding rim ring
    ctx.globalAlpha = a * 0.6; ctx.strokeStyle = shade(im.color, 0.4); ctx.lineWidth = im.big ? 2 : 1;
    ctx.beginPath(); ctx.ellipse(r.x, r.y, (im.big ? 28 : 16) * t, (im.big ? 14 : 8) * t, 0, 0, TAU); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

/* muzzle flashes — a brief bright burst + spike at the gun barrel when firing */
const flashes = [];
function addFlash(x, y, ang, color) {
  const d = worldToScreen(Math.cos(ang), Math.sin(ang));
  const dl = Math.hypot(d.x, d.y) || 1;
  flashes.push({ x, y, dx: d.x / dl, dy: d.y / dl, life: 0.1, max: 0.1, color });
  // a few bright sparks in the firing direction
  for (let i = 0; i < 5; i++) {
    const a = ang + rand(-0.45, 0.45);
    spawnParticle(x, y, Math.cos(a) * rand(2, 5), Math.sin(a) * rand(2, 5), i < 2 ? "#ffffff" : color, rand(0.12, 0.28), rand(1, 2.2), 0.1);
  }
}
function updateFlashes(dt) {
  for (let i = flashes.length - 1; i >= 0; i--) { flashes[i].life -= dt; if (flashes[i].life <= 0) flashes.splice(i, 1); }
}
function drawFlashes() {
  for (const fl of flashes) {
    const s = project(fl.x, fl.y);
    const t = clamp(fl.life / fl.max, 0, 1);
    ctx.globalAlpha = t;
    ctx.fillStyle = shade(fl.color, 0.5);
    ctx.beginPath(); ctx.arc(s.x, s.y, 7 * t + 2, 0, TAU); ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(s.x, s.y, 3.5 * t + 1, 0, TAU); ctx.fill();
    ctx.strokeStyle = fl.color; ctx.lineWidth = 2;
    const len = 12 * t + 4;
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x + fl.dx * len, s.y + fl.dy * len); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

/* ============================================================
   12b. POWER-UPS (floating reef pickups)
   ============================================================ */
const PU_INK = 0, PU_SPEED = 1, PU_SHIELD = 2, PU_SPECIAL = 3;
const PU_INFO = [
  { key: "INK FULL",   col: "#19e6ff" },
  { key: "SPEED UP",   col: "#7cff4d" },
  { key: "SHIELD",     col: "#ffd23d" },
  { key: "ULTI READY", col: "#b56bff" },
];
const pickups = [];
let pickupTimer = 4;
const MAX_PICKUPS = 3;

function spawnPickup() {
  for (let tries = 0; tries < 30; tries++) {
    const x = randi(3, MAP_W - 3), y = randi(3, MAP_H - 3);
    if (!isWalkable(x, y)) continue;
    if (dist(x, y, PLAYER_SPAWN.x, PLAYER_SPAWN.y) < 3) continue;
    if (pickups.some(p => p.active && Math.floor(p.x) === x && Math.floor(p.y) === y)) continue;
    pickups.push({ active: true, x: x + 0.5, y: y + 0.5, type: randi(0, 4), bob: rand(0, TAU), life: 18 });
    return;
  }
}
function updatePickups(dt) {
  pickupTimer -= dt;
  const activeCount = pickups.reduce((n, p) => n + (p.active ? 1 : 0), 0);
  if (pickupTimer <= 0 && activeCount < MAX_PICKUPS) { spawnPickup(); pickupTimer = rand(5, 9); }
  for (const p of pickups) {
    if (!p.active) continue;
    p.bob += dt * 3; p.life -= dt;
    if (p.life <= 0) { p.active = false; continue; }
    // player grabs first, then any rival that walks over it
    if (!player.dead && dist(p.x, p.y, player.x, player.y) < 0.75) { collectPickup(p, player); continue; }
    for (const e of enemies) {
      if (!e.dead && dist(p.x, p.y, e.x, e.y) < 0.75) { collectPickup(p, e); break; }
    }
  }
}
function collectPickup(p, ent) {
  p.active = false;
  const info = PU_INFO[p.type];
  const isPlayer = (ent === player);
  if (p.type === PU_INK) ent.ink = INK_MAX;
  else if (p.type === PU_SPEED) ent.speedBoost = 6;
  else if (p.type === PU_SHIELD) ent.shield = 6;
  else { // SPECIAL: player charges ulti; rivals just top up ink + a little heal
    if (isPlayer) ent.special = 100;
    else { ent.ink = INK_MAX; ent.hp = Math.min(ENEMY_MAX_HP, ent.hp + 20); }
  }
  spawnFloater(ent.x, ent.y - 1.2, isPlayer ? info.key : info.key, info.col);
  for (let i = 0; i < 14; i++)
    spawnParticle(p.x, p.y, rand(-3, 3), rand(-3, 3), info.col, rand(0.4, 0.8), rand(1.5, 3));
  if (isPlayer) sfx("hit");
}
function drawPickup(p) {
  const s = project(p.x, p.y);
  const info = PU_INFO[p.type];
  const fy = s.y - 8 - Math.sin(p.bob) * 3;
  // blink when about to expire
  if (p.life < 4 && Math.floor(p.life * 8) % 2 === 0) return;
  // ground shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath(); ctx.ellipse(s.x, s.y, 8, 4, 0, 0, TAU); ctx.fill();
  // glow + capsule
  ctx.globalAlpha = 0.35; ctx.fillStyle = info.col;
  ctx.beginPath(); ctx.arc(s.x, fy, 12, 0, TAU); ctx.fill(); ctx.globalAlpha = 1;
  ctx.fillStyle = "#06202b"; rrect(s.x - 9, fy - 9, 18, 18);
  ctx.strokeStyle = info.col; ctx.lineWidth = 2;
  ctx.strokeRect(Math.round(s.x - 9) + 0.5, Math.round(fy - 9) + 0.5, 18, 18);
  // glyph
  ctx.fillStyle = info.col;
  ctx.save(); ctx.translate(s.x, fy);
  if (p.type === PU_INK) {            // droplet
    ctx.beginPath(); ctx.arc(0, 1, 4, 0, TAU); ctx.fill();
    poly(0, -6, [[-3, 5], [3, 5], [0, -2]]);
  } else if (p.type === PU_SPEED) {   // double chevron
    poly(-5, 0, [[0, -5], [0, 5], [4, 0]]); poly(0, 0, [[0, -5], [0, 5], [4, 0]]);
  } else if (p.type === PU_SHIELD) {  // shield
    poly(0, -6, [[-5, 0], [5, 0], [5, 4], [0, 9], [-5, 4]]);
  } else {                            // star
    for (let i = 0; i < 5; i++) { const a = -Math.PI / 2 + i * TAU / 5; ctx.fillRect(Math.cos(a) * 5 - 1, Math.sin(a) * 5 - 1, 2, 2); }
    ctx.fillRect(-1, -1, 2, 2);
  }
  ctx.restore();
}

// Paint tiles within radius; closer = stronger; gradual overwrite of opposite ink.
function paintTiles(cx, cy, radius, owner, color) {
  const minX = Math.max(0, Math.floor(cx - radius));
  const maxX = Math.min(MAP_W - 1, Math.ceil(cx + radius));
  const minY = Math.max(0, Math.floor(cy - radius));
  const maxY = Math.min(MAP_H - 1, Math.ceil(cy + radius));
  for (let ty = minY; ty <= maxY; ty++) {
    for (let tx = minX; tx <= maxX; tx++) {
      const t = map[ty * MAP_W + tx];
      if (t.terrain === T_OBST) continue;        // never paint obstacles
      const d = dist(cx, cy, tx + 0.5, ty + 0.5);
      if (d > radius) continue;
      const strength = (1 - d / radius);          // 0..1
      const add = 0.35 + strength * 0.9;          // coverage added
      if (t.owner === owner) {
        t.ink = clamp(t.ink + add, 0, 1);
      } else if (t.owner === OWN_NONE) {
        t.owner = owner; t.ink = clamp(add, 0, 1); t.inkColor = color;
      } else {
        // overwrite opposing ink gradually
        t.ink -= add;
        if (t.ink <= 0) { t.owner = owner; t.ink = clamp(-t.ink, 0.05, 1); t.inkColor = color; }
      }
      if (t.owner === owner) t.inkColor = color;
      t.pulse = 1; // tile pulse animation
    }
  }
}

// Recompute territory percentages
let pctTimer = 0;
function updateTerritory(dt) {
  pctTimer -= dt;
  if (pctTimer > 0) return;
  pctTimer = 0.4; // update a few times per second (cheap)
  let pCount = 0, eCount = 0;
  for (const t of map) {
    if (t.terrain === T_OBST) continue;
    if (t.owner === OWN_PLAYER) pCount++;
    else if (t.owner === OWN_ENEMY) eCount++;
  }
  game.pct.player = paintableTotal ? (pCount / paintableTotal * 100) : 0;
  game.pct.enemy  = paintableTotal ? (eCount / paintableTotal * 100) : 0;
}

/* ============================================================
   13. PARTICLES
   ============================================================ */
function updateParticles(dt) {
  for (const p of particles) {
    if (!p.alive) continue;
    p.life -= dt;
    if (p.life <= 0) { p.alive = false; continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.92; p.vy *= 0.92;
    // simple vertical hop using z
    p.z += p.vz * dt; p.vz -= p.gravity * dt * 6;
    if (p.z < 0) { p.z = 0; p.vz *= -0.4; }
  }
  for (const f of floaters) { f.life -= dt; f.y -= dt * 1.2; }
  for (let i = floaters.length - 1; i >= 0; i--) if (floaters[i].life <= 0) floaters.splice(i, 1);
}

/* ============================================================
   14. CAMERA
   ============================================================ */
function updateCamera(dt) {
  const target = worldToScreen(player.x, player.y);
  camera.tx = target.x; camera.ty = target.y;
  camera.x = lerp(camera.x, camera.tx, clamp(dt * 6, 0, 1));
  camera.y = lerp(camera.y, camera.ty, clamp(dt * 6, 0, 1));
  // screen shake decay — gentle: capped low amplitude + fast decay so it
  // adds punch without making the player dizzy
  if (game.shake > 0.05) {
    const amt = Math.min(game.shake, 5) * 0.35;   // effective max ~1.75px
    game.shakeX = rand(-amt, amt);
    game.shakeY = rand(-amt, amt);
    game.shake = Math.max(0, game.shake - dt * 28); // quicker settle
  } else { game.shake = 0; game.shakeX = 0; game.shakeY = 0; }
  if (game.flash > 0) game.flash = Math.max(0, game.flash - dt * 1.5);
}

// world -> final screen pixel (with camera + shake), origin centered
function project(wx, wy) {
  const s = worldToScreen(wx, wy);
  return {
    x: s.x - camera.x + VIEW_W / 2 + game.shakeX,
    y: s.y - camera.y + VIEW_H / 2 + game.shakeY,
  };
}

/* ============================================================
   17. UPDATE LOOP (logic)
   ============================================================ */
function update(dt) {
  if (game.state !== "PLAYING") return;

  // match timer
  game.time -= dt;
  if (game.time <= 0) { game.time = 0; endMatch(); return; }

  updatePlayer(dt);
  for (const e of enemies) updateEnemy(e, dt);
  resolveSeparation();
  updateProjectiles(dt);
  updateParticles(dt);
  updateImpacts(dt);
  updateFlashes(dt);
  updatePickups(dt);
  updateTerritory(dt);
  updateCamera(dt);

  // decay tile pulses
  for (const t of map) if (t.pulse > 0) t.pulse = Math.max(0, t.pulse - dt * 3);
}

function endMatch() {
  updateTerritory(99); // force final recompute
  // recompute exactly
  let pCount = 0, eCount = 0;
  for (const t of map) {
    if (t.terrain === T_OBST) continue;
    if (t.owner === OWN_PLAYER) pCount++;
    else if (t.owner === OWN_ENEMY) eCount++;
  }
  game.pct.player = paintableTotal ? (pCount / paintableTotal * 100) : 0;
  game.pct.enemy  = paintableTotal ? (eCount / paintableTotal * 100) : 0;
  const win = pCount > eCount;
  game.result = {
    win, pCount, eCount,
    coverScore: Math.round(game.pct.player * 10),
    killScore: player.kills * 100,
    total: Math.round(game.pct.player * 10) + player.kills * 100,
  };
  game.state = win ? "VICTORY" : "GAMEOVER";
}

/* ============================================================
   18. RENDER LOOP
   ============================================================ */
function render() {
  // clear with deep-ocean background
  ctx.fillStyle = "#06182a";
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  drawWaterBackground();

  if (game.state === "TITLE") { drawTitle(); return; }

  drawArena();

  // HUD overlays
  drawHUD();
  drawMinimap();
  if (isTouch) drawMobileControls();

  if (game.state === "PAUSED")   drawPause();
  if (game.state === "GAMEOVER") drawResult(false);
  if (game.state === "VICTORY")  drawResult(true);

  // damage flash
  if (game.flash > 0) {
    ctx.fillStyle = "rgba(255,40,40," + (game.flash * 0.4) + ")";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
  // ulti (ink storm) gold flash
  if (game.state === "PLAYING" && player.ultiFlash > 0) {
    ctx.fillStyle = "rgba(255,210,61," + (player.ultiFlash * 0.35) + ")";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
}

/* ---------- ANIMATED OCEAN (drawn BEFORE the stage so the arena floats) ----------
   Lightweight: navy depth bands + two parallax layers of drifting wave dashes +
   seeded twinkling sparkles + rising bubbles + cyan/magenta ink-reflection glow
   under the stage + animated foam framing the stage rim. All loops smoothly. */
let bgT = 0;
function drawWaterBackground() {
  bgT += 0.01;
  const t = bgT;
  const parX = camera.x * 0.3, parY = camera.y * 0.3;   // gentle parallax with camera

  // 1) deep navy base + slow depth bands
  ctx.fillStyle = "#020c18";
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  const bands = 7;
  for (let i = 0; i < bands; i++) {
    const y = Math.floor(i / bands * VIEW_H), h = Math.ceil(VIEW_H / bands) + 1;
    ctx.fillStyle = shade("#06192e", 0.03 + 0.05 * Math.sin(t * 0.5 + i * 0.6));
    ctx.fillRect(0, y, VIEW_W, h);
  }

  // 2) drifting wave dashes — two parallax layers for depth
  drawWaveLayer(t * 0.7, parX,       parY,       30, 46, "rgba(70,160,210,0.10)", 0.0);
  drawWaveLayer(t * 1.1, parX * 1.4, parY * 1.4, 38, 60, "rgba(120,200,235,0.07)", 0.5);

  // 3) seeded twinkling sparkles (positions fixed, brightness animates)
  let sd = 0x51ED0;
  const sr = () => { sd = (sd * 1664525 + 1013904223) >>> 0; return sd / 4294967296; };
  for (let i = 0; i < 36; i++) {
    const rx = sr(), ry = sr(), rp = sr(), rc = sr();
    const tw = Math.sin(t * 3 + rp * TAU);
    if (tw > 0.45) {
      ctx.globalAlpha = ((tw - 0.45) / 0.55) * 0.85;
      ctx.fillStyle = rc > 0.5 ? "#cdf6ff" : "#8fd0ff";
      const x = ((rx * VIEW_W - parX * 0.15) % VIEW_W + VIEW_W) % VIEW_W;
      const s = tw > 0.85 ? 2 : 1;
      ctx.fillRect(x | 0, (ry * VIEW_H) | 0, s, s);
    }
  }
  ctx.globalAlpha = 1;

  // 4) tiny rising bubbles (seeded, wrap-around)
  sd = 0xB0BB1E;
  for (let i = 0; i < 16; i++) {
    const rx = sr(), spd = sr(), rr = sr(), wob = sr();
    const x = ((rx * VIEW_W - parX * 0.2 + Math.sin(t * 1.4 + wob * TAU) * 6) % VIEW_W + VIEW_W) % VIEW_W;
    const y = VIEW_H - ((t * (10 + spd * 22) + wob * 240) % (VIEW_H + 30));
    const r = 1 + Math.floor(rr * 2.2);
    ctx.globalAlpha = 0.16; ctx.strokeStyle = "#9fd8ff"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x | 0, y | 0, r, 0, TAU); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // 5) ink reflection glow + foam rim around the stage (only during play)
  if (game.state !== "TITLE") {
    const ctr = project(MAP_W / 2 - 0.5, MAP_H / 2 - 0.5);
    waterGlow(ctr.x - 50, ctr.y + 24, 260, "25,230,255", 0.45 + game.pct.player / 130);
    waterGlow(ctr.x + 50, ctr.y + 24, 260, "255,61,240", 0.45 + game.pct.enemy / 130);
    drawStageFoam(t, ctr);
  }
}

function drawWaveLayer(t, parX, parY, rowGap, dashGap, color, off) {
  ctx.fillStyle = color;
  const ox = ((parX % dashGap) + dashGap) % dashGap;
  const oy = ((parY % rowGap) + rowGap) % rowGap;
  for (let ry = -rowGap; ry < VIEW_H + rowGap; ry += rowGap) {
    const baseY = ry - oy, phase = t + ry * 0.05 + off;
    for (let dx = -dashGap; dx < VIEW_W + dashGap; dx += dashGap) {
      const x = dx - ox + Math.sin(phase + dx * 0.03) * 6;
      const len = 12 + Math.sin(phase * 1.3 + dx * 0.05) * 6;
      const y = baseY + Math.sin(phase + dx * 0.02) * 3;
      ctx.fillRect(x | 0, y | 0, len | 0, 2);
    }
  }
}

function waterGlow(x, y, r, rgb, strength) {
  strength = clamp(strength, 0, 1);
  if (strength <= 0.02) return;
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, "rgba(" + rgb + "," + (0.16 * strength).toFixed(3) + ")");
  g.addColorStop(1, "rgba(" + rgb + ",0)");
  ctx.fillStyle = g;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

function drawStageFoam(t, ctr) {
  const hw = TILE_W / 2, hh = TILE_H / 2;
  const N = project(0, 0); N.y -= hh;
  const E = project(MAP_W - 1, 0); E.x += hw;
  const S = project(MAP_W - 1, MAP_H - 1); S.y += hh;
  const Wv = project(0, MAP_H - 1); Wv.x -= hw;
  foamEdge(N.x, N.y, E.x, E.y, ctr.x, ctr.y, t);
  foamEdge(E.x, E.y, S.x, S.y, ctr.x, ctr.y, t);
  foamEdge(S.x, S.y, Wv.x, Wv.y, ctr.x, ctr.y, t);
  foamEdge(Wv.x, Wv.y, N.x, N.y, ctr.x, ctr.y, t);
}
function foamEdge(ax, ay, bx, by, cx, cy, t) {
  const segs = 22;
  for (let i = 0; i <= segs; i++) {
    const u = i / segs;
    let x = ax + (bx - ax) * u, y = ay + (by - ay) * u;
    let ox = x - cx, oy = y - cy; const ol = Math.hypot(ox, oy) || 1; ox /= ol; oy /= ol;
    const wave = Math.sin(t * 3 + i * 0.8 + (ax + ay) * 0.012);
    const push = 2 + Math.max(0, wave) * 4;
    x += ox * push; y += oy * push;
    ctx.globalAlpha = 0.22 + 0.4 * Math.max(0, wave);
    ctx.fillStyle = (i % 4 === 0) ? "#eaffff" : "#a9e0ff";
    const s = wave > 0.4 ? 2 : 1;
    ctx.fillRect(x | 0, y | 0, s + 1, s);
  }
  ctx.globalAlpha = 1;
}

// Raycast where a shot from (x,y) along ang would first land (obstacle or range end)
function predictImpact(x, y, ang, range) {
  const dx = Math.cos(ang), dy = Math.sin(ang), step = 0.18;
  let d = step;
  for (; d < range; d += step) {
    const t = tileAt(Math.floor(x + dx * d), Math.floor(y + dy * d));
    if (!t || t.terrain === T_OBST) break;
  }
  d = Math.min(d, range);
  return { x: x + dx * d, y: y + dy * d };
}

// Aim reticle drawn on the ground at the predicted impact point
function drawReticle() {
  if (game.state !== "PLAYING" || player.dead || player.diving) return;
  const muzX = player.x + Math.cos(player.aim) * 0.4;
  const muzY = player.y + Math.sin(player.aim) * 0.4;
  const imp = predictImpact(muzX, muzY, player.aim, 6.5);
  const r = project(imp.x, imp.y);
  const pulse = 0.6 + 0.4 * Math.sin(bgT * 10);
  const lowInk = player.ink < SHOT_COST;
  const col = lowInk ? "#ff6b6b" : PLAYER_COLOR;
  ctx.globalAlpha = 0.85 * pulse;
  ctx.strokeStyle = col; ctx.lineWidth = 2;
  // iso-flattened ring on the floor
  ctx.beginPath(); ctx.ellipse(r.x, r.y, 12, 6, 0, 0, TAU); ctx.stroke();
  // crosshair ticks
  ctx.beginPath();
  ctx.moveTo(r.x - 16, r.y); ctx.lineTo(r.x - 9, r.y);
  ctx.moveTo(r.x + 9, r.y);  ctx.lineTo(r.x + 16, r.y);
  ctx.moveTo(r.x, r.y - 9);  ctx.lineTo(r.x, r.y - 12);
  ctx.moveTo(r.x, r.y + 9);  ctx.lineTo(r.x, r.y + 12);
  ctx.stroke();
  // centre dot
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(r.x) - 1, Math.round(r.y) - 1, 2, 2);
  ctx.globalAlpha = 1;
}

/* ---------- ARENA RENDER (tiles -> ink -> deco -> entities -> fx) ---------- */
function drawArena() {
  // 1) tiles + ink (back-to-front by depth)
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      drawTile(map[y * MAP_W + x]);
    }
  }

  // 1b) aim reticle + impact rings on the ground (under decorations/entities)
  drawReticle();
  drawImpacts();

  // 2) build depth-sorted draw list of decorations + entities + projectiles
  const drawList = [];
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const t = map[y * MAP_W + x];
      if (t.terrain === T_OBST) drawList.push({ depth: x + y, type: "deco", t });
    }
  }
  for (const e of enemies) if (!e.dead)
    drawList.push({ depth: e.x + e.y + 0.5, type: "enemy", e });
  if (!player.dead) drawList.push({ depth: player.x + player.y + 0.5, type: "player" });
  for (const p of projectiles) if (p.alive) drawList.push({ depth: p.x + p.y + 0.4, type: "proj", p });
  for (const p of pickups) if (p.active) drawList.push({ depth: p.x + p.y + 0.3, type: "pickup", p });

  drawList.sort((a, b) => a.depth - b.depth);
  for (const item of drawList) {
    if (item.type === "deco") drawDeco(item.t);
    else if (item.type === "enemy") drawShark(item.e, false);
    else if (item.type === "player") drawShark(player, true);
    else if (item.type === "proj") drawProjectile(item.p);
    else if (item.type === "pickup") drawPickup(item.p);
  }

  // 3) muzzle flashes, particles + floaters on top
  drawFlashes();
  drawParticles();
  drawFloaters();
}

// Draw a single isometric tile (diamond top + side faces for 2.5D)
function drawTile(t) {
  const p = project(t.x, t.y);
  // cull off-screen
  if (p.x < -TILE_W || p.x > VIEW_W + TILE_W || p.y < -TILE_H*3 || p.y > VIEW_H + TILE_H*3) return;

  const hw = TILE_W / 2, hh = TILE_H / 2;
  // base floor color — deep neon-tinted teal so bright ink pops
  let top = t.tint ? "#0d3a54" : "#114862";
  if (t.terrain === T_RAMP) top = "#175a7c";

  // ink overlay color blend
  let inked = false, inkC = null;
  if (t.owner !== OWN_NONE && t.ink > 0) {
    inkC = t.inkColor || (t.owner === OWN_PLAYER ? PLAYER_COLOR : ENEMY_COLORS[0].ink);
    const pulseAmt = t.pulse * 0.4;
    top = shade(inkC, -0.12 + t.ink * 0.18 + pulseAmt);
    inked = true;
  }

  // top diamond
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - hh);
  ctx.lineTo(p.x + hw, p.y);
  ctx.lineTo(p.x, p.y + hh);
  ctx.lineTo(p.x - hw, p.y);
  ctx.closePath();
  ctx.fillStyle = top;
  ctx.fill();

  // neon grid lines (cyan glow on neutral floor, brighter on inked)
  ctx.strokeStyle = inked ? "rgba(190,255,255,0.16)" : "rgba(45,210,235,0.13)";
  ctx.lineWidth = 1;
  ctx.stroke();

  // neon rim: glow along the two upper edges of an inked tile
  if (inked) {
    ctx.globalAlpha = 0.45 + t.pulse * 0.55;
    ctx.strokeStyle = shade(inkC, 0.55);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(p.x - hw, p.y); ctx.lineTo(p.x, p.y - hh); ctx.lineTo(p.x + hw, p.y);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // side faces (thickness) — left + right, darker for depth
  const sideCol = inked
    ? shade(inkC, -0.5)
    : (t.tint ? "#072b3f" : "#0a3a52");
  ctx.fillStyle = sideCol;
  // left face
  ctx.beginPath();
  ctx.moveTo(p.x - hw, p.y);
  ctx.lineTo(p.x, p.y + hh);
  ctx.lineTo(p.x, p.y + hh + TILE_TH);
  ctx.lineTo(p.x - hw, p.y + TILE_TH);
  ctx.closePath();
  ctx.fill();
  // right face
  ctx.fillStyle = shade(sideCol, -0.12);
  ctx.beginPath();
  ctx.moveTo(p.x + hw, p.y);
  ctx.lineTo(p.x, p.y + hh);
  ctx.lineTo(p.x, p.y + hh + TILE_TH);
  ctx.lineTo(p.x + hw, p.y + TILE_TH);
  ctx.closePath();
  ctx.fill();
}

// Decoration / obstacle render (coral, rock, crate, sign, barrier)
function drawDeco(t) {
  const p = project(t.x, t.y);
  if (p.x < -TILE_W || p.x > VIEW_W + TILE_W || p.y < -TILE_H*4 || p.y > VIEW_H + TILE_H*2) return;
  const px = Math.round(p.x), py = Math.round(p.y);
  const h = (t.height || 1) * 22;

  switch (t.deco) {
    case D_CORAL: {
      // neon coral: stacked rounded blobs
      const cols = ["#ff7ad6", "#ff4fa3", "#ffa64f"];
      const c = cols[(t.x + t.y) % cols.length];
      // base rock
      ctx.fillStyle = "#2a3f4f";
      rrect(px-10, py-6, 20, 12);
      // coral branches as little columns
      for (let i = -1; i <= 1; i++) {
        const bx = px + i * 7;
        const bh = h * (0.7 + (i+1)*0.15);
        ctx.fillStyle = shade(c, -0.2);
        ctx.fillRect(bx-3, py - bh, 6, bh);
        ctx.fillStyle = c;
        ctx.fillRect(bx-3, py - bh, 4, bh);
        // glow tip
        ctx.fillStyle = shade(c, 0.4);
        ctx.fillRect(bx-3, py - bh - 4, 6, 5);
      }
      break;
    }
    case D_ROCK: {
      ctx.fillStyle = "#3a4a55";
      poly(px, py, [[-12,2],[-8,-h*0.6],[0,-h],[9,-h*0.55],[12,2]]);
      ctx.fillStyle = "#4d5f6b";
      poly(px, py, [[-12,2],[-8,-h*0.6],[-2,-h*0.5],[-2,2]]);
      // barnacle dots
      ctx.fillStyle = "#7fd6c2";
      ctx.fillRect(px+2, py - h*0.4, 3, 3);
      ctx.fillRect(px-5, py - h*0.2, 2, 2);
      break;
    }
    case D_CRATE: {
      const ch = 26;
      ctx.fillStyle = "#7a5230"; ctx.fillRect(px-12, py-ch, 24, ch);
      ctx.fillStyle = "#a06e3e"; ctx.fillRect(px-12, py-ch, 24, 6);
      ctx.fillStyle = "#5f3f23";
      ctx.fillRect(px-12, py-ch, 2, ch); ctx.fillRect(px+10, py-ch, 2, ch);
      ctx.fillRect(px-2, py-ch, 4, ch);
      // anchor symbol
      ctx.fillStyle = "#cfe9ff"; ctx.fillRect(px-1, py-ch+8, 2, 10);
      break;
    }
    case D_SIGN: {
      // neon ocean-graffiti sign on a post
      ctx.fillStyle = "#33424d"; ctx.fillRect(px-2, py-h, 4, h);
      const glow = ["#19e6ff","#ff3df0","#7cff4d"][(t.x*3+t.y)%3];
      ctx.fillStyle = "#10202b"; rrect(px-14, py-h-18, 28, 18);
      ctx.fillStyle = glow; rrect(px-12, py-h-16, 24, 14);
      ctx.fillStyle = "#06182a";
      ctx.fillRect(px-7, py-h-11, 4, 4);
      ctx.fillRect(px+3, py-h-11, 4, 4);
      ctx.fillRect(px-7, py-h-6, 14, 3);
      break;
    }
    default: { // barrier
      ctx.fillStyle = "#cf5b2a";
      ctx.fillRect(px-12, py-18, 24, 18);
      ctx.fillStyle = "#f0f0f0";
      for (let i = 0; i < 3; i++) ctx.fillRect(px-12 + i*9, py-18, 4, 18);
      ctx.fillStyle = "#2a3540"; ctx.fillRect(px-12, py-2, 24, 4);
      break;
    }
  }
}

// rounded-ish rect helper (pixel friendly = plain rect)
function rrect(x, y, w, h) { ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); }
function poly(cx, cy, pts) {
  ctx.beginPath();
  ctx.moveTo(cx + pts[0][0], cy + pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(cx + pts[i][0], cy + pts[i][1]);
  ctx.closePath(); ctx.fill();
}

/* ---------- CHARACTER: chibi shark warrior (procedural pixels) ---------- */
function drawShark(ent, isPlayer) {
  const p = project(ent.x, ent.y);
  let px = Math.round(p.x), py = Math.round(p.y);
  const col = isPlayer ? PLAYER_BODY : ent.body;
  const dark = isPlayer ? PLAYER_BODY_DARK : ent.dark;
  const ink  = isPlayer ? PLAYER_COLOR : ent.color;

  // i-frame blink
  if (ent.iframe > 0 && Math.floor(ent.iframe * 14) % 2 === 0) return;

  const face = ent.facing >= 0 ? 1 : -1;

  // squash/stretch
  const sq = 1 + (ent.squash || 0) * 0.3;
  const st = 1 - (ent.squash || 0) * 0.3;

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath();
  ctx.ellipse(px, py + 6, 12 * sq, 5, 0, 0, TAU);
  ctx.fill();

  // power-up auras (any entity holding the buff)
  if (ent.shield > 0) {
    ctx.strokeStyle = "rgba(255,210,61," + (0.45 + 0.4 * Math.sin(bgT * 12)) + ")";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(px, py - 12, 17, 22, 0, 0, TAU); ctx.stroke();
  }
  if (ent.speedBoost > 0 && Math.random() < 0.4)
    spawnParticle(ent.x, ent.y, rand(-0.4, 0.4), rand(-0.4, 0.4), "#7cff4d", 0.3, 1.5, 0.1);

  if (ent.diving) {
    // DIVE POSE: low silhouette, only the dorsal fin + eyes break the surface
    ctx.strokeStyle = shade(ink, 0.3); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(px, py + 2, 14, 6, 0, 0, TAU); ctx.stroke();
    ctx.fillStyle = dark; poly(px, py, [[-7 * face, 2], [3 * face, 2], [-2 * face, -12]]);
    ctx.fillStyle = col;  poly(px, py, [[-5 * face, 2], [1 * face, 2], [-2 * face, -9]]);
    // beady eyes just above the waterline
    ctx.fillStyle = "#fff"; ctx.fillRect(px + 1 * face, py - 1, 2, 2); ctx.fillRect(px + 4 * face, py - 1, 2, 2);
    ctx.fillStyle = "#06202b"; ctx.fillRect(px + 1 * face, py - 1, 1, 1); ctx.fillRect(px + 4 * face, py - 1, 1, 1);
    if (Math.random() < 0.3) spawnParticle(ent.x, ent.y, rand(-1, 1), rand(-1, 1), ink, 0.3, 1.2, 0.05);
    return;
  }

  // ============ CHIBI SHARK STREET-WARRIOR (big round head, tiny body) ============
  // Drawn facing-right from a local origin on the FEET; ctx.scale handles the
  // left/right flip + squash/stretch. Local +x = forward, -y = up.
  const bob = Math.sin(ent.walkPhase) * 1.0;
  const moving = (Math.abs(ent.vx) + Math.abs(ent.vy)) > 0.5;
  const wag = Math.sin(ent.walkPhase * 1.2 + bgT * 5) * (moving ? 0.55 : 0.3);
  const belly = shade(col, 0.30);
  const shell = "#e3c79a", shellSh = "#bd986a", coral = "#d98f86", weed = "#3fae5a";
  const neon = ink;  // goggles + accents glow in the team ink colour
  ctx.save();
  ctx.translate(px, py + 3 + bob);
  ctx.scale(face * sq, st);

  // --- wagging TAIL (behind, low) ---
  ctx.fillStyle = dark;
  poly(-8, -7, [[2, -4], [2, 4], [-10, -2 + wag * 9]]);

  // --- tiny LEGS + seaweed ankle wraps ---
  ctx.fillStyle = shade(col, -0.12);
  rrect(-4, -7, 4, 7); rrect(1, -7, 4, 7);
  ctx.fillStyle = "#0b2935"; rrect(-5, -1, 6, 2); rrect(1, -1, 6, 2);
  ctx.fillStyle = weed; rrect(-4, -4.5, 4, 1.5); rrect(1, -4.5, 4, 1.5);

  // --- back arm ---
  ctx.fillStyle = dark; rrect(-7, -15, 3, 7);

  // --- tiny TORSO with coral-shell armour ---
  ctx.fillStyle = col; rrect(-6, -16, 12, 10);
  ctx.fillStyle = belly; rrect(-3, -13, 6, 6);
  ctx.fillStyle = shell; poly(0, -16, [[-6, 1], [6, 1], [5, 7], [0, 9], [-5, 7]]); // chest plate
  ctx.fillStyle = shellSh; rrect(-6, -16, 12, 2);   // collar
  ctx.fillStyle = coral; rrect(-1, -15, 2, 8);      // centre ridge
  // shell shoulder pads
  ctx.fillStyle = shell;
  ctx.beginPath(); ctx.arc(-6, -15, 3, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -15, 3, 0, TAU); ctx.fill();
  ctx.fillStyle = coral;
  ctx.beginPath(); ctx.arc(-6, -15, 1.3, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -15, 1.3, 0, TAU); ctx.fill();
  if (!isPlayer) { ctx.fillStyle = ink; rrect(-6, -9, 12, 2); } // gang sash

  // --- BIG ROUND HEAD ---
  const hy = -27;
  ctx.fillStyle = dark; poly(-3, hy - 9, [[0, 2], [-4, -9], [7, -1]]); // dorsal mohawk fin
  ctx.fillStyle = col; ctx.beginPath(); ctx.ellipse(0, hy, 12, 11, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(2, hy + 5, 8, 5, 0, 0, Math.PI); ctx.fill(); // jaw
  ctx.fillStyle = shade(col, 0.18); ctx.beginPath(); ctx.ellipse(-4, hy - 6, 4, 2.5, 0, 0, TAU); ctx.fill(); // forehead shine
  ctx.fillStyle = col; ctx.beginPath(); ctx.ellipse(11, hy + 3, 4, 4, 0, 0, TAU); ctx.fill(); // snout
  ctx.fillStyle = shade(col, -0.28); rrect(2, hy + 6, 11, 1.4);   // smiling mouth
  ctx.fillStyle = "#ffffff"; for (let i = 0; i < 4; i++) ctx.fillRect(4 + i * 2.4, hy + 6, 1.4, 1.6); // small teeth
  ctx.fillStyle = shade(col, -0.34); for (let i = 0; i < 3; i++) ctx.fillRect(-9 + i * 1.6, hy + 1, 1, 4); // gills

  // --- BIG EYES + NEON GOGGLES ---
  ctx.fillStyle = "#0e2c36"; rrect(-12, hy - 4, 24, 3);          // goggle strap
  ctx.fillStyle = shade(neon, 0.12); rrect(-12, hy - 4, 24, 1);  // neon strap glow
  const ex1 = -3, ex2 = 5, eyy = hy - 1;
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(ex1, eyy, 3.4, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, eyy, 3.4, 0, TAU); ctx.fill();
  ctx.fillStyle = "#06202b";
  ctx.beginPath(); ctx.arc(ex1 + 1, eyy, 1.7, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2 + 1, eyy, 1.7, 0, TAU); ctx.fill();
  ctx.fillStyle = "#cdf6ff"; ctx.fillRect(ex1, eyy - 1, 1, 1); ctx.fillRect(ex2, eyy - 1, 1, 1);
  ctx.strokeStyle = neon; ctx.lineWidth = 1.5;                   // neon goggle rims
  ctx.beginPath(); ctx.arc(ex1, eyy, 4.2, 0, TAU); ctx.stroke();
  ctx.beginPath(); ctx.arc(ex2, eyy, 4.2, 0, TAU); ctx.stroke();
  ctx.fillStyle = neon; rrect(ex1 + 3.5, eyy - 0.5, 2, 1);       // goggle bridge

  // --- front arm + seaweed wrist wrap ---
  ctx.fillStyle = col; rrect(4, -15, 4, 7);
  ctx.fillStyle = weed; rrect(4, -10, 4, 2);
  ctx.fillStyle = belly; rrect(5, -9, 3, 3);

  ctx.restore();

  // shell-and-coral sea-ink blaster, held low in the front hand, aimed in world space
  drawBlaster(px, py - 9 + bob, ent.aim, ink, dark);

  // floating identity tag above the head
  const ty = py - 48 + Math.sin(bgT * 4 + ent.x * 1.7) * 1.2;
  if (isPlayer) {
    // cyan "YOU" with a downward pointer
    ctx.textAlign = "center";
    ctx.font = "bold 8px monospace";
    ctx.fillStyle = "#06202b"; ctx.fillText("YOU", px + 1, ty + 1);
    ctx.fillStyle = PLAYER_COLOR; ctx.fillText("YOU", px, ty);
    ctx.fillStyle = "#06202b"; poly(px, ty + 8, [[-5, -4], [5, -4], [0, 4]]);
    ctx.fillStyle = PLAYER_COLOR; poly(px, ty + 7, [[-4, -4], [4, -4], [0, 3]]);
    ctx.textAlign = "left";
  } else {
    // numbered gang badge in the rival's ink colour
    const n = ((ent.id != null ? ent.id : 0) + 1);
    ctx.fillStyle = "#06202b"; ctx.beginPath(); ctx.arc(px, ty, 6.5, 0, TAU); ctx.fill();
    ctx.fillStyle = ink; ctx.beginPath(); ctx.arc(px, ty, 5, 0, TAU); ctx.fill();
    ctx.fillStyle = "#06202b"; poly(px, ty + 7, [[-3, -3], [3, -3], [0, 3]]); // pointer
    ctx.fillStyle = "#06202b"; ctx.font = "bold 8px monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(String(n), px, ty + 1);
    ctx.textBaseline = "alphabetic"; ctx.textAlign = "left";
  }

  // ink-drip droplets when moving fast
  if ((Math.abs(ent.vx) + Math.abs(ent.vy)) > 4 && Math.random() < 0.2)
    spawnParticle(ent.x, ent.y, rand(-0.5, 0.5), rand(-0.5, 0.5), ink, 0.3, 1, 0.1);
}

// Blaster made of coral/shell parts, drawn pointing along aim angle (in world).
function drawBlaster(px, py, aimWorld, ink, dark) {
  // convert world-aim direction to screen direction for the muzzle
  const dir = worldToScreen(Math.cos(aimWorld), Math.sin(aimWorld));
  const a = Math.atan2(dir.y, dir.x);
  ctx.save();
  ctx.translate(px, py - 2);
  ctx.rotate(a);
  // shell grip
  ctx.fillStyle = "#e9c6a0";
  ctx.fillRect(0, -3, 8, 6);
  // barrel
  ctx.fillStyle = dark;
  ctx.fillRect(6, -3, 9, 6);
  ctx.fillStyle = "#f0e6d2";
  ctx.fillRect(6, -3, 9, 2);
  // glowing muzzle
  ctx.fillStyle = shade(ink, 0.4);
  ctx.fillRect(14, -3, 3, 6);
  ctx.restore();
}

function drawProjectile(p) {
  const s = project(p.x, p.y);
  const px = Math.round(s.x), py = Math.round(s.y);
  // lobbed arc: rises then falls, landing (h=0) at the end of its range so it
  // visibly "drops onto" the floor — gives the shot weight and a clear landing.
  const frac = clamp(p.travelled / p.range, 0, 1);
  const h = Math.sin(frac * Math.PI) * 16;   // pixels above the ground
  // ground shadow at the actual floor position (shows where it is / will land)
  ctx.fillStyle = "rgba(0,0,0,0.28)";
  const sw = 6 - frac * 2;
  ctx.beginPath(); ctx.ellipse(px, py, Math.max(2, sw), Math.max(1, sw * 0.5), 0, 0, TAU); ctx.fill();
  // the ink blob, drawn raised by the arc height
  const by = py - h;
  ctx.fillStyle = shade(p.color, 0.3);            // glow
  ctx.beginPath(); ctx.arc(px, by, 5, 0, TAU); ctx.fill();
  ctx.fillStyle = p.color;                          // core
  ctx.fillRect(px - 3, by - 3, 6, 6);
  ctx.fillStyle = shade(p.color, 0.5);             // highlight
  ctx.fillRect(px - 1, by - 2, 2, 2);
}

function drawParticles() {
  for (const p of particles) {
    if (!p.alive) continue;
    const s = project(p.x, p.y);
    const a = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    const sz = Math.max(1, p.size * (0.5 + a*0.5));
    ctx.fillRect(Math.round(s.x - sz/2), Math.round(s.y - sz/2 - p.z*10), Math.round(sz), Math.round(sz));
    ctx.globalAlpha = 1;
  }
}
function drawFloaters() {
  ctx.textAlign = "center";
  for (const f of floaters) {
    const s = project(f.x, f.y);
    ctx.globalAlpha = clamp(f.life, 0, 1);
    ctx.font = "bold 11px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#000";
    ctx.fillText(f.text, s.x + 1, s.y + 1);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, s.x, s.y);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = "left";
}

/* ============================================================
   15. UI RENDERING  (cohesive neon-reef HUD, scales with `UI`)
   ============================================================ */
function hudFont(px, weight) { return (weight || "bold ") + Math.round(px * UI) + "px 'Trebuchet MS', monospace"; }
function hudPanel(x, y, w, h) {
  x = Math.round(x); y = Math.round(y); w = Math.round(w); h = Math.round(h);
  ctx.fillStyle = "rgba(7,22,36,0.85)"; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = "rgba(110,225,255,0.10)"; ctx.fillRect(x, y, w, Math.max(1, 2 * UI)); // top sheen
  ctx.strokeStyle = "rgba(38,196,228,0.6)"; ctx.lineWidth = Math.max(1, UI);
  ctx.strokeRect(x + 0.5, y + 0.5, w, h);
}
function hudBar(x, y, w, h, frac, col) {
  x = Math.round(x); y = Math.round(y); w = Math.round(w); h = Math.round(h);
  ctx.fillStyle = "#06202e"; ctx.fillRect(x, y, w, h);
  const fw = Math.round((w - 2) * clamp(frac, 0, 1));
  if (fw > 0) {
    ctx.fillStyle = col; ctx.fillRect(x + 1, y + 1, fw, h - 2);
    ctx.fillStyle = "rgba(255,255,255,0.22)"; ctx.fillRect(x + 1, y + 1, fw, 1); // gloss
  }
}
function pauseBtn() { return { x: VIEW_W - 16 * UI, y: 16 * UI, r: 12 * UI }; }
function ovScale() { return clamp(Math.min(VIEW_W / 520, VIEW_H / 360), 0.6, 1.6); }
function resumeBtn() { const S = ovScale(); return { x: VIEW_W / 2, y: VIEW_H / 2 + 18 * S, r: 30 * S }; }
function menuBtn()   { const S = ovScale(); return { x: VIEW_W / 2 - 64 * S, y: VIEW_H / 2 + 60 * S, w: 128 * S, h: 26 * S }; }
function inRect(px, py, r) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }

function drawHUD() {
  const pad = 8 * UI;
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";

  // ===== TOP-LEFT: player vitals card =====
  const cw = 158 * UI, ch = 84 * UI;
  hudPanel(pad, pad, cw, ch);
  const lx = pad + 8 * UI, bx = pad + 30 * UI, bw = cw - 38 * UI, bh = 9 * UI;
  // header: YOU + stage
  ctx.fillStyle = PLAYER_COLOR; ctx.font = hudFont(10);
  ctx.fillText("YOU", lx, pad + 14 * UI);
  ctx.fillStyle = "#7fb0c6"; ctx.font = hudFont(8); ctx.textAlign = "right";
  ctx.fillText(LAYOUT_NAMES[currentLayout], pad + cw - 8 * UI, pad + 14 * UI);
  ctx.textAlign = "left";
  // bars
  let yy = pad + 22 * UI; const rowH = 14 * UI;
  ctx.font = hudFont(8);
  ctx.fillStyle = "#bfe9ff"; ctx.fillText("HP", lx, yy + 8 * UI);
  hudBar(bx, yy, bw, bh, player.hp / PLAYER_MAX_HP, player.hp > 40 ? "#3dff8a" : "#ff5b5b"); yy += rowH;
  ctx.fillStyle = "#bfe9ff"; ctx.fillText("INK", lx, yy + 8 * UI);
  hudBar(bx, yy, bw, bh, player.ink / INK_MAX, player.ink < SHOT_COST ? "#4b6b78" : PLAYER_COLOR); yy += rowH;
  const ready = player.special >= 100;
  ctx.fillStyle = ready ? "#ffd23d" : "#bfe9ff"; ctx.fillText("SP", lx, yy + 8 * UI);
  ctx.globalAlpha = ready ? (0.6 + 0.4 * Math.sin(bgT * 8)) : 1;
  hudBar(bx, yy, bw, bh, player.special / 100, ready ? "#ffd23d" : "#b56bff");
  ctx.globalAlpha = 1; yy += rowH;
  // score + status row
  ctx.font = hudFont(9); ctx.fillStyle = "#eaffff";
  ctx.fillText("SCORE " + (player.score + Math.round(game.pct.player * 10)), lx, yy + 6 * UI);
  ctx.font = hudFont(8); ctx.textAlign = "right";
  let chipX = pad + cw - 8 * UI;
  if (ready)               { ctx.fillStyle = "#ffd23d"; ctx.fillText(isTouch ? "ULTI!" : "ULTI[Q]", chipX, yy + 6 * UI); chipX -= 42 * UI; }
  if (player.diving)       { ctx.fillStyle = "#3dff8a"; ctx.fillText("DIVE", chipX, yy + 6 * UI); chipX -= 28 * UI; }
  if (player.shield > 0)   { ctx.fillStyle = "#ffd23d"; ctx.fillText("DEF",  chipX, yy + 6 * UI); chipX -= 24 * UI; }
  if (player.speedBoost > 0){ ctx.fillStyle = "#7cff4d"; ctx.fillText("SPD",  chipX, yy + 6 * UI); }
  ctx.textAlign = "left";

  // ===== TOP-CENTRE: timer + territory =====
  const tw = 126 * UI, th = 46 * UI, tx = VIEW_W / 2 - tw / 2, ty = pad;
  hudPanel(tx, ty, tw, th);
  const t = Math.max(0, Math.ceil(game.time));
  const timeStr = Math.floor(t / 60) + ":" + (t % 60 < 10 ? "0" : "") + (t % 60);
  ctx.textAlign = "center";
  ctx.fillStyle = game.time < 30 ? "#ff6b6b" : "#eaffff"; ctx.font = hudFont(17);
  ctx.fillText(timeStr, VIEW_W / 2, ty + 19 * UI);
  const trX = tx + 10 * UI, trY = ty + 25 * UI, trW = tw - 20 * UI, trH = 8 * UI;
  ctx.fillStyle = "#06202e"; ctx.fillRect(Math.round(trX), Math.round(trY), Math.round(trW), Math.round(trH));
  ctx.fillStyle = PLAYER_COLOR; ctx.fillRect(Math.round(trX), Math.round(trY), Math.round(trW * game.pct.player / 100), Math.round(trH));
  ctx.fillStyle = ENEMY_COLORS[0].ink; ctx.fillRect(Math.round(trX + trW - trW * game.pct.enemy / 100), Math.round(trY), Math.round(trW * game.pct.enemy / 100), Math.round(trH));
  ctx.fillStyle = "rgba(255,255,255,0.45)"; ctx.fillRect(Math.round(trX + trW / 2), Math.round(trY - 1), 1, Math.round(trH) + 2);
  ctx.font = hudFont(8);
  ctx.fillStyle = PLAYER_COLOR; ctx.textAlign = "left";  ctx.fillText(Math.round(game.pct.player) + "%", trX, trY + trH + 9 * UI);
  ctx.fillStyle = ENEMY_COLORS[0].ink; ctx.textAlign = "right"; ctx.fillText(Math.round(game.pct.enemy) + "%", trX + trW, trY + trH + 9 * UI);
  ctx.textAlign = "left";

  // ===== pause button (top-right) =====
  const pb = pauseBtn();
  ctx.fillStyle = "rgba(7,22,36,0.85)"; ctx.beginPath(); ctx.arc(pb.x, pb.y, pb.r, 0, TAU); ctx.fill();
  ctx.strokeStyle = "rgba(38,196,228,0.6)"; ctx.lineWidth = Math.max(1, UI); ctx.stroke();
  ctx.fillStyle = "#cfe9ff";
  const pbw = Math.max(2, 3 * UI), pbh = Math.max(6, 10 * UI);
  ctx.fillRect(Math.round(pb.x - 4 * UI), Math.round(pb.y - pbh / 2), pbw, pbh);
  ctx.fillRect(Math.round(pb.x + 4 * UI - pbw), Math.round(pb.y - pbh / 2), pbw, pbh);

  // ===== dead overlay =====
  if (player.dead) {
    const S = ovScale();
    ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.textAlign = "center"; ctx.fillStyle = "#ff8a8a"; ctx.font = "bold " + Math.round(26 * S) + "px 'Trebuchet MS'";
    ctx.fillText("WIPED OUT!", VIEW_W / 2, VIEW_H / 2 - 6 * S);
    ctx.fillStyle = "#cfe9ff"; ctx.font = "bold " + Math.round(13 * S) + "px monospace";
    ctx.fillText("respawning in " + player.respawn.toFixed(1) + "s", VIEW_W / 2, VIEW_H / 2 + 18 * S);
    ctx.textAlign = "left";
  }
}

// Minimap (radar) top-right showing ink ownership
function drawMinimap() {
  const mw = 84 * UI, box = mw / MAP_W;
  const mx = VIEW_W - mw - 8 * UI, my = 38 * UI;
  hudPanel(mx - 4 * UI, my - 4 * UI, mw + 8 * UI, mw + 8 * UI);
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const t = map[y * MAP_W + x];
      let c;
      if (t.terrain === T_OBST) c = "#0a1f2e";
      else if (t.owner === OWN_PLAYER) c = PLAYER_COLOR;
      else if (t.owner === OWN_ENEMY) c = t.inkColor || ENEMY_COLORS[0].ink;
      else c = "#16384b";
      ctx.fillStyle = c;
      ctx.fillRect(Math.floor(mx + x * box), Math.floor(my + y * box), Math.ceil(box), Math.ceil(box));
    }
  }
  // player blip (white, pulsing)
  ctx.fillStyle = "#fff";
  const ps = Math.max(2, 3 * UI);
  ctx.fillRect(Math.round(mx + player.x * box - ps / 2), Math.round(my + player.y * box - ps / 2), ps, ps);
  // enemy blips
  for (const e of enemies) if (!e.dead) {
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(Math.round(mx + e.x * box - 1), Math.round(my + e.y * box - 1), Math.max(2, 2 * UI), Math.max(2, 2 * UI));
  }
}

/* ---------- MOBILE CONTROL RENDER ---------- */
function actionBtn(b, color, label, ready) {
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = b.pressed ? shade(color, -0.15) : (ready ? shade(color, -0.55) : "rgba(8,34,52,0.7)");
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = Math.max(2, 2 * UI); ctx.stroke();
  ctx.fillStyle = ready ? "#06202b" : "#eaffff"; ctx.font = hudFont(9); ctx.textAlign = "center";
  ctx.fillText(label, b.x, b.y + 3 * UI);
  ctx.globalAlpha = 1;
}
function drawMobileControls() {
  drawStick(moveStick, "#19e6ff");
  drawStick(aimStick, "#ff3df0");
  actionBtn(btnShoot, PLAYER_COLOR, "FIRE", false);
  actionBtn(btnDive, "#3dff8a", "DIVE", false);
  const ultiReady = player.special >= 100;
  ctx.save();
  if (ultiReady) ctx.globalAlpha = 0.7 + 0.3 * Math.sin(bgT * 8);
  actionBtn(btnUlti, ultiReady ? "#ffd23d" : "#b56bff", "ULTI", ultiReady);
  ctx.restore();
  ctx.textAlign = "left";
}
function drawStick(s, color) {
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = "rgba(8,30,46,0.5)";
  ctx.beginPath(); ctx.arc(s.cx, s.cy, s.r, 0, TAU); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = Math.max(2, 2 * UI);
  ctx.beginPath(); ctx.arc(s.cx, s.cy, s.r, 0, TAU); ctx.stroke();
  ctx.fillStyle = s.active ? color : "rgba(150,200,220,0.55)";
  ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.42, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
}

/* ============================================================
   16. GAME STATES (title / pause / result)
   ============================================================ */
// pick the largest font size (<= maxPx) at which `text` fits within maxW
function fitFont(text, maxW, maxPx, family) {
  family = family || "'Trebuchet MS', sans-serif";
  let px = Math.max(7, Math.floor(maxPx));
  ctx.font = "bold " + px + "px " + family;
  while (px > 7 && ctx.measureText(text).width > maxW) {
    px--; ctx.font = "bold " + px + "px " + family;
  }
  return px;
}

function drawTitle() {
  bgT += 0.01;
  const cx = VIEW_W / 2, cy = VIEW_H / 2;
  // uniform layout scale so everything stays proportional at any window size
  const S = clamp(Math.min(VIEW_W / 520, VIEW_H / 360), 0.55, 1.6);

  // floating bubbles backdrop (scaled)
  for (let i = 0; i < 18; i++) {
    const bx = (i * 53 + bgT * 30) % VIEW_W;
    const by = VIEW_H - ((bgT * 40 + i * 70) % VIEW_H);
    ctx.fillStyle = "rgba(120,220,255,0.13)";
    ctx.beginPath(); ctx.arc(bx, by, (2 + (i % 3)) * S, 0, TAU); ctx.fill();
  }

  // centered content card — keeps the layout tidy in any aspect ratio
  const panelW = Math.min(VIEW_W * 0.92, 540 * S);
  const panelH = Math.min(VIEW_H * 0.92, 420 * S);
  const px0 = cx - panelW / 2, py0 = cy - panelH / 2;
  ctx.fillStyle = "rgba(6,20,34,0.62)";
  rrect(px0, py0, panelW, panelH);
  ctx.strokeStyle = "rgba(60,160,200,0.4)"; ctx.lineWidth = 2;
  ctx.strokeRect(Math.round(px0) + 0.5, Math.round(py0) + 0.5, Math.round(panelW), Math.round(panelH));

  ctx.textAlign = "center";

  // --- title (auto-fit to card width) ---
  const titleY = py0 + panelH * 0.20;
  const tpx = fitFont("REEF RUMBLE", panelW * 0.84, 56 * S);
  ctx.font = "bold " + tpx + "px 'Trebuchet MS', sans-serif";
  ctx.fillStyle = "#06202b"; ctx.fillText("REEF RUMBLE", cx + 2, titleY + 2);
  ctx.fillStyle = PLAYER_COLOR; ctx.fillText("REEF RUMBLE", cx, titleY);
  // subtitle
  const subpx = Math.max(10, tpx * 0.32);
  ctx.font = "bold " + subpx + "px 'Trebuchet MS', sans-serif";
  ctx.fillStyle = ENEMY_COLORS[0].ink;
  ctx.fillText("S H A R K   I N K   A R E N A", cx, titleY + subpx + 10 * S);

  // --- mascot shark ---
  drawTitleShark(cx, py0 + panelH * 0.50, S * 1.0);

  // --- stage selector ( ◀  Reef City  ▶ ) ---
  const selY = py0 + panelH * 0.68;
  ctx.fillStyle = "#7fb0c6"; ctx.font = Math.max(8, 9 * S) + "px monospace";
  ctx.fillText("STAGE", cx, selY - 12 * S);
  const selpx = Math.max(12, 15 * S);
  ctx.font = "bold " + selpx + "px 'Trebuchet MS', sans-serif";
  const name = LAYOUT_NAMES[currentLayout];
  const nameW = ctx.measureText(name).width;
  ctx.fillStyle = PLAYER_COLOR; ctx.fillText(name, cx, selY + selpx * 0.35);
  // arrow buttons (triangles) flanking the name
  const ax = nameW / 2 + 22 * S;
  titleUI.lx = cx - ax; titleUI.rx = cx + ax; titleUI.y = selY; titleUI.r = Math.max(16, 16 * S);
  ctx.fillStyle = "#19e6ff";
  poly(titleUI.lx, titleUI.y, [[7 * S, -8 * S], [7 * S, 8 * S], [-7 * S, 0]]);   // ◀
  poly(titleUI.rx, titleUI.y, [[-7 * S, -8 * S], [-7 * S, 8 * S], [7 * S, 0]]);  // ▶
  ctx.fillStyle = "#7fb0c6"; ctx.font = Math.max(7, 8 * S) + "px monospace";
  ctx.fillText(isTouch ? "tap arrows to change" : "◀ ▶ / A D to change", cx, selY + selpx * 0.35 + 14 * S);

  // --- pulsing start prompt ---
  const pulse = 0.5 + 0.5 * Math.sin(bgT * 6);
  const ppx = Math.max(12, 19 * S);
  ctx.globalAlpha = 0.55 + pulse * 0.45;
  ctx.fillStyle = "#fff"; ctx.font = "bold " + ppx + "px monospace";
  ctx.fillText(isTouch ? "TAP TO START" : "CLICK or press ENTER", cx, py0 + panelH * 0.78);
  ctx.globalAlpha = 1;

  // --- controls + tagline (auto-fit so they never overflow) ---
  const ctrl = isTouch
    ? "Sticks: move / aim    Buttons: shoot · dive · ulti"
    : "WASD move · Mouse aim · Click/Space shoot · Shift dive · Q ulti";
  let cf = fitFont(ctrl, panelW * 0.92, 12 * S, "monospace");
  ctx.font = cf + "px monospace"; ctx.fillStyle = "#9cc7da";
  ctx.fillText(ctrl, cx, py0 + panelH * 0.88);
  const tag = "Ink the most reef before the timer hits 0:00 to win!";
  let tf = fitFont(tag, panelW * 0.92, 11 * S, "monospace");
  ctx.font = tf + "px monospace"; ctx.fillStyle = "#7fb0c6";
  ctx.fillText(tag, cx, py0 + panelH * 0.95);

  ctx.textAlign = "left";
}

// Big chibi-shark mascot for the title, scaled by S (drawn around cx,cy)
function drawTitleShark(cx, cy, S) {
  S = S || 1;
  const col = PLAYER_BODY, dark = PLAYER_BODY_DARK, ink = PLAYER_COLOR;
  const bob = Math.sin(bgT * 3) * 3;
  ctx.save();
  ctx.translate(cx, cy + bob);
  ctx.scale(S, S);
  // shadow (sits on the ground, unaffected by bob)
  ctx.fillStyle = "rgba(0,0,0,0.22)";
  ctx.beginPath(); ctx.ellipse(0, 36 - bob, 42, 10, 0, 0, TAU); ctx.fill();
  const W = 54, H = 64, bx = -W / 2, by = -H + 10;
  ctx.fillStyle = dark; poly(-26, -14, [[0,-12],[0,16],[-22,4]]);        // tail
  ctx.fillStyle = dark; poly(-8, by + 4, [[0,0],[-18,-4],[-6,-28]]);     // dorsal fin
  ctx.fillStyle = col; rrect(bx, by, W, H - 8);                          // body
  ctx.fillStyle = shade(col, 0.25); rrect(bx + W * 0.18, by + H * 0.45, W * 0.64, H * 0.4); // belly
  ctx.fillStyle = shade(col, -0.18); rrect(bx, by, W, 10);              // top shade
  ctx.fillStyle = col; poly(W / 2 - 4, by + 14, [[0,-10],[0,18],[20,4]]); // snout
  ctx.fillStyle = "#fff"; for (let i = 0; i < 4; i++) ctx.fillRect(W / 2 + i * 5, by + 26, 4, 5); // teeth
  // eyes
  ctx.fillStyle = "#fff"; ctx.fillRect(6, by + 12, 12, 14); ctx.fillRect(22, by + 12, 12, 14);
  ctx.fillStyle = "#06202b"; ctx.fillRect(10, by + 16, 7, 9); ctx.fillRect(26, by + 16, 7, 9);
  ctx.fillStyle = "#bff6ff"; ctx.fillRect(11, by + 17, 3, 3); ctx.fillRect(27, by + 17, 3, 3);
  // coral/shell blaster
  ctx.save(); ctx.translate(10, 6); ctx.rotate(-0.3);
  ctx.fillStyle = "#e9c6a0"; ctx.fillRect(0, -6, 18, 12);
  ctx.fillStyle = dark; ctx.fillRect(14, -6, 20, 12);
  ctx.fillStyle = shade(ink, 0.4); ctx.fillRect(32, -6, 6, 12);
  ctx.restore();
  ctx.restore();
}

function drawPause() {
  const S = ovScale(), cx = VIEW_W / 2, cy = VIEW_H / 2;
  ctx.fillStyle = "rgba(4,14,24,0.8)"; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  // card
  const pw = Math.min(VIEW_W * 0.82, 290 * S), ph = 210 * S;
  hudPanel(cx - pw / 2, cy - ph / 2, pw, ph);
  ctx.textAlign = "center";
  ctx.fillStyle = PLAYER_COLOR; ctx.font = "bold " + Math.round(30 * S) + "px 'Trebuchet MS'";
  ctx.fillText("PAUSED", cx, cy - ph / 2 + 42 * S);
  // resume button (play triangle)
  const rb = resumeBtn();
  ctx.fillStyle = "rgba(8,46,66,0.95)";
  ctx.beginPath(); ctx.arc(rb.x, rb.y, rb.r, 0, TAU); ctx.fill();
  ctx.strokeStyle = PLAYER_COLOR; ctx.lineWidth = Math.max(2, 2 * S); ctx.stroke();
  ctx.fillStyle = PLAYER_COLOR;
  poly(rb.x + 2 * S, rb.y, [[-7 * S, -9 * S], [-7 * S, 9 * S], [9 * S, 0]]);
  ctx.fillStyle = "#9cc7da"; ctx.font = "bold " + Math.round(9 * S) + "px monospace";
  ctx.fillText(isTouch ? "RESUME" : "RESUME (P)", cx, rb.y + rb.r + 12 * S);
  // main-menu button
  const mb = menuBtn();
  ctx.fillStyle = "rgba(60,20,30,0.9)";
  ctx.fillRect(Math.round(mb.x), Math.round(mb.y), Math.round(mb.w), Math.round(mb.h));
  ctx.strokeStyle = "#ff8a8a"; ctx.lineWidth = Math.max(1, S);
  ctx.strokeRect(Math.round(mb.x) + 0.5, Math.round(mb.y) + 0.5, Math.round(mb.w), Math.round(mb.h));
  ctx.fillStyle = "#ffd0d0"; ctx.font = "bold " + Math.round(11 * S) + "px monospace";
  ctx.fillText("MAIN MENU", cx, mb.y + mb.h / 2 + 4 * S);
  ctx.textAlign = "left";
}

function drawResult(win) {
  const S = ovScale(), cx = VIEW_W / 2;
  ctx.fillStyle = "rgba(4,14,24,0.88)"; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  // card
  const pw = Math.min(VIEW_W * 0.9, 360 * S), ph = Math.min(VIEW_H * 0.9, 360 * S);
  const px0 = cx - pw / 2, py0 = VIEW_H / 2 - ph / 2;
  hudPanel(px0, py0, pw, ph);
  ctx.textAlign = "center";
  const r = game.result || { total: 0, killScore: 0, coverScore: 0 };
  ctx.font = "bold " + Math.round(38 * S) + "px 'Trebuchet MS'";
  ctx.fillStyle = win ? "#3dff8a" : "#ff6b6b";
  ctx.fillText(win ? "VICTORY!" : "DEFEAT", cx, py0 + ph * 0.16);
  ctx.font = "bold " + Math.round(12 * S) + "px monospace"; ctx.fillStyle = "#cfe9ff";
  ctx.fillText(win ? "You painted the reef cyan!" : "The rival gangs out-inked you...", cx, py0 + ph * 0.16 + 22 * S);

  // territory result bar
  const bw = pw * 0.78, bx = cx - bw / 2, by = py0 + ph * 0.34, bh = 18 * S;
  ctx.fillStyle = "#06202e"; ctx.fillRect(Math.round(bx - 2), Math.round(by - 2), Math.round(bw + 4), Math.round(bh + 4));
  ctx.fillStyle = PLAYER_COLOR; ctx.fillRect(Math.round(bx), Math.round(by), Math.round(bw * game.pct.player / 100), Math.round(bh));
  ctx.fillStyle = ENEMY_COLORS[0].ink; ctx.fillRect(Math.round(bx + bw - bw * game.pct.enemy / 100), Math.round(by), Math.round(bw * game.pct.enemy / 100), Math.round(bh));
  ctx.fillStyle = "#fff"; ctx.font = "bold " + Math.round(10 * S) + "px monospace";
  ctx.fillText("YOU " + Math.round(game.pct.player) + "%   vs   RIVALS " + Math.round(game.pct.enemy) + "%", cx, by + bh + 13 * S);

  // score breakdown
  ctx.fillStyle = "#9cc7da"; ctx.font = Math.round(12 * S) + "px monospace";
  let yy = py0 + ph * 0.60;
  ctx.fillText("Coverage bonus:  " + r.coverScore, cx, yy);
  ctx.fillText("Splats x" + player.kills + ":  " + r.killScore, cx, yy + 18 * S);
  ctx.fillStyle = PLAYER_COLOR; ctx.font = "bold " + Math.round(18 * S) + "px monospace";
  ctx.fillText("TOTAL  " + r.total, cx, yy + 44 * S);

  const pulse = 0.5 + 0.5 * Math.sin(bgT * 6);
  ctx.globalAlpha = 0.5 + pulse * 0.5;
  ctx.fillStyle = "#fff"; ctx.font = "bold " + Math.round(13 * S) + "px monospace";
  ctx.fillText(isTouch ? "TAP for title" : "CLICK or ENTER for title", cx, py0 + ph * 0.93);
  ctx.globalAlpha = 1;
  ctx.textAlign = "left";
}

/* ============================================================
   MAIN LOOP (rAF + delta time)
   ============================================================ */
let lastT = 0;
function frame(now) {
  if (!lastT) lastT = now;
  let dt = (now - lastT) / 1000;
  lastT = now;
  dt = Math.min(dt, 0.05); // clamp big gaps (tab switches)

  // orientation hint for very narrow portrait phones
  const hint = document.getElementById("rotateHint");
  if (isTouch && window.innerHeight > window.innerWidth * 1.3) hint.style.display = "flex";
  else hint.style.display = "none";

  update(dt);
  render();
  present();   // blit the low-res buffer to the screen, crisp nearest-neighbour
  requestAnimationFrame(frame);
}

// boot
resize();
generateMap();   // generate once so title can show nothing odd; real reset on start
countPaintable();
requestAnimationFrame(frame);
</script>
